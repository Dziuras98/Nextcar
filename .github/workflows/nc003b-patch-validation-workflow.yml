name: NC-003B patch validation workflow

on:
  pull_request:
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: manager/nc-003b-phase0-final-closure-validation
          fetch-depth: 1
          persist-credentials: true
      - name: Correct monolithic manifest semantic comparison
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "3b3b36c72073e5a4c129ecbc3d942bd63db5a464"
          python -B - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/nc003b-phase0-final-closure-windows.yml')
          text = path.read_text(encoding='utf-8')
          old = """          old_by_path = {entry['final_path']: entry for entry in old['files']}
          new_by_path = {entry['final_path']: entry for entry in new['files']}
          assert len(old_by_path) == 45 and len(new_by_path) == 58
          for path, record in old_by_path.items():
              assert new_by_path[path] == record, path
          additions = sorted(set(new_by_path) - set(old_by_path))
          assert len(additions) == 13
"""
          new = """          assert new['files'][:45] == old['files']
          additions = new['files'][45:]
          assert len(additions) == 13
"""
          assert text.count(old) == 1
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git diff --check
          test "$(git diff --name-only | wc -l)" -eq 1
          test "$(git diff --name-only)" = ".github/workflows/nc003b-phase0-final-closure-windows.yml"
          git config user.name "OpenAI NC-003B Closure Agent"
          git config user.email "noreply@openai.com"
          git add .github/workflows/nc003b-phase0-final-closure-windows.yml
          git commit -m "fix final closure manifest semantic proof"
          git push origin HEAD:refs/heads/manager/nc-003b-phase0-final-closure-validation
