name: NC-003B delete stale validation ref

on:
  pull_request:
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write

jobs:
  delete-stale-ref:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: true
          fetch-depth: 1
      - name: Delete stale validation ref without force update
        shell: bash
        run: |
          set -euo pipefail
          git push origin --delete refs/heads/manager/nc-003b-phase0-final-closure-validation
