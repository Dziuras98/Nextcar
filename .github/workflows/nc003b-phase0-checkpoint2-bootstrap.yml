name: NC-003B Phase 0 Checkpoint 2 bootstrap

on:
  push:
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap
  pull_request:
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write
  actions: read

env:
  PYTHONDONTWRITEBYTECODE: "1"
  TARGET_SHA: 9bb6464123228f1d9638d467e7160a7cb2aa98c8
  CHECKPOINT1_SHA: 87813fe04421a0c48e96b30ba542d5171ca96a1e
  CHECKPOINT1_TREE: 2f25f454cfedfb8caaeffe6eb11ab2e012a5ed61
  CHECKPOINT2_TREE: b616b2ae12a51b4df83ba05858ce96cbbdce75e6
  CANDIDATE_BRANCH: manager/nc-003b-phase0-final-closure-candidate
  TARGET_BRANCH: manager/nc-003b-phase0-reconstruction
  SELECTED_ARTIFACT_SHA256: f7b9004e24a81f1558c1df39a7d27dd31a9cc0a916a46f00e6f4b10881b1727b

jobs:
  apply-verify-publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out isolated bootstrap payload
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct and verify transfer payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/nc003b-cp2
          cat .github/bootstrap/cp2part-* > /tmp/nc003b-cp2/nondeletes.patch.gz.b64
          test "$(sha256sum /tmp/nc003b-cp2/nondeletes.patch.gz.b64 | cut -d' ' -f1)" = "48d974d576faea84ebcecc3d61bc5c32c551b4458e57b06d6af5114d67e800ac"
          base64 --decode /tmp/nc003b-cp2/nondeletes.patch.gz.b64 > /tmp/nc003b-cp2/nondeletes.patch.gz
          test "$(sha256sum /tmp/nc003b-cp2/nondeletes.patch.gz | cut -d' ' -f1)" = "437c0236f6ab0bc93b04f02a9237f2f94b30c7b492ed59a8044ade9323d914ee"
          gzip --decompress --stdout /tmp/nc003b-cp2/nondeletes.patch.gz > /tmp/nc003b-cp2/nondeletes.patch
          test "$(sha256sum /tmp/nc003b-cp2/nondeletes.patch | cut -d' ' -f1)" = "aedf9e5483f4842bcd070cb6069583299df01f0d0d8b41ab4564b6ca3ce33646"

      - name: Confirm immutable input refs and ancestry
        shell: bash
        run: |
          set -euo pipefail
          git config --global core.autocrlf false
          git config --global core.eol lf
          git fetch --no-tags origin \
            "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" \
            "+refs/heads/${CANDIDATE_BRANCH}:refs/remotes/origin/${CANDIDATE_BRANCH}"
          test "$(git rev-parse refs/remotes/origin/${TARGET_BRANCH})" = "${TARGET_SHA}"
          test "$(git rev-parse refs/remotes/origin/${CANDIDATE_BRANCH})" = "${CHECKPOINT1_SHA}"
          test "$(git rev-parse refs/remotes/origin/${CANDIDATE_BRANCH}^{tree})" = "${CHECKPOINT1_TREE}"
          read -r behind ahead < <(git rev-list --left-right --count "${TARGET_SHA}...${CHECKPOINT1_SHA}")
          test "$behind" = "0"
          test "$ahead" = "1"

      - name: Produce exact Checkpoint 2 tree
        shell: bash
        run: |
          set -euo pipefail
          git switch --force-create "${CANDIDATE_BRANCH}" "refs/remotes/origin/${CANDIDATE_BRANCH}"
          test -z "$(git status --porcelain)"
          git apply --check /tmp/nc003b-cp2/nondeletes.patch
          git apply /tmp/nc003b-cp2/nondeletes.patch
          rm -rf Tools/EngineSimVendor/SourceInputs
          rm -f Tools/EngineSimVendor/RECONSTRUCTION_AUDIT.md
          rm -f Tools/EngineSimVendor/WIP_CHECKPOINT.md
          git add --all
          git config user.name "OpenAI NC-003B Closure Agent"
          git config user.email "noreply@openai.com"
          GIT_AUTHOR_NAME="OpenAI NC-003B Closure Agent" \
          GIT_AUTHOR_EMAIL="noreply@openai.com" \
          GIT_AUTHOR_DATE="Tue, 21 Jul 2026 13:30:00 +0200" \
            git commit -m "WIP Phase 0 reconstruction: remove temporary source inputs"
          test "$(git rev-parse HEAD^{tree})" = "${CHECKPOINT2_TREE}"
          test "$(git log -1 --format=%s)" = "WIP Phase 0 reconstruction: remove temporary source inputs"
          test "$(git diff --name-only HEAD^ HEAD -- Tools/EngineSimVendor/SourceInputs | wc -l)" -eq 437
          test ! -d Tools/EngineSimVendor/SourceInputs
          test ! -e Tools/EngineSimVendor/RECONSTRUCTION_AUDIT.md
          test ! -e Tools/EngineSimVendor/WIP_CHECKPOINT.md
          python -B - <<'PY'
          import json
          from pathlib import Path
          m = json.loads(Path('Tools/EngineSimVendor/SOURCE_MANIFEST.json').read_text(encoding='utf-8'))
          assert m['schema_version'] == 1
          assert isinstance(m['files'], list) and len(m['files']) == 58
          assert 'fixture_source_snapshot' in m and 'final_closure' in m
          assert m['final_closure']['sourceinputs_removed_file_count'] == 437
          assert m['final_closure']['remaining_sourceinputs_directory_count'] == 0
          assert m['final_closure']['remaining_sourceinputs_file_count'] == 0
          PY

      - name: Run Checkpoint 2 repository and fixture validation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/nc003b-cp2/logs
          python -B scripts/validate_repository.py | tee /tmp/nc003b-cp2/logs/repository-validation.log
          git diff --check HEAD^ HEAD | tee /tmp/nc003b-cp2/logs/git-diff-check.log
          python -B Tools/EngineSimVendor/verify_fixture_source_snapshot.py | tee /tmp/nc003b-cp2/logs/snapshot-verifier.log
          python -B Tools/EngineSimVendor/tests/test_fixture_source_snapshot.py 2>&1 | tee /tmp/nc003b-cp2/logs/snapshot-tests.log
          python -B Tools/EngineSimVendor/tests/test_subaru_ej25_fixture_verifier.py 2>&1 | tee /tmp/nc003b-cp2/logs/fixture-tests.log
          python -B Tools/EngineSimVendor/verify_subaru_ej25_fixture.py | tee /tmp/nc003b-cp2/logs/fixture-verifier.log

      - name: Run impulse-response verification and determinism
        shell: bash
        run: |
          set -euo pipefail
          WAV="Plugins/NextcarEngineSim/Source/ThirdParty/EngineSim/upstream/engine-sim/es/sound-library/new/minimal_muffling_02.wav"
          HEADER="Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/MinimalMuffling02ImpulseResponse.generated.h"
          MANIFEST="Tools/EngineSimVendor/SOURCE_MANIFEST.json"
          python -B Tools/EngineSimVendor/tests/test_impulse_response_tools.py 2>&1 | tee /tmp/nc003b-cp2/logs/ir-tests.log
          python -B Tools/EngineSimVendor/verify_impulse_response.py --wav "$WAV" --header "$HEADER" --manifest "$MANIFEST" --repository-root . | tee /tmp/nc003b-cp2/logs/ir-verifier.log
          python -B Tools/EngineSimVendor/generate_impulse_response_header.py --input "$WAV" --output /tmp/nc003b-cp2/ir-generated.h
          cmp "$HEADER" /tmp/nc003b-cp2/ir-generated.h
          echo "IR generator byte-identical: PASS" | tee /tmp/nc003b-cp2/logs/ir-generator.log

      - name: Download and verify accepted selected-profile artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8488882253/zip" \
            --output /tmp/nc003b-cp2/selected-profile.zip
          test "$(sha256sum /tmp/nc003b-cp2/selected-profile.zip | cut -d' ' -f1)" = "${SELECTED_ARTIFACT_SHA256}"
          mkdir /tmp/nc003b-cp2/selected-profile
          unzip -q /tmp/nc003b-cp2/selected-profile.zip -d /tmp/nc003b-cp2/selected-profile
          python -B - <<'PY'
          from pathlib import Path
          import hashlib, json
          root = Path('/tmp/nc003b-cp2/selected-profile')
          entries = json.loads((root / 'hash-manifest.json').read_text(encoding='utf-8'))
          for item in entries:
              p = root / item['path']
              assert p.is_file(), item['path']
              data = p.read_bytes()
              assert len(data) == item['size'], item['path']
              assert hashlib.sha256(data).hexdigest() == item['sha256'], item['path']
          PY
          cmp /tmp/nc003b-cp2/selected-profile/subaru_ej25_cold_start_profile.json Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json
          cmp /tmp/nc003b-cp2/selected-profile/SubaruEJ25ColdStartProfile.generated.h Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/SubaruEJ25ColdStartProfile.generated.h
          for n in $(seq -w 0 9); do
            cmp "/tmp/nc003b-cp2/selected-profile/selected-calibration/positive-traces/trial-${n}.json" "Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration/positive-traces/trial-${n}.json"
          done
          cmp /tmp/nc003b-cp2/selected-profile/selected-calibration/negative-timeout.json Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration/negative-timeout.json
          cmp /tmp/nc003b-cp2/selected-profile/selected-calibration/negative-stall.json Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration/negative-stall.json

      - name: Run cold-start mutation and generator validation
        shell: bash
        run: |
          set -euo pipefail
          PROFILE="Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json"
          HEADER="Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/SubaruEJ25ColdStartProfile.generated.h"
          python -B Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py 2>&1 | tee /tmp/nc003b-cp2/logs/cold-start-tests.log
          python -B Tools/EngineSimVendor/generate_cold_start_profile_header.py --profile "$PROFILE" --output /tmp/nc003b-cp2/cold-start-generated.h
          cmp "$HEADER" /tmp/nc003b-cp2/cold-start-generated.h
          echo "cold-start generator byte-identical: PASS" | tee /tmp/nc003b-cp2/logs/cold-start-generator.log
          python -B Tools/EngineSimVendor/verify_cold_start_profile.py --help > /tmp/nc003b-cp2/logs/cold-start-verifier-help.log

      - name: Prove closure residue and dependency boundaries
        shell: bash
        run: |
          set -euo pipefail
          test "$(find . -type d -name __pycache__ -print | wc -l)" -eq 0
          test "$(find . -type f -name '*.pyc' -print | wc -l)" -eq 0
          test ! -d Tools/EngineSimVendor/SourceInputs
          ! git grep -n -E 'RUNNER_BOOTSTRAP_REQUEST|bootstrap_on_runner\.ps1|git credential fill' -- ':!*.md'
          ! git grep -n -E 'LoadWave|loadWave|\.wav["'"']' -- Plugins/NextcarEngineSim/Source/NextcarEngineSimCore
          test -z "$(git status --porcelain)"
          printf '%s\n' \
            'residue scan: PASS' \
            'SourceInputs absence: PASS' \
            '__pycache__ count: 0' \
            '.pyc count: 0' \
            'network dependency scan: PASS' \
            'runtime WAV dependency scan: PASS' \
            | tee /tmp/nc003b-cp2/logs/closure-scans.log

      - name: Publish Checkpoint 2 by normal fast-forward push
        shell: bash
        run: |
          set -euo pipefail
          CHECKPOINT2_SHA="$(git rev-parse HEAD)"
          git push origin "HEAD:refs/heads/${CANDIDATE_BRANCH}"
          git fetch --no-tags origin "+refs/heads/${CANDIDATE_BRANCH}:refs/remotes/origin/${CANDIDATE_BRANCH}"
          test "$(git rev-parse refs/remotes/origin/${CANDIDATE_BRANCH})" = "${CHECKPOINT2_SHA}"
          test "$(git rev-parse refs/remotes/origin/${CANDIDATE_BRANCH}^{tree})" = "${CHECKPOINT2_TREE}"
          read -r behind ahead < <(git rev-list --left-right --count "${TARGET_SHA}...${CHECKPOINT2_SHA}")
          test "$behind" = "0"
          test "$ahead" = "2"
          printf 'checkpoint2_sha=%s\ncheckpoint2_tree=%s\nahead=%s\nbehind=%s\nforce=false\n' "$CHECKPOINT2_SHA" "$CHECKPOINT2_TREE" "$ahead" "$behind" | tee /tmp/nc003b-cp2/checkpoint2-status.txt

      - name: Upload Checkpoint 2 bootstrap evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-Phase0-Checkpoint2-bootstrap-${{ github.run_id }}
          path: |
            /tmp/nc003b-cp2/logs
            /tmp/nc003b-cp2/checkpoint2-status.txt
          if-no-files-found: warn
          retention-days: 7
