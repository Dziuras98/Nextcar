name: "NC-003B PR42 final self-hosted Windows gate"

on:
  push:
    branches:
      - agent/nc-003b-pr42-final-windows-gate-bootstrap
    paths:
      - .github/workflows/nc003b-pr42-final-windows-gate.yml

permissions:
  contents: read
  actions: read
  statuses: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  CANDIDATE_SHA: 1b2bc3599a0811be88a3b55987a4d27c72672a46
  CANDIDATE_TREE: 242fd115c2935367dc34d1185c4fe9cf25a0a6a7
  BASE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  SOURCE_SHA: 8548a70387aa36d9b567652eee4cd0f1319d527a
  SOURCE_TREE: 69f3faa5d1b82dddab1d9985ab8da0b9fae1cddc
  B_SHA: baff818ad6cce157dbcd94088d74f4a2c22c16fb
  B_TREE: 22c8ffe428b96b60c0bc401bbc3ff22bdddf97f5
  G_SHA: ab70fb2b0227e4274387357145e734d7d2fde29a
  G_TREE: 6b4a9479ba764754ea4f59cc11fb3fe6cae981c9
  STATUS_CONTEXT: NC-003B Phase 0 / Final self-hosted Windows exact-head gate
  POWERSHELL_SHELL: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}

jobs:
  announce-run:
    name: "Announce PR #42 final Windows gate"
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending candidate status with run ID
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.request
          body = json.dumps({
              "state": "pending",
              "context": os.environ["STATUS_CONTEXT"],
              "description": "Final self-hosted Windows exact-head validation running",
              "target_url": f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",
              data=body, method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request) as response:
              assert response.status == 201
          PY

  control-artifact-probe:
    name: "GitHub-hosted artifact control probe"
    needs: announce-run
    runs-on: ubuntu-latest
    outputs:
      upload_outcome: ${{ steps.control-upload.outcome }}
    steps:
      - name: Create control probe
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' \
            'repository=Dziuras98/Nextcar' \
            "run_id=${GITHUB_RUN_ID}" \
            "run_attempt=${GITHUB_RUN_ATTEMPT}" \
            'runner=github-hosted' \
            'purpose=artifact-control-probe' > control-probe.txt
          test -s control-probe.txt
          sha256sum control-probe.txt
      - name: Upload GitHub-hosted artifact control probe
        id: control-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-artifact-control-probe-${{ github.run_id }}
          path: control-probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3
      - name: Enforce control upload success
        shell: bash
        run: |
          test "${{ steps.control-upload.outcome }}" = success

  self-hosted-preflight:
    name: "Self-hosted process-bypass and artifact preflight"
    needs: announce-run
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 20
    outputs:
      upload_outcome: ${{ steps.self-upload.outcome }}
    steps:
      - name: Inventory execution policy from cmd
        shell: cmd
        run: |
          @echo off
          where powershell.exe
          if errorlevel 1 exit /b 1
          powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command "Get-ExecutionPolicy -List | Format-Table -AutoSize; Write-Host PROCESS_EFFECTIVE_POLICY=$(Get-ExecutionPolicy); exit 0"
          if errorlevel 1 exit /b 1
      - name: Prove process-scoped bypass and create probe
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host 'POWERSHELL_BODY_EXECUTED=true'
          Write-Host "POWERSHELL_VERSION=$($PSVersionTable.PSVersion)"
          Write-Host "PSCOMMAND_PATH=$PSCommandPath"
          Write-Host "EFFECTIVE_POLICY=$(Get-ExecutionPolicy)"
          if ([string]::IsNullOrWhiteSpace($PSCommandPath) -or -not $PSCommandPath.EndsWith('.ps1')) { throw 'Generated .ps1 path not proven.' }
          if ((Get-ExecutionPolicy) -ne 'Bypass') { throw 'Process-scoped bypass not effective.' }
          $root = Join-Path $env:GITHUB_WORKSPACE '_artifact_probe_upload'
          $file = Join-Path $root 'probe.txt'
          if (Test-Path -LiteralPath $root) { throw "Unique probe root already exists: $root" }
          New-Item -ItemType Directory -Path $root | Out-Null
          @(
            'repository=Dziuras98/Nextcar'
            "run_id=$env:GITHUB_RUN_ID"
            "run_attempt=$env:GITHUB_RUN_ATTEMPT"
            "runner=$env:RUNNER_NAME"
            'purpose=self-hosted-process-bypass-artifact-preflight'
          ) | Set-Content -LiteralPath $file -Encoding utf8
          $item = Get-Item -LiteralPath $file
          if ($item.Length -le 0) { throw 'Probe is empty.' }
          Write-Host "UPLOAD_FULL_NAME=$($item.FullName)"
          Write-Host "UPLOAD_LENGTH=$($item.Length)"
          Write-Host "UPLOAD_SHA256=$((Get-FileHash -LiteralPath $file -Algorithm SHA256).Hash)"
      - name: Verify PowerShell side effects from cmd
        shell: cmd
        run: |
          @echo off
          setlocal
          set "UPLOAD_FILE=%GITHUB_WORKSPACE%\_artifact_probe_upload\probe.txt"
          if not exist "%UPLOAD_FILE%" exit /b 1
          for %%I in ("%UPLOAD_FILE%") do (
            echo CMD_UPLOAD_FULL_NAME=%%~fI
            echo CMD_UPLOAD_LENGTH=%%~zI
            if %%~zI LEQ 0 exit /b 1
          )
          type "%UPLOAD_FILE%"
          if errorlevel 1 exit /b 1
          certutil -hashfile "%UPLOAD_FILE%" SHA256
          if errorlevel 1 exit /b 1
      - name: Upload self-hosted preflight probe
        id: self-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-self-hosted-preflight-${{ github.run_id }}
          path: ${{ github.workspace }}\_artifact_probe_upload\probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3
      - name: Enforce self-hosted upload success
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "STEP_BODY_EXECUTED=self-hosted-preflight-upload-enforcement"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          if ('${{ steps.self-upload.outcome }}' -ne 'success') { throw 'Self-hosted artifact upload failed after file proof.' }

  final-windows-gate:
    name: "PR #42 final self-hosted Windows exact-head gate"
    needs:
      - announce-run
      - control-artifact-probe
      - self-hosted-preflight
    if: needs.control-artifact-probe.outputs.upload_outcome == 'success' && needs.self-hosted-preflight.outputs.upload_outcome == 'success'
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 180
    env:
      EVIDENCE_ROOT: ${{ github.workspace }}\_nc003b_pr42_evidence_${{ github.run_id }}_${{ github.run_attempt }}
      PACKAGE_ROOT: ${{ github.workspace }}\_nc003b_pr42_package_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - name: Runner proof and evidence initialization
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop'
          Write-Host "STEP_BODY_EXECUTED=runner-proof"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $E=$env:EVIDENCE_ROOT
          if(Test-Path $E){throw "Unique evidence root exists: $E"}
          New-Item -ItemType Directory -Path $E|Out-Null
          $runner=[ordered]@{run_id=[long]$env:GITHUB_RUN_ID;run_attempt=[int]$env:GITHUB_RUN_ATTEMPT;job_id='final-windows-gate';runner_name='${{ runner.name }}';runner_os='${{ runner.os }}';runner_arch='${{ runner.arch }}';required_labels=@('self-hosted','Windows','X64','unreal-5.8');script_path=$PSCommandPath;effective_policy=(Get-ExecutionPolicy)}
          if($runner.runner_name-ne'DESKTOP-P4CTGHS'-or$runner.runner_os-ne'Windows'-or$runner.runner_arch-ne'X64'-or$runner.effective_policy-ne'Bypass'){throw 'Runner or PowerShell contract failed'}
          $runner|ConvertTo-Json -Depth 8|Set-Content -Encoding utf8 (Join-Path $E 'runner-proof.json')
          $v=[ordered]@{powershell_path=(Get-Command powershell.exe).Source;powershell=$PSVersionTable.PSVersion.ToString();git=((& git --version)-join"`n");python=((& python --version 2>&1)-join"`n");cmake=((& cmake --version 2>&1)-join"`n");ctest=((& ctest --version 2>&1)-join"`n")}
          $vswhere="${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe";if(-not(Test-Path $vswhere)){throw 'SELF_HOSTED_TOOLCHAIN_INCOMPLETE: vswhere missing'}
          $v.msvc_discovery=(& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -format json|ConvertFrom-Json)
          $v|ConvertTo-Json -Depth 10|Set-Content -Encoding utf8 (Join-Path $E 'toolchain-versions.json')
          git config --global --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'global-git-config-before.txt')
          git config --system --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'system-git-config-before.txt')
          @("runner proof: PASS","STEP_BODY_EXECUTED=runner-proof","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $E 'runtime-markers-runner-proof.txt')

      - name: Manual exact candidate checkout
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop'
          Write-Host "STEP_BODY_EXECUTED=checkout"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $root=Join-Path $env:RUNNER_TEMP "nc003b-pr42-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          if(Test-Path $root){throw 'Unique checkout path exists'}
          git init $root
          git -C $root config --local core.autocrlf false
          git -C $root config --local core.eol lf
          git -C $root remote add origin https://github.com/Dziuras98/Nextcar.git
          git -C $root fetch --no-tags --prune origin +refs/heads/agent/nc-003b-phase0-source-normalization-integration:refs/remotes/origin/candidate
          git -C $root checkout --detach $env:CANDIDATE_SHA
          if($LASTEXITCODE){throw 'Exact candidate checkout failed'}
          "CHECKOUT_ROOT=$root"|Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          @("STEP_BODY_EXECUTED=checkout","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)","CHECKOUT_ROOT=$root")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'runtime-markers-checkout.txt')

      - name: Fail-closed topology and scope
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop';Set-Location $env:CHECKOUT_ROOT
          Write-Host "STEP_BODY_EXECUTED=topology"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          function Eq($a,$e,$n){if(([string]$a).Trim()-ne$e){throw "$n mismatch: got '$a', expected '$e'"}}
          Eq (git rev-parse HEAD) $env:CANDIDATE_SHA 'HEAD'
          Eq (git rev-parse 'HEAD^{tree}') $env:CANDIDATE_TREE 'HEAD tree'
          Eq (git rev-list --parents -n 1 HEAD) "$env:CANDIDATE_SHA $env:SOURCE_SHA" 'candidate sole parent'
          Eq (git rev-parse "$env:SOURCE_SHA^{tree}") $env:SOURCE_TREE 'source tree'
          Eq (git rev-list --parents -n 1 $env:SOURCE_SHA) "$env:SOURCE_SHA $env:B_SHA $env:G_SHA" 'source ordered parents'
          Eq (git rev-parse "$env:B_SHA^{tree}") $env:B_TREE 'B tree'
          Eq (git rev-list --parents -n 1 $env:B_SHA) "$env:B_SHA $env:BASE_SHA" 'B sole parent'
          Eq (git rev-parse "$env:G_SHA^{tree}") $env:G_TREE 'G tree'
          Eq (git rev-list --parents -n 1 $env:G_SHA) "$env:G_SHA $env:BASE_SHA" 'G sole parent'
          $s1=@(git diff --name-status $env:BASE_SHA $env:SOURCE_SHA)
          $s2=@(git diff --name-status $env:SOURCE_SHA $env:CANDIDATE_SHA)
          $s3=@(git diff --name-status $env:BASE_SHA $env:CANDIDATE_SHA)
          function CountScope($x){[ordered]@{m=@($x|Where-Object{$_-match'^M\s'}).Count;d=@($x|Where-Object{$_-match'^D\s'}).Count;p=$x.Count;r=@($x|Where-Object{$_-match'^[RC]'}).Count}}
          $a=CountScope $s1;$b=CountScope $s2;$c=CountScope $s3
          if($a.m-ne8-or$a.d-ne13-or$a.p-ne21-or$b.m-ne4-or$b.d-ne0-or$b.p-ne4-or$c.m-ne12-or$c.d-ne13-or$c.p-ne25-or$a.r-or$b.r-or$c.r){throw 'Scope matrix mismatch'}
          $allow=@(
            'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.cpp'
            'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.part00.inc'
            'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.part01.inc'
            'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.part02.inc'
            'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/SubaruEJ25ColdStartProfile.generated.h'
            'Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json'
            'Tools/EngineSimVendor/SOURCE_MANIFEST.json'
            'Tools/EngineSimVendor/_cold_start_sources/generate_cold_start_profile_header.py.gz'
            'Tools/EngineSimVendor/_cold_start_sources/record_cold_start_calibration_evidence.py.gz'
            'Tools/EngineSimVendor/_cold_start_sources/run_cold_start_calibration.py.gz'
            'Tools/EngineSimVendor/_cold_start_sources/test_cold_start_profile_verifier.py.gz'
            'Tools/EngineSimVendor/_cold_start_sources/verify_cold_start_profile.py.gz'
            'Tools/EngineSimVendor/generate_cold_start_profile_header.py'
            'Tools/EngineSimVendor/record_cold_start_calibration_evidence.py'
            'Tools/EngineSimVendor/run_cold_start_calibration.py'
            'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py'
            'Tools/EngineSimVendor/validate_cold_start_windows.parts/part00.ps1frag'
            'Tools/EngineSimVendor/validate_cold_start_windows.parts/part01.ps1frag'
            'Tools/EngineSimVendor/validate_cold_start_windows.parts/part02.ps1frag'
            'Tools/EngineSimVendor/validate_cold_start_windows.parts/part03.ps1frag'
            'Tools/EngineSimVendor/validate_cold_start_windows.parts/part04.ps1frag'
            'Tools/EngineSimVendor/validate_cold_start_windows.ps1'
            'Tools/EngineSimVendor/verify_cold_start_profile.py'
            'docs/manager-history.md'
            'scripts/validate_repository.py'
          )
          $actual=@($s3|ForEach-Object{($_-split"`t")[-1]}|Sort-Object)
          $expected=@($allow|Sort-Object)
          if(Compare-Object $actual $expected){throw 'Unexpected path or missing allowlisted path'}
          $s1|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'scope-base-source.txt')
          $s2|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'scope-source-final.txt')
          $s3|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'scope-name-status.txt')
          git diff --stat $env:BASE_SHA $env:CANDIDATE_SHA|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'scope-stat.txt')
          git diff --check $env:BASE_SHA $env:CANDIDATE_SHA 2>&1|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'git-diff-check.txt')
          if($LASTEXITCODE){throw 'git diff --check failed'}
          if(git status --porcelain){throw 'Initial worktree not clean'}
          @("HEAD=$(git rev-parse HEAD)","HEAD_TREE=$(git rev-parse 'HEAD^{tree}')","SOURCE_PARENTS=$(git rev-list --parents -n 1 $env:SOURCE_SHA)","B_PARENTS=$(git rev-list --parents -n 1 $env:B_SHA)","G_PARENTS=$(git rev-list --parents -n 1 $env:G_SHA)")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'git-topology.txt')
          @("STEP_BODY_EXECUTED=topology","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'runtime-markers-topology.txt')

      - name: Download and verify P1 artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop'
          Write-Host "STEP_BODY_EXECUTED=P1"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $root=Join-Path $env:RUNNER_TEMP "nc003b-pr42-p1-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          New-Item -ItemType Directory $root|Out-Null
          $env:P1_ZIP=Join-Path $root 'artifact.zip'
          $env:P1_EXTRACTED=Join-Path $root 'extracted'
          $env:PROFILE_PATH=Join-Path $env:CHECKOUT_ROOT 'Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json'
          @'
          import hashlib,json,os,urllib.request,zipfile
          from pathlib import Path,PurePosixPath,PureWindowsPath
          req=urllib.request.Request('https://api.github.com/repos/Dziuras98/Nextcar/actions/artifacts/8488882253/zip',headers={'Authorization':'Bearer '+os.environ['GH_TOKEN'],'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'})
          with urllib.request.urlopen(req) as r,open(os.environ['P1_ZIP'],'wb') as f:
              while True:
                  b=r.read(1048576)
                  if not b: break
                  f.write(b)
          zpath=Path(os.environ['P1_ZIP']);data=zpath.read_bytes()
          assert len(data)==211595
          assert hashlib.sha256(data).hexdigest()=='f7b9004e24a81f1558c1df39a7d27dd31a9cc0a916a46f00e6f4b10881b1727b'
          out=Path(os.environ['P1_EXTRACTED']);out.mkdir()
          with zipfile.ZipFile(zpath) as z:
              infos=z.infolist();assert len(infos)==41;seen=set()
              for i in infos:
                  p=PurePosixPath(i.filename.replace('\\','/'));w=PureWindowsPath(i.filename)
                  assert i.filename and not w.is_absolute() and not w.drive and all(x not in ('','.','..') for x in p.parts)
                  n='/'.join(p.parts).casefold();assert n not in seen;seen.add(n)
              z.extractall(out)
          manifest=json.loads((out/'hash-manifest.json').read_text('utf-8'));assert len(manifest)==40
          for row in manifest:
              b=(out/row['path']).read_bytes();assert len(b)==row['size'] and hashlib.sha256(b).hexdigest()==row['sha256']
          profile=json.loads(Path(os.environ['PROFILE_PATH']).read_text('utf-8'))
          rows=[('positive',x) for x in profile['positive_traces']]+[('timeout',profile['timeout_trace']),('stall',profile['stall_trace'])]
          verified=[];prefix='Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration/'
          for kind,row in rows:
              rel=row['path'].replace('\\','/')[len(prefix):];p=out/'selected-calibration'/rel
              json.loads(p.read_text('utf-8'));h=hashlib.sha256(p.read_bytes()).hexdigest()
              exp=row.get('sha256') or row.get('sha256_hex') or row.get('hash');assert h.lower()==exp.lower()
              verified.append({'kind':kind,'canonical_path':row['path'],'sha256':h})
          meta={'source_run':29814599329,'artifact_id':8488882253,'zip_size':211595,'zip_sha256':hashlib.sha256(data).hexdigest(),'members':41,'manifest_entries':40,'manifest_pass':'40/40','positive':'10/10','timeout':'1/1','stall':'1/1','total':'12/12'}
          Path(os.environ['EVIDENCE_ROOT'],'artifact-source-metadata.json').write_text(json.dumps(meta,indent=2)+'\n',encoding='utf-8')
          Path(os.environ['EVIDENCE_ROOT'],'trace-verification.json').write_text(json.dumps({'result':'PASS','records':verified},indent=2)+'\n',encoding='utf-8')
          '@|python -
          if($LASTEXITCODE){throw 'P1 verification failed'}
          "P1_EXTRACTED=$env:P1_EXTRACTED"|Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          @("STEP_BODY_EXECUTED=P1","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'runtime-markers-p1.txt')

      - name: Mount traces and run full validation matrix
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop';Set-Location $env:CHECKOUT_ROOT
          Write-Host "STEP_BODY_EXECUTED=validation-matrix"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $junction=Join-Path $env:CHECKOUT_ROOT 'Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration'
          $target=Join-Path $env:P1_EXTRACTED 'selected-calibration'
          New-Item -ItemType Junction -Path $junction -Target $target|Out-Null
          python -B scripts/validate_repository.py 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'repository-validator.log');if($LASTEXITCODE){throw 'Repository validator failed'}
          $py=@('Tools/EngineSimVendor/generate_cold_start_profile_header.py','Tools/EngineSimVendor/record_cold_start_calibration_evidence.py','Tools/EngineSimVendor/run_cold_start_calibration.py','Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py','Tools/EngineSimVendor/verify_cold_start_profile.py')
          python -B -m py_compile @py 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'py-compile.log');if($LASTEXITCODE){throw 'py_compile failed'}
          python -B -m unittest discover -s Tools/EngineSimVendor/tests -p test_*.py -v 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'python-tests.log');if($LASTEXITCODE){throw 'Python tests failed'}
          python -B Tools/EngineSimVendor/run_cold_start_calibration.py self-test 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'cold-start-orchestrator.log');if($LASTEXITCODE){throw 'Cold-start self-test failed'}
          python -B Tools/EngineSimVendor/verify_cold_start_profile.py --profile Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json --repo-root . 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'profile-verifier.log');if($LASTEXITCODE){throw 'Profile verifier failed'}
          $profileGen=Join-Path $env:RUNNER_TEMP 'SubaruEJ25ColdStartProfile.generated.h'
