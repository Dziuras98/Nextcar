            foreach($x in @(@('discovery-script-error.txt',$diagText),@('cmake-discovery.log',$diagText),@('cmake-first-error.txt',$er.Exception.ToString()),@('msvc-discovery.log',$diagText),@('msvc-first-error.txt',$er.Exception.ToString()))){try{Text $x[0] $x[1]}catch{Write-Warning $_}}
            $cm=[ordered]@{status='FAIL';classification='DISCOVERY_SCRIPT_DEFECT';first_error=$er.Exception.ToString();selected=$null;attempts=@()};$ms=[ordered]@{status='FAIL';classification='DISCOVERY_SCRIPT_DEFECT';first_error=$er.Exception.ToString()};try{Json 'cmake-discovery.json' $cm}catch{Write-Warning $_};try{Json 'msvc-discovery.json' $ms}catch{Write-Warning $_}
          }
          try{$c=Get-Content (Join-Path $root 'cmake-discovery.json') -Raw|ConvertFrom-Json;$m=Get-Content (Join-Path $root 'msvc-discovery.json') -Raw|ConvertFrom-Json;if($c.classification-eq'DISCOVERY_SCRIPT_DEFECT'-or$m.classification-eq'DISCOVERY_SCRIPT_DEFECT'){$class='STOP — TOOLCHAIN DISCOVERY SCRIPT DEFECT'}elseif($c.status-eq'PASS'-and$m.status-eq'PASS'){$class='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS'}elseif($c.classification-eq'CMAKE_NOT_FOUND'){$class='STOP — SELF-HOSTED WINDOWS CMAKE TOOLCHAIN UNAVAILABLE'}elseif($c.status-ne'PASS'){$class='STOP — SELF-HOSTED WINDOWS CMAKE TOOLCHAIN INCOMPLETE'}else{$class='STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE'}}catch{$class='STOP — TOOLCHAIN DISCOVERY SCRIPT DEFECT'};Text 'classification.txt' $class;Write-Host $class
