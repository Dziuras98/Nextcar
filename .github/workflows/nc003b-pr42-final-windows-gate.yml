          python -B Tools/EngineSimVendor/tests/test_subaru_ej25_fixture_verifier.py 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'fixture-tests.log');if($LASTEXITCODE){throw 'Fixture mutation tests failed'}
          python -B Tools/EngineSimVendor/verify_subaru_ej25_fixture.py 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'fixture-parity.log');if($LASTEXITCODE){throw 'Subaru parity failed'}
          python -B Tools/EngineSimVendor/tests/test_impulse_response_tools.py 2>&1|Tee-Object -FilePath (Join-Path $env:EVIDENCE_ROOT 'ir-tests.log');if($LASTEXITCODE){throw 'IR tests failed'}
          $wav='Plugins/NextcarEngineSim/Source/ThirdParty/EngineSim/upstream/engine-sim/es/sound-library/new/minimal_muffling_02.wav'
          $hdr='Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/MinimalMuffling02ImpulseResponse.generated.h'
