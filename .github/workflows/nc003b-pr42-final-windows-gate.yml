          function W($p,$v){[IO.File]::WriteAllText($p,[string]$v,$utf8)}
          function ErrorRecord($er){[ordered]@{timestamp_utc=[DateTime]::UtcNow.ToString('o');exception_type=$er.Exception.GetType().FullName;exception_message=$er.Exception.Message;exception_to_string=$er.Exception.ToString();script_stack_trace=$er.ScriptStackTrace;position_message=$er.InvocationInfo.PositionMessage;fully_qualified_error_id=$er.FullyQualifiedErrorId;category_info=[string]$er.CategoryInfo}}
          try {
