          CMAKE_EXE: ${{ needs.self-hosted-preflight.outputs.cmake_exe }}
          CTEST_EXE: ${{ needs.self-hosted-preflight.outputs.ctest_exe }}
          GATE_RESULT: ${{ needs.final-windows-gate.result }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,os,urllib.request
          cr=os.environ.get('CONTROL_RESULT','');cu=os.environ.get('CONTROL_UPLOAD','');sr=os.environ.get('SELF_RESULT','');su=os.environ.get('SELF_UPLOAD','');cm=os.environ.get('CMAKE_EXE','');ct=os.environ.get('CTEST_EXE','');gr=os.environ.get('GATE_RESULT','')
          if cr=='success' and cu=='success' and sr=='success' and su=='success' and cm and ct and gr=='success': state='success';description='Final self-hosted Windows validation and evidence upload passed'
