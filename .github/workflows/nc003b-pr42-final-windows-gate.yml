          if($LASTEXITCODE){throw 'Matrix wrapper failed'}
          "MATRIX_ROOT=$matrix"|Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          Get-ChildItem -LiteralPath $matrix -Recurse -File|ForEach-Object FullName|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'matrix-file-tree.txt')
          $names=@('cmake-configure.log','msvc-release.log','msvc-debug-rtc1.log','msvc-asan.log','ctest.log','direct-runtime.log','cold-start-runtime.log','boundary-scan.log','clean-reproducibility.log')
          foreach($name in $names){$matches=@(Get-ChildItem -LiteralPath $matrix -Recurse -File -Filter $name -ErrorAction SilentlyContinue);if($matches.Count-ne1){throw "Expected one '$name'; found $($matches.Count)"};Copy-Item $matches[0].FullName (Join-Path $env:EVIDENCE_ROOT $name)}
          Copy-Item (Join-Path $matrix 'validation-status.json') (Join-Path $env:EVIDENCE_ROOT 'validation-status.json') -Force
          @("STEP_BODY_EXECUTED=validation-matrix","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'runtime-markers-validation-matrix.txt')

      - name: Junction cleanup and immutable-state proof
        if: always()
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Continue'
          Write-Host "STEP_BODY_EXECUTED=cleanup"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $E=$env:EVIDENCE_ROOT;$c=@()
          if($env:CHECKOUT_ROOT-and(Test-Path $env:CHECKOUT_ROOT)){
            Set-Location $env:CHECKOUT_ROOT
            $j=Join-Path $env:CHECKOUT_ROOT 'Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_calibration'
            if(Test-Path $j){cmd /c "rmdir `"$j`"";$c+='junction cleanup: PASS'}else{$c+='junction cleanup: not required'}
            $c+="junction exists after cleanup: $(Test-Path $j)"
            $c+="tracked deletions: $(@(git ls-files --deleted).Count)"
            $c+="staged changes: $(@(git diff --cached --name-only).Count)"
            git status --porcelain|Set-Content -Encoding utf8 (Join-Path $E 'final-git-status.txt')
            $c+=if(git status --porcelain){'working tree clean: FAIL'}else{'working tree clean: PASS'}
            $c+=if((git rev-parse HEAD).Trim()-eq$env:CANDIDATE_SHA){'HEAD unchanged: PASS'}else{'HEAD unchanged: FAIL'}
            $c+=if((git rev-parse 'HEAD^{tree}').Trim()-eq$env:CANDIDATE_TREE){'tree unchanged: PASS'}else{'tree unchanged: FAIL'}
          }
          git config --global --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'global-git-config-after.txt')
          git config --system --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'system-git-config-after.txt')
          $c+="global config unchanged: $((Get-FileHash (Join-Path $E 'global-git-config-before.txt')).Hash-eq(Get-FileHash (Join-Path $E 'global-git-config-after.txt')).Hash)"
          $c+="system config unchanged: $((Get-FileHash (Join-Path $E 'system-git-config-before.txt')).Hash-eq(Get-FileHash (Join-Path $E 'system-git-config-after.txt')).Hash)"
          $c|Set-Content -Encoding utf8 (Join-Path $E 'cleanup.log')
          @("STEP_BODY_EXECUTED=cleanup","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $E 'runtime-markers-cleanup.txt')
          if(-not(Test-Path (Join-Path $E 'first-error.txt'))){if('${{ job.status }}'-eq'success'){'none'}else{'See failing step logs.'}|Set-Content -Encoding utf8 (Join-Path $E 'first-error.txt')}

      - name: Seal and verify complete evidence
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop'
          Write-Host "STEP_BODY_EXECUTED=evidence-seal"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          $E=$env:EVIDENCE_ROOT
          @("STEP_BODY_EXECUTED=evidence-seal","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $E 'runtime-markers-evidence-seal.txt')
          $required=@('runner-proof.json','toolchain-versions.json','global-git-config-before.txt','global-git-config-after.txt','system-git-config-before.txt','system-git-config-after.txt','git-topology.txt','scope-base-source.txt','scope-source-final.txt','scope-name-status.txt','scope-stat.txt','git-diff-check.txt','artifact-source-metadata.json','trace-verification.json','repository-validator.log','py-compile.log','python-tests.log','cold-start-orchestrator.log','profile-verifier.log','profile-generator.log','snapshot-verifier.log','snapshot-tests.log','fixture-tests.log','fixture-parity.log','ir-tests.log','ir-verifier.log','ir-generator.log','powershell-ast.log','matrix-file-tree.txt','cmake-configure.log','msvc-release.log','msvc-debug-rtc1.log','msvc-asan.log','ctest.log','direct-runtime.log','cold-start-runtime.log','boundary-scan.log','clean-reproducibility.log','cleanup.log','final-git-status.txt','validation-status.json','first-error.txt','runtime-markers-runner-proof.txt','runtime-markers-checkout.txt','runtime-markers-topology.txt','runtime-markers-p1.txt','runtime-markers-validation-matrix.txt','runtime-markers-cleanup.txt','runtime-markers-evidence-seal.txt')
          $missing=@($required|Where-Object{-not(Test-Path (Join-Path $E $_) -PathType Leaf)})
          if($missing){$missing|Set-Content -Encoding utf8 (Join-Path $E 'evidence-missing.txt');throw "Missing evidence: $($missing-join', ')"}
          foreach($n in $required|Where-Object{$_-notin@('git-diff-check.txt','final-git-status.txt')}){if((Get-Item (Join-Path $E $n)).Length-le0){throw "Empty evidence: $n"}}
          $r=Get-Content (Join-Path $E 'runner-proof.json') -Raw|ConvertFrom-Json;if($r.runner_name-ne'DESKTOP-P4CTGHS'-or$r.runner_os-ne'Windows'-or$r.runner_arch-ne'X64'-or$r.effective_policy-ne'Bypass'){throw 'Runner semantic seal failed'}
          $a=Get-Content (Join-Path $E 'artifact-source-metadata.json') -Raw|ConvertFrom-Json;if($a.source_run-ne29814599329-or$a.artifact_id-ne8488882253-or$a.zip_size-ne211595-or$a.members-ne41-or$a.manifest_pass-ne'40/40'-or$a.total-ne'12/12'){throw 'P1 semantic seal failed'}
          $t=Get-Content (Join-Path $E 'trace-verification.json') -Raw|ConvertFrom-Json;if($t.result-ne'PASS'-or@($t.records).Count-ne12){throw 'Trace semantic seal failed'}
          $s=Get-Content (Join-Path $E 'validation-status.json') -Raw|ConvertFrom-Json
          foreach($k in @('status','release_result','debug_result','asan_result','timeout_result','stall_result','clean_reproducibility')){if($s.$k-ne'PASS'){throw "Validation $k failed"}}
          if($s.selected_trials_result-ne'10/10 PASS'-or[int]$s.project_warning_count-ne0){throw 'Validation semantic seal failed'}
          $cl=Get-Content (Join-Path $E 'cleanup.log') -Raw
          foreach($x in @('junction cleanup: PASS','junction exists after cleanup: False','tracked deletions: 0','staged changes: 0','working tree clean: PASS','HEAD unchanged: PASS','tree unchanged: PASS','global config unchanged: True','system config unchanged: True')){if($cl-notmatch[regex]::Escape($x)){throw "Cleanup semantic seal missing: $x"}}
          $seal=[ordered]@{status='PASS';required_files=$required.Count;actual_files_excluding_manifest=0;manifest_entries=0;missing_files=@();duplicate_paths=0;run_id=[long]$env:GITHUB_RUN_ID;run_attempt=[int]$env:GITHUB_RUN_ATTEMPT;candidate_sha=$env:CANDIDATE_SHA}
          $seal|ConvertTo-Json -Depth 5|Set-Content -Encoding utf8 (Join-Path $E 'evidence-seal.json')
          @'
          import hashlib,json,os
          from pathlib import Path,PurePosixPath
          root=Path(os.environ['EVIDENCE_ROOT'])
          def build():
              files=sorted(p for p in root.rglob('*') if p.is_file() and p.name!='hash-manifest.json')
              rows=[];seen=set()
              for p in files:
                  rel=p.relative_to(root).as_posix();q=PurePosixPath(rel)
                  assert not q.is_absolute() and '..' not in q.parts and rel not in seen
                  seen.add(rel);b=p.read_bytes();rows.append({'path':rel,'size':len(b),'sha256':hashlib.sha256(b).hexdigest()})
              (root/'hash-manifest.json').write_text(json.dumps(rows,indent=2,sort_keys=True)+'\n',encoding='utf-8')
              return files,rows
          files,rows=build()
          seal=json.loads((root/'evidence-seal.json').read_text('utf-8-sig'))
          seal['actual_files_excluding_manifest']=len(files);seal['manifest_entries']=len(rows)
          (root/'evidence-seal.json').write_text(json.dumps(seal,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          files,rows=build();assert len(rows)==len(files)==len({r['path'] for r in rows})
          for row in rows:
              b=(root/row['path']).read_bytes();assert len(b)==row['size'] and hashlib.sha256(b).hexdigest()==row['sha256']
          '@|python -
          if($LASTEXITCODE){throw 'Hash manifest self-verification failed'}

      - name: Build and self-verify deterministic evidence ZIP
        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
        run: |
          $ErrorActionPreference='Stop'
          Write-Host "STEP_BODY_EXECUTED=package-creation"
          Write-Host "STEP_SCRIPT=$PSCommandPath"
          Write-Host "STEP_POLICY=$(Get-ExecutionPolicy)"
          @("STEP_BODY_EXECUTED=package-creation","STEP_SCRIPT=$PSCommandPath","STEP_POLICY=$(Get-ExecutionPolicy)")|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'runtime-markers-package-creation.txt')
          if(Test-Path $env:PACKAGE_ROOT){throw "Unique package root exists: $env:PACKAGE_ROOT"}
          @'
          import hashlib,json,os
          from pathlib import Path,PurePosixPath,PureWindowsPath
          from zipfile import ZIP_DEFLATED,ZipFile,ZipInfo
          source=Path(os.environ['EVIDENCE_ROOT']);target=Path(os.environ['PACKAGE_ROOT'])/'evidence.zip';target.parent.mkdir(parents=True,exist_ok=False)
          files=sorted(p for p in source.rglob('*') if p.is_file());names=[p.relative_to(source).as_posix() for p in files];assert len(names)==len(set(names))
          with ZipFile(target,'w',compression=ZIP_DEFLATED,compresslevel=9) as archive:
              for path,relative in zip(files,names):
                  q=PurePosixPath(relative);w=PureWindowsPath(relative);assert relative and not q.is_absolute() and not w.is_absolute() and not w.drive and '..' not in q.parts
                  info=ZipInfo(relative);info.date_time=(1980,1,1,0,0,0);info.compress_type=ZIP_DEFLATED;info.external_attr=0o100644<<16;info.flag_bits|=0x800
                  archive.writestr(info,path.read_bytes(),compress_type=ZIP_DEFLATED,compresslevel=9)
          with ZipFile(target) as archive:
              infos=archive.infolist();got=[i.filename for i in infos];assert got==names and len(got)==len(set(got))==len(files)
              manifest=json.loads(archive.read('hash-manifest.json').decode('utf-8'));assert len(manifest)==len(got)-1
              for row in manifest:
                  b=archive.read(row['path']);assert len(b)==row['size'] and hashlib.sha256(b).hexdigest()==row['sha256']
              seal=json.loads(archive.read('evidence-seal.json').decode('utf-8-sig'));status=json.loads(archive.read('validation-status.json').decode('utf-8-sig'));runner=json.loads(archive.read('runner-proof.json').decode('utf-8-sig'));art=json.loads(archive.read('artifact-source-metadata.json').decode('utf-8-sig'));traces=json.loads(archive.read('trace-verification.json').decode('utf-8-sig'))
              assert seal['status']=='PASS' and status['status']=='PASS' and runner['runner_name']=='DESKTOP-P4CTGHS' and art['manifest_pass']=='40/40' and art['total']=='12/12' and traces['result']=='PASS'
          data=target.read_bytes();print(f'EVIDENCE_ZIP_SIZE={len(data)}');print(f'EVIDENCE_ZIP_SHA256={hashlib.sha256(data).hexdigest()}');print(f'EVIDENCE_ZIP_MEMBERS={len(names)}')
          '@|python -
          if($LASTEXITCODE){throw 'Deterministic evidence ZIP verification failed'}

      - name: Upload final evidence package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-PR42-final-self-hosted-windows-gate-${{ github.run_id }}-1b2bc3599a0811be88a3b55987a4d27c72672a46
          path: ${{ github.workspace }}\_nc003b_pr42_package_${{ github.run_id }}_${{ github.run_attempt }}\evidence.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish-final-status:
    name: "Publish PR #42 final gate status"
    needs:
      - announce-run
      - control-artifact-probe
      - self-hosted-preflight
      - final-windows-gate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish terminal candidate status
        env:
          GH_TOKEN: ${{ github.token }}
          CONTROL_RESULT: ${{ needs.control-artifact-probe.result }}
          CONTROL_UPLOAD: ${{ needs.control-artifact-probe.outputs.upload_outcome }}
          SELF_RESULT: ${{ needs.self-hosted-preflight.result }}
          SELF_UPLOAD: ${{ needs.self-hosted-preflight.outputs.upload_outcome }}
          GATE_RESULT: ${{ needs.final-windows-gate.result }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.request
          control_result=os.environ.get('CONTROL_RESULT','')
          control_upload=os.environ.get('CONTROL_UPLOAD','')
          self_result=os.environ.get('SELF_RESULT','')
          self_upload=os.environ.get('SELF_UPLOAD','')
          gate_result=os.environ.get('GATE_RESULT','')
          if control_result=='success' and control_upload=='success' and self_result=='success' and self_upload=='success' and gate_result=='success':
              state='success';description='Final self-hosted Windows validation and evidence upload passed'
          elif self_result=='failure' and not self_upload:
              state='failure';description='Process-scoped PowerShell bypass or side-effect preflight failed'
          elif self_upload!='success':
              state='failure';description='Self-hosted artifact upload failed after file proof'
          elif control_upload!='success':
              state='failure';description='GitHub-hosted artifact control upload failed'
          else:
              state='failure';description='Final self-hosted Windows exact-head validation failed'
          body=json.dumps({'state':state,'context':os.environ['STATUS_CONTEXT'],'description':description,'target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode('utf-8')
          req=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=body,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(req) as response:
              assert response.status==201
          PY
