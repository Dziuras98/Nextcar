        shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $state=if('${{ job.status }}'-eq'success'){'success'}else{'failure'}
          $description=if($state-eq'success'){'Final self-hosted Windows validation and evidence upload passed'}elseif('${{ steps.upload-probe.outcome }}'-eq'failure'){'GitHub Actions artifact service unavailable'}else{'Final Windows evidence publication failed'}
          $body=@{state=$state;context=$env:STATUS_CONTEXT;description=$description;target_url="https://github.com/Dziuras98/Nextcar/actions/runs/$env:GITHUB_RUN_ID"}|ConvertTo-Json
          Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/Dziuras98/Nextcar/statuses/$env:CANDIDATE_SHA" -Headers @{Authorization="Bearer $env:GH_TOKEN";Accept='application/vnd.github+json';'X-GitHub-Api-Version'='2022-11-28'} -ContentType application/json -Body $body|Out-Null
