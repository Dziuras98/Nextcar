          if((Get-FileHash $gen).Hash-ne(Get-FileHash $hdr).Hash){throw 'IR determinism failed'}
          $tokens=$null;$errors=$null;[Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'Tools/EngineSimVendor/validate_cold_start_windows.ps1'),[ref]$tokens,[ref]$errors)|Out-Null
          $errors|Out-String|Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE_ROOT 'powershell-ast.log');if($errors.Count){throw 'PowerShell AST failed'}
          $summary=Get-Content (Join-Path $env:P1_EXTRACTED 'selected-calibration\selected-summary.json') -Raw|ConvertFrom-Json
          $selected=Join-Path $env:RUNNER_TEMP 'selected-candidate-input.json'
          [ordered]@{schema_version=$summary.schema_version;candidate_source_sha=$summary.candidate_source_sha;selected_candidate=$summary.selected_candidate}|ConvertTo-Json -Depth 20|Set-Content -Encoding utf8 $selected
          $matrix=Join-Path $env:RUNNER_TEMP "nc003b-pr42-matrix-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
