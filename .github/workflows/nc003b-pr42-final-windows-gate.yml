      - name: Upload independent verification artifact
        id: verification-upload
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-toolchain-discovery-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification-report
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
      - name: Publish terminal status
        id: terminal-status
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          TERMINAL: ${{ steps.verify.outputs.terminal_classification }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          VUPLOAD_OUTCOME: ${{ steps.verification-upload.outcome }}
          VUPLOAD_ID: ${{ steps.verification-upload.outputs.artifact-id }}
          VUPLOAD_DIGEST: ${{ steps.verification-upload.outputs.artifact-digest }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json,os,urllib.request
          ok=os.environ['TERMINAL']=='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS' and os.environ['VERIFY_OUTCOME']=='success' and os.environ['VUPLOAD_OUTCOME']=='success' and bool(os.environ['VUPLOAD_ID']) and bool(os.environ['VUPLOAD_DIGEST']);state='success' if ok else 'failure';desc=(os.environ['TERMINAL'] or 'STOP — TOOLCHAIN DISCOVERY EVIDENCE VERIFICATION FAILED').replace('—','-')[:140]
          b=json.dumps({'state':state,'context':os.environ['STATUS_CONTEXT'],'description':desc,'target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode();q=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=b,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(q) as r:assert r.status==201
          PY
      - name: Final enforcement
        if: always()
        env:
          TERMINAL: ${{ steps.verify.outputs.terminal_classification }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          VUPLOAD_OUTCOME: ${{ steps.verification-upload.outcome }}
          VUPLOAD_ID: ${{ steps.verification-upload.outputs.artifact-id }}
          VUPLOAD_URL: ${{ steps.verification-upload.outputs.artifact-url }}
