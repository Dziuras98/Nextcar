          } finally {
            try{$fb=[ordered]@{status=$seal;classification=$class;package_mode=$mode;run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;timestamp_utc=[DateTime]::UtcNow.ToString('o')};W (Join-Path $upload 'publication-fallback.json') ($fb|ConvertTo-Json -Depth 8);W (Join-Path $upload 'publication-fallback.txt') $class;Copy-Item (Join-Path $root 'seal-first-error.txt') $upload -Force -ErrorAction SilentlyContinue}catch{Write-Warning $_}
            "seal_status=$seal"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"package_mode=$mode"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_name=$zipName"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_sha256=$zipHash"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_size=$zipSize"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"discovery_classification=$class"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
