        with:
          name: NC-003B-toolchain-discovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.UPLOAD_ROOT }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
  verify-discovery-artifact:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [announce-run, control-artifact-probe, self-hosted-toolchain-discovery]
    outputs:
      terminal-classification: ${{ steps.verify.outputs.terminal_classification }}
      verification-first-error: ${{ steps.verify.outputs.verification_first_error }}
      api-artifact-id: ${{ steps.verify.outputs.api_artifact_id }}
      api-artifact-name: ${{ steps.verify.outputs.api_artifact_name }}
      api-artifact-digest: ${{ steps.verify.outputs.api_artifact_digest }}
      api-visible: ${{ steps.verify.outputs.api_visible }}
      download-status: ${{ steps.verify.outputs.download_status }}
      digest-status: ${{ steps.verify.outputs.digest_status }}
      manifest-status: ${{ steps.verify.outputs.manifest_status }}
      verification-upload-outcome: ${{ steps.verification-upload.outcome }}
      verification-artifact-id: ${{ steps.verification-upload.outputs.artifact-id }}
      verification-artifact-digest: ${{ steps.verification-upload.outputs.artifact-digest }}
    steps:
      - name: Initialize verification report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verification-report
          printf '%s\n' 'STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED' > verification-report/terminal-classification.txt
          printf '%s\n' '{"result":"NOT_COMPLETED","terminal_classification":"STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED"}' > verification-report/artifact-verification.json
          printf '%s\n' '[]' > verification-report/artifact-api-response.json
          printf '%s\n' 'NOT_COMPLETED' > verification-report/manifest-verification.txt
      - name: Poll API, download, and independently verify discovery artifact
        id: verify
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_NAME: NC-003B-toolchain-discovery-${{ github.run_id }}-${{ github.run_attempt }}
          UPLOAD_OUTCOME: ${{ needs.self-hosted-toolchain-discovery.outputs.upload-outcome }}
          UPLOAD_ID: ${{ needs.self-hosted-toolchain-discovery.outputs.artifact-id }}
          UPLOAD_DIGEST: ${{ needs.self-hosted-toolchain-discovery.outputs.artifact-digest }}
          LOCAL_NAME: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-name }}
          LOCAL_HASH: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-sha256 }}
          LOCAL_SIZE: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-size }}
          DISCOVERY_CLASS: ${{ needs.self-hosted-toolchain-discovery.outputs.discovery-classification }}
          SEAL_STATUS: ${{ needs.self-hosted-toolchain-discovery.outputs.seal-status }}
          PACKAGE_MODE: ${{ needs.self-hosted-toolchain-discovery.outputs.package-mode }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib,json,os,pathlib,re,sys,time,urllib.request,zipfile
          out=pathlib.Path('verification-report');terminal='STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED';first='';api_visible=download=digest=manifest='FAIL';artifact=None;poll=[]
          def w(n,v):(out/n).write_text(json.dumps(v,indent=2,sort_keys=True) if isinstance(v,(dict,list)) else str(v),encoding='utf-8')
          def emit(k,v):
            with open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8') as f:f.write(f'{k}={v}\n')
          def norm(v):
            v=(v or '').strip().lower();v=v[7:] if v.startswith('sha256:') else v
            if not re.fullmatch(r'[0-9a-f]{64}',v):raise ValueError(f'invalid SHA-256: {v!r}')
            return v
          try:
            vals={k:os.environ.get(k,'') for k in ['EXPECTED_NAME','UPLOAD_OUTCOME','UPLOAD_ID','UPLOAD_DIGEST','LOCAL_NAME','LOCAL_HASH','LOCAL_SIZE','DISCOVERY_CLASS','SEAL_STATUS','PACKAGE_MODE']}
            for k in ['EXPECTED_NAME','UPLOAD_OUTCOME','UPLOAD_ID','UPLOAD_DIGEST','DISCOVERY_CLASS','SEAL_STATUS','PACKAGE_MODE']:
              if not vals[k].strip():raise RuntimeError(f'empty output {k}')
            if vals['UPLOAD_OUTCOME']!='success':raise RuntimeError(f"upload outcome {vals['UPLOAD_OUTCOME']}")
            h={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'};url=f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}/artifacts?per_page=100"
            for i in range(6):
              with urllib.request.urlopen(urllib.request.Request(url,headers=h)) as r:p=json.loads(r.read())
              matches=[a for a in p.get('artifacts',[]) if a.get('name')==vals['EXPECTED_NAME']];poll.append({'attempt':i+1,'matching_count':len(matches),'response':p})
              if len(matches)==1:artifact=matches[0];break
              if i<5:time.sleep(5)
            w('artifact-api-response.json',poll)
            if artifact is None:raise RuntimeError('artifact not uniquely visible');api_visible='PASS'
            with urllib.request.urlopen(urllib.request.Request(f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/artifacts/{artifact['id']}/zip",headers=h)) as r:data=r.read()
            if not data:raise RuntimeError('artifact download empty');download='PASS';outer=hashlib.sha256(data).hexdigest()
            if norm(artifact.get('digest'))!=norm(vals['UPLOAD_DIGEST']) or outer!=norm(vals['UPLOAD_DIGEST']):raise RuntimeError('outer artifact digest mismatch');digest='PASS'
            pathlib.Path('outer.zip').write_bytes(data);pathlib.Path('outer').mkdir(exist_ok=True)
            with zipfile.ZipFile('outer.zip') as z:names=[x.filename for x in z.infolist() if not x.is_dir()];z.extractall('outer')
            w('artifact-file-list.txt','\n'.join(names)+'\n')
            if vals['PACKAGE_MODE']=='sealed':
              if vals['SEAL_STATUS']!='PASS' or vals['LOCAL_NAME'] not in names:raise RuntimeError('sealed package contract failed')
              local=pathlib.Path('outer')/vals['LOCAL_NAME'];ld=local.read_bytes()
              if hashlib.sha256(ld).hexdigest()!=norm(vals['LOCAL_HASH']) or len(ld)!=int(vals['LOCAL_SIZE']):raise RuntimeError('inner ZIP digest or size mismatch')
              pathlib.Path('evidence').mkdir(exist_ok=True)
              with zipfile.ZipFile(local) as z:z.extractall('evidence')
              root=pathlib.Path('evidence');mf=json.loads((root/'evidence-file-manifest.json').read_text(encoding='utf-8-sig'));lines=[]
              for e in mf['files']:
                p=root/e['relative_path'];ok=p.is_file() and p.stat().st_size==int(e['size']) and hashlib.sha256(p.read_bytes()).hexdigest()==e['sha256'];lines.append(f"{'PASS' if ok else 'FAIL'} {e['relative_path']}")
                if not ok:raise RuntimeError(f"manifest failure {e['relative_path']}")
              w('manifest-verification.txt','\n'.join(lines)+'\n');manifest='PASS'
              text=lambda n:(root/n).read_text(encoding='utf-8-sig').strip()
              if text('candidate-checkout.txt')!='CANDIDATE NOT CHECKED OUT':raise RuntimeError('candidate checkout marker mismatch')
              if vals['DISCOVERY_CLASS']=='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS':terminal=vals['DISCOVERY_CLASS']
              else:terminal=vals['DISCOVERY_CLASS']
            else:
              if not any(n.endswith('publication-fallback.json') for n in names):raise RuntimeError('fallback publication sentinel absent')
              raise RuntimeError('fallback evidence published; sealed evidence unavailable')
            w('artifact-verification.json',{'result':'PASS','terminal_classification':terminal,'artifact':artifact,'outputs':vals,'api_visible':api_visible,'download':download,'digest':digest,'manifest':manifest})
            emit('api_artifact_id',artifact['id']);emit('api_artifact_name',artifact['name']);emit('api_artifact_digest',artifact.get('digest',''))
          except Exception as e:
            first=str(e);print(first,file=sys.stderr)
            if not (out/'artifact-api-response.json').exists():w('artifact-api-response.json',poll)
            if not (out/'manifest-verification.txt').exists():w('manifest-verification.txt',f'FAIL {first}\n')
            w('artifact-verification.json',{'result':'FAIL','terminal_classification':terminal,'first_error':first,'artifact':artifact,'api_visible':api_visible,'download':download,'digest':digest,'manifest':manifest,'available_outputs':{k:os.environ.get(k,'') for k in ['EXPECTED_NAME','UPLOAD_OUTCOME','UPLOAD_ID','UPLOAD_DIGEST','LOCAL_NAME','LOCAL_HASH','LOCAL_SIZE','DISCOVERY_CLASS','SEAL_STATUS','PACKAGE_MODE']}})
          finally:
            w('terminal-classification.txt',terminal+'\n');emit('terminal_classification',terminal);emit('verification_first_error',first.replace('\n',' ')[:800]);emit('api_visible',api_visible);emit('download_status',download);emit('digest_status',digest);emit('manifest_status',manifest)
          PY
      - name: Upload independent verification artifact
        id: verification-upload
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-toolchain-discovery-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification-report
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
  terminalize-discovery:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [announce-run, control-artifact-probe, self-hosted-toolchain-discovery, verify-discovery-artifact]
    steps:
      - name: Publish terminal status
        id: terminal-status
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DISCOVERY_CLASS: ${{ needs.self-hosted-toolchain-discovery.outputs.discovery-classification }}
          SEAL_STATUS: ${{ needs.self-hosted-toolchain-discovery.outputs.seal-status }}
          UPLOAD_OUTCOME: ${{ needs.self-hosted-toolchain-discovery.outputs.upload-outcome }}
          API_VISIBLE: ${{ needs.verify-discovery-artifact.outputs.api-visible }}
          DOWNLOAD_STATUS: ${{ needs.verify-discovery-artifact.outputs.download-status }}
          DIGEST_STATUS: ${{ needs.verify-discovery-artifact.outputs.digest-status }}
          MANIFEST_STATUS: ${{ needs.verify-discovery-artifact.outputs.manifest-status }}
          VERIFY_UPLOAD_OUTCOME: ${{ needs.verify-discovery-artifact.outputs.verification-upload-outcome }}
          VERIFY_ARTIFACT_ID: ${{ needs.verify-discovery-artifact.outputs.verification-artifact-id }}
          VERIFY_ARTIFACT_DIGEST: ${{ needs.verify-discovery-artifact.outputs.verification-artifact-digest }}
          TERMINAL_CLASS: ${{ needs.verify-discovery-artifact.outputs.terminal-classification }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json,os,urllib.request
          full=(os.environ.get('DISCOVERY_CLASS')=='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS' and os.environ.get('SEAL_STATUS')=='PASS' and os.environ.get('UPLOAD_OUTCOME')=='success' and os.environ.get('API_VISIBLE')=='PASS' and os.environ.get('DOWNLOAD_STATUS')=='PASS' and os.environ.get('DIGEST_STATUS')=='PASS' and os.environ.get('MANIFEST_STATUS')=='PASS' and os.environ.get('VERIFY_UPLOAD_OUTCOME')=='success' and bool(os.environ.get('VERIFY_ARTIFACT_ID')) and bool(os.environ.get('VERIFY_ARTIFACT_DIGEST')) and os.environ.get('TERMINAL_CLASS')=='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS')
          state='success' if full else 'failure';desc=('SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS' if full else (os.environ.get('TERMINAL_CLASS') or os.environ.get('DISCOVERY_CLASS') or 'STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED')).replace('—','-')[:140]
          b=json.dumps({'state':state,'context':os.environ['STATUS_CONTEXT'],'description':desc,'target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode();q=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=b,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(q) as r:assert r.status==201
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:f.write(f"terminal_state={state}\nterminal_description={desc}\n")
          PY
      - name: Final enforcement
        if: ${{ always() }}
        env:
          STATUS_OUTCOME: ${{ steps.terminal-status.outcome }}
          TERMINAL_STATE: ${{ steps.terminal-status.outputs.terminal_state }}
          TERMINAL_DESCRIPTION: ${{ steps.terminal-status.outputs.terminal_description }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$STATUS_OUTCOME" != success ]]; then echo 'Terminal status publication failed' >&2; exit 1; fi
          if [[ "$TERMINAL_STATE" != success ]]; then echo "${TERMINAL_DESCRIPTION:-STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED}" >&2; exit 1; fi
          echo 'SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS'
