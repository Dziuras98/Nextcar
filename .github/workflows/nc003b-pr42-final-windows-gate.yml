name: NC-003B canonical target workflow AST preflight
on:
  push:
    branches:
      - agent/nc-003b-pr42-final-windows-gate-bootstrap
    paths:
      - .github/workflows/nc003b-pr42-final-windows-gate.yml

permissions:
  contents: read
  statuses: write

env:
  SOURCE_COMMIT: 3fb790c4da74906007724e84ca6506a51af3e332
  SOURCE_BLOB: d5d5b1f5641d151d0e5d4b75499326d6c1fa5cae
  SOURCE_PATH: .github/workflows/nc003b-pr42-final-windows-gate.yml
  STATUS_CONTEXT: NC-003B Bootstrap / Canonical target AST preflight
  TARGET_CARRIER_COMMIT: 6d2a07a561d90624480193280ff633fc8728320f
  TARGET_CARRIER_BLOB: 7dc3494afc07de9ba7b283f0aa3c410f3bcae5bf
  TARGET_CARRIER_PATH: .github/workflows/nc003b-pr42-final-windows-gate.yml

jobs:
  announce-run:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json,os,urllib.request
          p=json.dumps({"state":"pending","context":os.environ["STATUS_CONTEXT"],"description":"Canonical target AST preflight running","target_url":f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode()
          r=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['GITHUB_SHA']}",data=p,method="POST",headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"})
          assert urllib.request.urlopen(r).status==201
          PY

  self-hosted-canonical-target-ast:
    needs: announce-run
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 25
    env:
      PSExecutionPolicyPreference: Bypass
      EVIDENCE_ROOT: ${{ github.workspace }}\_canonical_target_ast_${{ github.run_id }}_${{ github.run_attempt }}
    outputs:
      classification: ${{ steps.preflight.outputs.classification }}
      upload_outcome: ${{ steps.upload.outcome }}
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Materialize and parse canonical target
        id: preflight
        continue-on-error: true
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference='Stop'
          $failureClassification='STOP '+[char]0x2014+' CANONICAL TARGET WORKFLOW AST PREFLIGHT FAILED'
          $carrierFailure='STOP '+[char]0x2014+' IMMUTABLE TARGET CARRIER BASE64 IDENTITY FAILURE'
          $sealFailure='STOP '+[char]0x2014+' CANONICAL TARGET-SEAL IDENTITY MISMATCH'
          $astFailure='STOP '+[char]0x2014+' CANONICAL TARGET POWERSHELL AST PREFLIGHT FAILED'
          $root=$env:EVIDENCE_ROOT
          Remove-Item -LiteralPath $root -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $root|Out-Null
          $u=New-Object Text.UTF8Encoding($false)
          function W($n,$v){[IO.File]::WriteAllText((Join-Path $root $n),[string]$v,$u)}
          function H256([byte[]]$b){$h=[Security.Cryptography.SHA256]::Create();try{([BitConverter]::ToString($h.ComputeHash($b))).Replace('-','').ToLowerInvariant()}finally{$h.Dispose()}}
          function Blob([byte[]]$b){$p=[Text.Encoding]::ASCII.GetBytes("blob $($b.Length)`0");$o=New-Object byte[] ($p.Length+$b.Length);[Array]::Copy($p,0,$o,0,$p.Length);[Array]::Copy($b,0,$o,$p.Length,$b.Length);$h=[Security.Cryptography.SHA1]::Create();try{([BitConverter]::ToString($h.ComputeHash($o))).Replace('-','').ToLowerInvariant()}finally{$h.Dispose()}}
          function Stats([byte[]]$b){$lf=0;$crlf=0;for($i=0;$i-lt$b.Length;$i++){if($b[$i]-eq 10){$lf++;if($i-gt 0-and$b[$i-1]-eq 13){$crlf++}}};[ordered]@{size=$b.Length;sha256=H256 $b;git_blob=Blob $b;lf=$lf;crlf=$crlf;bom=($b.Length-ge 3-and$b[0]-eq239-and$b[1]-eq187-and$b[2]-eq191)}}
          function Extract([string]$text,[string]$name){$needle="      - name: $name`n";$s=$text.IndexOf($needle,[StringComparison]::Ordinal);if($s-lt 0){throw "step missing: $name"};$r=$text.IndexOf("        run: |`n",$s,[StringComparison]::Ordinal);if($r-lt 0){throw "run missing: $name"};$bs=$r+15;$e=$text.IndexOf("      - name: ",$bs,[StringComparison]::Ordinal);if($e-lt 0){throw "next step missing: $name"};$raw=$text.Substring($bs,$e-$bs);$lines=$raw-split"`n",-1;$out=New-Object Collections.Generic.List[string];foreach($line in $lines){if($line.StartsWith('          ')){$out.Add($line.Substring(10))}elseif($line-eq''){$out.Add('')}else{throw "indent mismatch: $name"}};$body=($out-join"`n");if($body.EndsWith("`n`n")){$body=$body.Substring(0,$body.Length-1)};return [Text.Encoding]::UTF8.GetBytes($body)}
          function ReplaceSeal([string]$text,[byte[]]$new){$needle="      - name: Seal and package discovery evidence`n";$s=$text.IndexOf($needle,[StringComparison]::Ordinal);$r=$text.IndexOf("        run: |`n",$s,[StringComparison]::Ordinal);$bs=$r+15;$e=$text.IndexOf("      - name: ",$bs,[StringComparison]::Ordinal);$body=[Text.Encoding]::UTF8.GetString($new);$parts=$body-split"`n",-1;$ind=(($parts|ForEach-Object{if($_.Length-gt 0){"          $_"}else{''}})-join"`n");return $text.Substring(0,$bs)+$ind+$text.Substring($e)}
          W 'classification.txt' $failureClassification;W 'preflight-first-error.txt' 'NOT_COMPLETED';W 'candidate-checkout.txt' 'CANDIDATE NOT CHECKED OUT';W 'run-id.txt' $env:GITHUB_RUN_ID;W 'run-attempt.txt' $env:GITHUB_RUN_ATTEMPT;W 'runner-name.txt' $env:RUNNER_NAME;W 'runner-os.txt' $env:RUNNER_OS;W 'runner-arch.txt' $env:RUNNER_ARCH
          try{
           $hdr=@{Authorization="Bearer $env:GH_TOKEN";Accept='application/vnd.github+json';'X-GitHub-Api-Version'='2022-11-28'}
           $cep=(([Environment]::GetEnvironmentVariable('TARGET_'+'CARRIER_PATH')-split'/')|%{[Uri]::EscapeDataString($_)})-join'/';$curi="https://api.github.com/repos/Dziuras98/Nextcar/contents/$cep`?ref=$([Environment]::GetEnvironmentVariable('TARGET_'+'CARRIER_COMMIT'))";$ca=Invoke-RestMethod -Uri $curi -Headers $hdr
           if([string]$ca.type-ne'file'-or[string]$ca.encoding-ne'base64'-or[string]$ca.sha-ne[Environment]::GetEnvironmentVariable('TARGET_'+'CARRIER_BLOB')-or[string]::IsNullOrWhiteSpace([string]$ca.content)){W 'classification.txt' $carrierFailure;throw 'parent carrier API identity failed'}
           [byte[]]$cb=[Convert]::FromBase64String(([string]$ca.content-replace'\s',''));[IO.File]::WriteAllBytes((Join-Path $root 'target-carrier-workflow.yml'),$cb);$ci=Stats $cb
           W 'target-carrier-identity.json' ($ci|ConvertTo-Json -Depth 8);W 'target-carrier-identity.txt' (($ci.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n")
           if($ci.git_blob-ne[Environment]::GetEnvironmentVariable('TARGET_'+'CARRIER_BLOB')){W 'classification.txt' $carrierFailure;throw 'parent carrier Git blob identity failed'}
           $ct=[Text.Encoding]::UTF8.GetString($cb);$carrierLines=$ct-split"`n",-1;$matches=@($carrierLines|?{$_.StartsWith(('  TARGET_'+'SEAL_B64: '))})
           if($matches.Count-ne1){W 'classification.txt' $carrierFailure;throw "parent carrier Base64 occurrence count failed: $($matches.Count)"}
           $canonicalBase64Text=$matches[0].Substring(19)
           $ascii=$true;foreach($ch in $canonicalBase64Text.ToCharArray()){if([int][char]$ch-gt127){$ascii=$false;break}}
           $grammar=($canonicalBase64Text-match'^[A-Za-z0-9+/=]+$')-and($canonicalBase64Text-notmatch'\s')-and(($canonicalBase64Text.Length%4)-eq0)
           [byte[]]$b64=[Text.Encoding]::ASCII.GetBytes($canonicalBase64Text);$b64sha=H256 $b64
           [IO.File]::WriteAllText((Join-Path $root 'target-seal-base64.txt'),$canonicalBase64Text+"`n",$u)
           $b64i=[ordered]@{occurrence_count=$matches.Count;ascii=$ascii;grammar=$grammar;character_length=$canonicalBase64Text.Length;ascii_sha256=$b64sha}
           W 'target-seal-base64-identity.json' ($b64i|ConvertTo-Json -Depth 8);W 'target-seal-base64-identity.txt' (($b64i.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n")
           if(-not$ascii-or-not$grammar-or$canonicalBase64Text.Length-ne10860-or$b64sha-ne'5406fc444df950f06e47eba792eb3f775e9b1029476e29fa22080d7c4ae4e62c'){W 'classification.txt' $carrierFailure;throw 'immutable target carrier Base64 identity failed'}
           [byte[]]$tseal=[Convert]::FromBase64String($canonicalBase64Text);[IO.File]::WriteAllBytes((Join-Path $root 'target-seal.ps1'),$tseal);$tsi=Stats $tseal
           $ep=(($env:SOURCE_PATH-split'/')|%{[Uri]::EscapeDataString($_)})-join'/';$uri="https://api.github.com/repos/Dziuras98/Nextcar/contents/$ep`?ref=$env:SOURCE_COMMIT";$a=Invoke-RestMethod -Uri $uri -Headers $hdr
           if([string]$a.type-ne'file'-or[string]$a.encoding-ne'base64'-or[string]$a.sha-ne$env:SOURCE_BLOB-or[string]::IsNullOrWhiteSpace([string]$a.content)){throw 'API source contract failed'}
           [byte[]]$sb=[Convert]::FromBase64String(([string]$a.content-replace'\s',''));[IO.File]::WriteAllBytes((Join-Path $root 'source-workflow.yml'),$sb);$si=Stats $sb
           if($si.size-ne40399-or$si.sha256-ne'9ecbd9a4f5ef4e879e14939884f33ea90c98abd43ed73f2a1a824f6355a27502'-or$si.git_blob-ne$env:SOURCE_BLOB-or$si.lf-ne317-or$si.crlf-ne0-or$si.bom){throw 'source workflow identity failed'}
           $st=[Text.Encoding]::UTF8.GetString($sb);$init=Extract $st 'Initialize evidence plane';$disc=Extract $st 'Discover and persist evidence';$sseal=Extract $st 'Seal and package discovery evidence'
           [IO.File]::WriteAllBytes((Join-Path $root 'source-initialize.ps1'),$init);[IO.File]::WriteAllBytes((Join-Path $root 'source-discovery.ps1'),$disc);[IO.File]::WriteAllBytes((Join-Path $root 'source-seal.ps1'),$sseal)
           if((H256 $init)-ne'b4196df2fba76e35addc63fd48c2a767780841a50e10e4dcc0d4f177b3873ef4'-or$init.Length-ne1862){throw 'source initialize identity failed'}
           if((H256 $disc)-ne'59c9181831328691cb9243b2945baf1a071e46284a9fac82052e9e1deb61f383'-or$disc.Length-ne15059){throw 'source discovery identity failed'}
           if((H256 $sseal)-ne'94cb35385fdaaae33058457d57e591d248eed7c939bdfadf1ef73fec72bc1f11'-or$sseal.Length-ne5721){throw 'source seal identity failed'}
           $expected=[ordered]@{size=8145;sha256='b6fde3fe21fb0960e262c01b288b0accb35c8e569d0ab96f5957f85ce74713b0';git_blob='edef58554833af35e5be499e6746033699b899b7';lf=159;crlf=0;bom=$false;base64_character_length=10860;base64_text_sha256='5406fc444df950f06e47eba792eb3f775e9b1029476e29fa22080d7c4ae4e62c'}
           $observed=[ordered]@{size=$tsi.size;sha256=$tsi.sha256;git_blob=$tsi.git_blob;lf=$tsi.lf;crlf=$tsi.crlf;bom=$tsi.bom;base64_character_length=$canonicalBase64Text.Length;base64_text_sha256=$b64sha}
           W 'target-seal-expected.json' ($expected|ConvertTo-Json -Depth 8);W 'target-seal-expected.txt' (($expected.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n")
           W 'target-seal-observed.json' ($observed|ConvertTo-Json -Depth 8);W 'target-seal-observed.txt' (($observed.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n")
           $mismatches=New-Object System.Collections.Generic.List[string]
           foreach($k in @('size','sha256','git_blob','lf','crlf','bom','base64_character_length','base64_text_sha256')){if([string]$expected[$k]-cne[string]$observed[$k]){$mismatches.Add("$k expected=$($expected[$k]) observed=$($observed[$k])")}}
           $mismatchReport=[ordered]@{mismatch_count=$mismatches.Count;mismatches=@($mismatches)}
           W 'target-seal-mismatch.json' ($mismatchReport|ConvertTo-Json -Depth 8);W 'target-seal-mismatch.txt' (("mismatch_count=$($mismatches.Count)`n")+($mismatches-join"`n"))
           if($mismatches.Count-ne0){W 'classification.txt' $sealFailure;throw ('target seal identity failed: '+($mismatches-join'; '))}
           $sourcePrefix=[byte[]]$sseal[0..719];$targetPrefix=[byte[]]$tseal[0..719];$prefixEqual=$true;$firstDifferingOffset=-1;for($i=0;$i-lt720;$i++){if($sourcePrefix[$i]-ne$targetPrefix[$i]){$prefixEqual=$false;$firstDifferingOffset=$i;break}}
           $prefixReport=[ordered]@{expected_length=720;source_length=$sseal.Length;target_length=$tseal.Length;source_prefix_sha256=H256 $sourcePrefix;target_prefix_sha256=H256 $targetPrefix;byte_equal=$prefixEqual;first_differing_offset=$firstDifferingOffset}
           W 'target-seal-prefix.json' ($prefixReport|ConvertTo-Json -Depth 8);W 'target-seal-prefix.txt' (($prefixReport.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n")
           if(-not$prefixEqual){W 'classification.txt' $sealFailure;throw 'preserved prefix failed'}
           $tt=ReplaceSeal $st $tseal;[byte[]]$tb=[Text.Encoding]::UTF8.GetBytes($tt);[IO.File]::WriteAllBytes((Join-Path $root 'target-workflow.yml'),$tb);$ti=Stats $tb
           if($ti.size-ne44153-or$ti.sha256-ne'b837b38b742a4dbb409e63f7020c2ae515ff3e130ca778d6e2496a311f543bb2'-or$ti.git_blob-ne'a14059e98d7942ce5dd35ca89154158102aa6db7'-or$ti.lf-ne457-or$ti.crlf-ne0-or$ti.bom){throw 'target workflow identity failed'}
           $tinit=Extract $tt 'Initialize evidence plane';$tdisc=Extract $tt 'Discover and persist evidence';$tre=Extract $tt 'Seal and package discovery evidence';[IO.File]::WriteAllBytes((Join-Path $root 'target-initialize.ps1'),$tinit);[IO.File]::WriteAllBytes((Join-Path $root 'target-discovery.ps1'),$tdisc);[IO.File]::WriteAllBytes((Join-Path $root 'target-seal.ps1'),$tre)
           if((H256 $tinit)-ne(H256 $init)-or(H256 $tdisc)-ne(H256 $disc)-or(H256 $tre)-ne(H256 $tseal)){throw 'target extraction identity failed'}
           $prefix=$st.Substring(0,$st.IndexOf("        run: |`n",$st.IndexOf("      - name: Seal and package discovery evidence`n"))+15);$suffixStart=$st.IndexOf("      - name: ",$prefix.Length);$suffix=$st.Substring($suffixStart);$ledger=[ordered]@{changed_block_count=1;source_prefix_sha256=H256([Text.Encoding]::UTF8.GetBytes($prefix));source_suffix_sha256=H256([Text.Encoding]::UTF8.GetBytes($suffix));preserved_prefix_length=720;preserved_prefix_sha256=H256($sseal[0..719]);target_seal_sha256=$tsi.sha256;target_workflow_sha256=$ti.sha256}
           $runtime=[ordered]@{runner_name=$env:RUNNER_NAME;runner_os=$env:RUNNER_OS;runner_arch=$env:RUNNER_ARCH;runner_version=$env:RUNNER_VERSION;powershell_path=(Get-Command powershell.exe).Source;ps_version_table=$PSVersionTable;ps_edition=$PSVersionTable.PSEdition;automation_assembly=[ordered]@{identity=[Management.Automation.PSObject].Assembly.FullName;location=[Management.Automation.PSObject].Assembly.Location};execution_policy=(Get-ExecutionPolicy -List|%{[ordered]@{scope=$_.Scope.ToString();policy=$_.ExecutionPolicy.ToString()}});preference=$env:PSExecutionPolicyPreference}
           $errs=@();foreach($x in @(@('initialize','target-initialize.ps1'),@('discovery','target-discovery.ps1'),@('seal','target-seal.ps1'))){$tok=$null;$er=$null;$p=Join-Path $root $x[1];[Management.Automation.Language.Parser]::ParseFile($p,[ref]$tok,[ref]$er)|Out-Null;foreach($q in @($er)){$errs+=[ordered]@{file=$x[1];message=$q.Message;error_id=$q.ErrorId;start_line=$q.Extent.StartLineNumber;start_column=$q.Extent.StartColumnNumber;end_line=$q.Extent.EndLineNumber;end_column=$q.Extent.EndColumnNumber;extent_text=$q.Extent.Text}}}
           $counts=[ordered]@{initialize=(@($errs|?{$_.file-eq'target-initialize.ps1'})).Count;discovery=(@($errs|?{$_.file-eq'target-discovery.ps1'})).Count;seal=(@($errs|?{$_.file-eq'target-seal.ps1'})).Count;total=$errs.Count};$report=[ordered]@{counts=$counts;errors=$errs}
           W 'source-identity.json' ($si|ConvertTo-Json -Depth 8);W 'source-identity.txt' (($si.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n");W 'target-identity.json' ($ti|ConvertTo-Json -Depth 8);W 'target-identity.txt' (($ti.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n");W 'replacement-ledger.json' ($ledger|ConvertTo-Json -Depth 8);W 'replacement-ledger.txt' (($ledger.GetEnumerator()|%{"$($_.Key)=$($_.Value)"})-join"`n");W 'powershell-runtime.json' ($runtime|ConvertTo-Json -Depth 12);W 'powershell-runtime.txt' ($runtime|Out-String);W 'ast-report.json' ($report|ConvertTo-Json -Depth 12);W 'ast-report.txt' (("INITIALIZE_AST_ERROR_COUNT=$($counts.initialize)`nDISCOVERY_AST_ERROR_COUNT=$($counts.discovery)`nSEAL_AST_ERROR_COUNT=$($counts.seal)`nTOTAL_AST_ERROR_COUNT=$($counts.total)`n")+($errs|ConvertTo-Json -Depth 8))
           if($counts.total-ne0){W 'classification.txt' $astFailure;throw "AST errors: $($counts.total)"};W 'classification.txt' 'CANONICAL TARGET WORKFLOW AST PREFLIGHT PASS';W 'preflight-first-error.txt' 'NONE';"classification=CANONICAL TARGET WORKFLOW AST PREFLIGHT PASS"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }catch{$m="$($_.Exception.GetType().FullName): $($_.Exception.Message)";$c=[IO.File]::ReadAllText((Join-Path $root 'classification.txt')).Trim();if($c-eq$failureClassification){W 'classification.txt' $failureClassification};W 'preflight-first-error.txt' $m;"classification=$([IO.File]::ReadAllText((Join-Path $root 'classification.txt')).Trim())"|Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append;Write-Error $m}
      - name: Upload canonical target AST evidence
        id: upload
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-canonical-target-workflow-ast-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.EVIDENCE_ROOT }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
      - name: Enforce preflight and upload
        if: ${{ always() }}
        shell: powershell
        run: |
          $c=[IO.File]::ReadAllText((Join-Path $env:EVIDENCE_ROOT 'classification.txt')).Trim()
          if($c -ne 'CANONICAL TARGET WORKFLOW AST PREFLIGHT PASS'){throw $c}
          if('${{ steps.upload.outcome }}' -ne 'success'){throw 'artifact upload failed'}

  terminalize-canonical-target-ast:
    needs: [announce-run, self-hosted-canonical-target-ast]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish terminal status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_RESULT: ${{ needs.self-hosted-canonical-target-ast.result }}
          CLASSIFICATION: ${{ needs.self-hosted-canonical-target-ast.outputs.classification }}
          UPLOAD_OUTCOME: ${{ needs.self-hosted-canonical-target-ast.outputs.upload_outcome }}
        run: |
          python3 - <<'PY'
          import json,os,urllib.request
          ok=os.environ['JOB_RESULT']=='success' and os.environ['CLASSIFICATION']=='CANONICAL TARGET WORKFLOW AST PREFLIGHT PASS' and os.environ['UPLOAD_OUTCOME']=='success'
          p=json.dumps({"state":"success" if ok else "failure","context":os.environ["STATUS_CONTEXT"],"description":"CANONICAL TARGET WORKFLOW AST PREFLIGHT PASS" if ok else "Canonical target AST preflight failed","target_url":f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode()
          r=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['GITHUB_SHA']}",data=p,method="POST",headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"})
          assert urllib.request.urlopen(r).status==201
          if not ok: raise SystemExit(1)
          PY
