            if (Test-Path -LiteralPath $Junction) {
              cmd.exe /d /s /c "rmdir `"$Junction`""
              if ($LASTEXITCODE -ne 0) { $cleanup += 'junction cleanup: FAIL' } else { $cleanup += 'junction cleanup: PASS' }
              $cleanup += 'junction created: yes'
