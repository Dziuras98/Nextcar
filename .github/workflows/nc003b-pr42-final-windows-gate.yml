name: "NC-003B PR42 self-hosted toolchain discovery"
on:
  push:
    branches: [agent/nc-003b-pr42-final-windows-gate-bootstrap]
    paths: [.github/workflows/nc003b-pr42-final-windows-gate.yml]
permissions:
  contents: read
  actions: read
  statuses: write
env:
  CANDIDATE_SHA: 1b2bc3599a0811be88a3b55987a4d27c72672a46
  STATUS_CONTEXT: NC-003B Phase 0 / Self-hosted toolchain discovery
jobs:
  announce-run:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending discovery status with run ID
        env: {GH_TOKEN: "${{ github.token }}"}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,os,urllib.request
          b=json.dumps({'state':'pending','context':os.environ['STATUS_CONTEXT'],'description':'Self-hosted Windows toolchain discovery running','target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode()
          q=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=b,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(q) as r: assert r.status==201
          PY
  control-artifact-probe:
    needs: announce-run
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: printf '%s\n' "run_id=$GITHUB_RUN_ID" "attempt=$GITHUB_RUN_ATTEMPT" > control-probe.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-artifact-control-probe-${{ github.run_id }}
          path: control-probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3
  self-hosted-toolchain-discovery:
    needs: [announce-run, control-artifact-probe]
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 30
    env:
      PSExecutionPolicyPreference: Bypass
      EVIDENCE_ROOT: ${{ github.workspace }}\_toolchain_discovery_${{ github.run_id }}_${{ github.run_attempt }}
      UPLOAD_ROOT: ${{ github.workspace }}\_toolchain_upload_${{ github.run_id }}_${{ github.run_attempt }}
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      upload-outcome: ${{ steps.upload.outcome }}
      expected-artifact-name: NC-003B-toolchain-discovery-${{ github.run_id }}-${{ github.run_attempt }}
      local-zip-name: ${{ steps.seal.outputs.local_zip_name }}
      local-zip-sha256: ${{ steps.seal.outputs.local_zip_sha256 }}
      local-zip-size: ${{ steps.seal.outputs.local_zip_size }}
      discovery-classification: ${{ steps.seal.outputs.discovery_classification }}
      seal-status: ${{ steps.seal.outputs.seal_status }}
      package-mode: ${{ steps.seal.outputs.package_mode }}
    steps:
      - name: Initialize evidence plane
        id: initialize
        shell: powershell
        run: |
          $ErrorActionPreference='Stop';$root=$env:EVIDENCE_ROOT;$upload=$env:UPLOAD_ROOT
          Remove-Item $root,$upload -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $root,$upload|Out-Null
          $utf8=New-Object Text.UTF8Encoding($false)
          function W([string]$base,[string]$name,[object]$value){[IO.File]::WriteAllText((Join-Path $base $name),[string]$value,$utf8)}
          $sent=[ordered]@{status='NOT_COMPLETED';classification='NOT_COMPLETED';first_error='NOT_COMPLETED';timestamp_utc=[DateTime]::UtcNow.ToString('o')}
          foreach($n in @('cmake-discovery.json','msvc-discovery.json','seal-status.json','publication-fallback.json')){W $root $n ($sent|ConvertTo-Json -Depth 8)}
          foreach($n in @('cmake-discovery.log','cmake-first-error.txt','msvc-discovery.log','msvc-first-error.txt','classification.txt','vswhere-stdout.txt','vswhere-stderr.txt','vswhere-exit-code.txt','vsdevcmd-stdout.txt','vsdevcmd-stderr.txt','vsdevcmd-exit-code.txt','discovery-script-error.txt','seal-first-error.txt','seal-status.txt','publication-fallback.txt')){W $root $n 'NOT_COMPLETED'}
          W $root 'candidate-checkout.txt' 'CANDIDATE NOT CHECKED OUT';W $root 'run-id.txt' $env:GITHUB_RUN_ID;W $root 'run-attempt.txt' $env:GITHUB_RUN_ATTEMPT;W $root 'runner-name.txt' $env:RUNNER_NAME;W $root 'runner-os.txt' $env:RUNNER_OS;W $root 'runner-arch.txt' $env:RUNNER_ARCH
          $fallback=[ordered]@{status='NOT_COMPLETED';classification='STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED';run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;timestamp_utc=[DateTime]::UtcNow.ToString('o')}
          W $root 'publication-fallback.json' ($fallback|ConvertTo-Json -Depth 8);W $root 'publication-fallback.txt' 'STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED'
          Copy-Item (Join-Path $root 'publication-fallback.json'),(Join-Path $root 'publication-fallback.txt') $upload -Force
      - name: Discover and persist evidence
        id: discovery
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference='Stop';$root=$env:EVIDENCE_ROOT
          function Utf8([string]$p,[object]$v){[IO.File]::WriteAllText($p,[string]$v,(New-Object Text.UTF8Encoding($false)))}
          function Text([string]$n,[object]$v){$p=Join-Path $root $n;$t="$p.tmp";Utf8 $t $v;$null=Get-Content $t -Raw;Move-Item $t $p -Force}
          function Json([string]$n,[object]$v){$p=Join-Path $root $n;$t="$p.tmp";Utf8 $t ($v|ConvertTo-Json -Depth 32);$null=Get-Content $t -Raw|ConvertFrom-Json;Move-Item $t $p -Force;$null=Get-Content $p -Raw|ConvertFrom-Json}
          function Quote-NativeArgument([string]$Value){if($null-eq$Value){return '""'};if($Value-notmatch '[\s"]'){return $Value};return '"'+([regex]::Replace($Value,'(\\*)"','$1$1\"') -replace '(\\+)$','$1$1')+'"'}
          function Join-NativeArguments([string[]]$Values){return (($Values|ForEach-Object{Quote-NativeArgument $_})-join' ')}
          function Invoke-NativeCaptured {
            param([Parameter(Mandatory=$true)][string]$FilePath,[string[]]$ArgumentList=@(),[hashtable]$Environment=@{})
            $result=[ordered]@{file_path=$FilePath;arguments=(Join-NativeArguments $ArgumentList);exit_code=$null;stdout='';stderr='';combined_output=''}
            if(-not(Test-Path $FilePath -PathType Leaf)){return [pscustomobject]$result}
            $psi=New-Object Diagnostics.ProcessStartInfo;$psi.FileName=$FilePath;$psi.Arguments=$result.arguments;$psi.UseShellExecute=$false;$psi.CreateNoWindow=$true;$psi.RedirectStandardOutput=$true;$psi.RedirectStandardError=$true
            foreach($k in $Environment.Keys){$psi.EnvironmentVariables[[string]$k]=[string]$Environment[$k]}
            $p=New-Object Diagnostics.Process;$p.StartInfo=$psi;$so=New-Object Text.StringBuilder;$se=New-Object Text.StringBuilder
            $outHandler=[Diagnostics.DataReceivedEventHandler]{param($sender,$e) if($null-ne$e.Data){[void]$so.AppendLine($e.Data)}};$errHandler=[Diagnostics.DataReceivedEventHandler]{param($sender,$e) if($null-ne$e.Data){[void]$se.AppendLine($e.Data)}}
            $p.add_OutputDataReceived($outHandler);$p.add_ErrorDataReceived($errHandler)
            try{if(-not$p.Start()){throw "Native process did not start: $FilePath"};$p.BeginOutputReadLine();$p.BeginErrorReadLine();$p.WaitForExit();$p.WaitForExit();$result.exit_code=$p.ExitCode;$result.stdout=$so.ToString();$result.stderr=$se.ToString();$result.combined_output=($result.stdout+$result.stderr)}finally{$p.remove_OutputDataReceived($outHandler);$p.remove_ErrorDataReceived($errHandler);$p.Dispose()}
            return [pscustomobject]$result
          }
          try {
            $vswhere=@((Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'),(Join-Path $env:ProgramFiles 'Microsoft Visual Studio\Installer\vswhere.exe'))|Where-Object{$_ -and(Test-Path $_ -PathType Leaf)}|Sort-Object -Unique|Select-Object -First 1
            $rows=@();$sv=$null;$vsMain=$null
            if($vswhere){$vsMain=Invoke-NativeCaptured -FilePath $vswhere -ArgumentList @('-all','-products','*','-format','json','-utf8');Text 'vswhere-stdout.txt' $vsMain.stdout;Text 'vswhere-stderr.txt' $vsMain.stderr;Text 'vswhere-exit-code.txt' $vsMain.exit_code;if($vsMain.exit_code-eq0){$instances=@($vsMain.stdout|ConvertFrom-Json);foreach($i in $instances){$p=[string]$i.installationPath;$range="[$($i.installationVersion),$($i.installationVersion)]";$vcCall=Invoke-NativeCaptured -FilePath $vswhere -ArgumentList @('-products','*','-version',$range,'-requires','Microsoft.VisualStudio.Component.VC.Tools.x86.x64','-property','installationPath');$cmCall=Invoke-NativeCaptured -FilePath $vswhere -ArgumentList @('-products','*','-version',$range,'-requires','Microsoft.VisualStudio.Component.VC.CMake.Project','-property','installationPath');$hasVc=($vcCall.exit_code-eq0-and(($vcCall.stdout-split"`r?`n")-contains$p));$hasCm=($cmCall.exit_code-eq0-and(($cmCall.stdout-split"`r?`n")-contains$p));$vd=Join-Path $p 'Common7\Tools\VsDevCmd.bat';$bin=Join-Path $p 'Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin';$rows+=[pscustomobject]@{installationPath=$p;installationVersion=[string]$i.installationVersion;productId=[string]$i.productId;displayName=[string]$i.displayName;vc_tools_component=$hasVc;vc_cmake_component=$hasCm;vsdevcmd_path=$vd;vsdevcmd_exists=(Test-Path $vd -PathType Leaf);cmake_path=(Join-Path $bin 'cmake.exe');ctest_path=(Join-Path $bin 'ctest.exe');vc_probe_exit_code=$vcCall.exit_code;vc_probe_stdout=$vcCall.stdout;vc_probe_stderr=$vcCall.stderr;cmake_probe_exit_code=$cmCall.exit_code;cmake_probe_stdout=$cmCall.stdout;cmake_probe_stderr=$cmCall.stderr}};$eligible=@($rows|Where-Object{$_.vc_tools_component-and$_.vc_cmake_component-and$_.vsdevcmd_exists}|Sort-Object @{e={[version]$_.installationVersion};Descending=$true},@{e={$_.installationPath.ToLowerInvariant()}});if($eligible){$sv=$eligible[0]}}}else{Text 'vswhere-stdout.txt' '';Text 'vswhere-stderr.txt' 'vswhere.exe not found';Text 'vswhere-exit-code.txt' ''}
            $emap=@{};$vdCall=$null;$clCall=$null;$cl=$null
            if($sv){$cmd=Join-Path $env:RUNNER_TEMP "nc003b-vsenv-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT.cmd";@('@echo off',"call `"$($sv.vsdevcmd_path)`" -no_logo -arch=x64 -host_arch=x64",'set')|Set-Content $cmd -Encoding ascii;$vdCall=Invoke-NativeCaptured -FilePath "$env:SystemRoot\System32\cmd.exe" -ArgumentList @('/d','/s','/c',"`"$cmd`"");Remove-Item $cmd -Force -ErrorAction SilentlyContinue;if($vdCall.exit_code-eq0){foreach($line in($vdCall.stdout-split"`r?`n")){if($line-match'^([^=]+)=(.*)$'){$emap[$matches[1]]=$matches[2]}}}}
            Text 'vsdevcmd-stdout.txt' $(if($vdCall){$vdCall.stdout}else{''});Text 'vsdevcmd-stderr.txt' $(if($vdCall){$vdCall.stderr}else{'VsDevCmd not invoked'});Text 'vsdevcmd-exit-code.txt' $(if($vdCall){$vdCall.exit_code}else{''})
            if($emap['PATH']){foreach($dir in @($emap['PATH']-split';'|Where-Object{$_})){$q=Join-Path $dir 'cl.exe';if(Test-Path $q -PathType Leaf){$cl=$q;break}}};if($cl){$clCall=Invoke-NativeCaptured -FilePath $cl -ArgumentList @('/?') -Environment $emap}
            $clCombined=$(if($clCall){$clCall.combined_output}else{''});$banner=($clCombined-match'Microsoft \(R\) C/C\+\+ Optimizing Compiler Version');$vm=[regex]::Match($clCombined,'Microsoft \(R\) C/C\+\+ Optimizing Compiler Version\s+([^\s]+)');$sdkDir=[string]$emap['WindowsSdkDir'];$sdkVer=[string]$emap['WindowsSDKVersion'];$sdk=[ordered]@{include_path=$(if($sdkDir-and$sdkVer){Join-Path $sdkDir "Include\$sdkVer"}else{$null});lib_path=$(if($sdkDir-and$sdkVer){Join-Path $sdkDir "Lib\$sdkVer"}else{$null});bin_path=$(if($sdkDir-and$sdkVer){Join-Path $sdkDir "bin\$sdkVer"}else{$null})};$sdk.include_exists=($sdk.include_path-and(Test-Path $sdk.include_path));$sdk.lib_exists=($sdk.lib_path-and(Test-Path $sdk.lib_path));$sdk.bin_exists=($sdk.bin_path-and(Test-Path $sdk.bin_path))
            $msErr=$null;if(-not$vswhere){$msErr='vswhere.exe not found'}elseif(-not$vsMain-or$vsMain.exit_code-ne0){$msErr='vswhere invocation failed'}elseif(-not$sv){$msErr='No qualifying Visual Studio instance'}elseif(-not$vdCall-or$vdCall.exit_code-ne0){$msErr='VsDevCmd invocation failed'}elseif(-not$cl){$msErr='cl.exe not found'}elseif($clCall.exit_code-notin@(0,2)){$msErr="cl.exe exit $($clCall.exit_code)"}elseif(-not$banner){$msErr='cl.exe banner not detected'}elseif(-not$vm.Success){$msErr='cl.exe version not parsed'}elseif(-not($sdk.include_exists-and$sdk.lib_exists-and$sdk.bin_exists)){$msErr='Windows SDK evidence incomplete'}
            $ms=[ordered]@{status=$(if($msErr){'FAIL'}else{'PASS'});classification=$(if($msErr){'MSVC_INCOMPLETE'}else{'MSVC_PASS'});first_error=$msErr;vswhere_path=$vswhere;vswhere_exit_code=$(if($vsMain){$vsMain.exit_code}else{$null});vswhere_stdout=$(if($vsMain){$vsMain.stdout}else{''});vswhere_stderr=$(if($vsMain){$vsMain.stderr}else{''});all_instances=$rows;selected_installation_path=$(if($sv){$sv.installationPath}else{$null});installation_version=$(if($sv){$sv.installationVersion}else{$null});product_id=$(if($sv){$sv.productId}else{$null});display_name=$(if($sv){$sv.displayName}else{$null});vc_tools_component=$(if($sv){$sv.vc_tools_component}else{$false});vc_cmake_component=$(if($sv){$sv.vc_cmake_component}else{$false});vsdevcmd_path=$(if($sv){$sv.vsdevcmd_path}else{$null});vsdevcmd_exit_code=$(if($vdCall){$vdCall.exit_code}else{$null});vsdevcmd_stdout=$(if($vdCall){$vdCall.stdout}else{''});vsdevcmd_stderr=$(if($vdCall){$vdCall.stderr}else{''});cl_path=$cl;cl_arguments='/?';cl_invocation_exit_code=$(if($clCall){$clCall.exit_code}else{$null});cl_stdout=$(if($clCall){$clCall.stdout}else{''});cl_stderr=$(if($clCall){$clCall.stderr}else{''});cl_combined_output=$clCombined;cl_banner_detected=$banner;cl_version=$(if($vm.Success){$vm.Groups[1].Value}else{$null});msvc_toolset_directory=[string]$emap['VCToolsInstallDir'];VCToolsVersion=[string]$emap['VCToolsVersion'];WindowsSdkDir=$sdkDir;WindowsSDKVersion=$sdkVer;windows_sdk_evidence=$sdk;selection_reason='Both components and VsDevCmd; highest installationVersion; ordinal-ignore-case path tie-break.'};Json 'msvc-discovery.json' $ms;Text 'msvc-discovery.log' ($ms|ConvertTo-Json -Depth 32);Text 'msvc-first-error.txt' $msErr
            $pairs=@();$priority=0;function AddPair($source,$cmake,$ctest,$reason){if(-not$cmake){return};$script:priority++;$script:pairs+=[pscustomobject]@{selection_priority=$script:priority;discovery_source=$source;cmake_path=$cmake;ctest_path=$ctest;selection_reason=$reason}}
            if($sv){AddPair 'selected-visual-studio' $sv.cmake_path $sv.ctest_path 'Selected Visual Studio bundled pair'};if($emap['PATH']){foreach($dir in @($emap['PATH']-split';'|Where-Object{$_})){AddPair 'vsdevcmd-path' (Join-Path $dir 'cmake.exe') (Join-Path $dir 'ctest.exe') 'VsDevCmd process PATH'}};foreach($q in @(Get-Command cmake.exe -All -ErrorAction SilentlyContinue)){AddPair 'process-path' $q.Source (Join-Path (Split-Path $q.Source -Parent) 'ctest.exe') 'Process PATH'};foreach($pf in @($env:ProgramFiles,${env:ProgramFiles(x86)})|Where-Object{$_}){AddPair 'program-files' (Join-Path $pf 'CMake\bin\cmake.exe') (Join-Path $pf 'CMake\bin\ctest.exe') 'Standard Program Files location'}
            $attempts=@();$selected=$null;$seen=@{};foreach($p in $pairs){$key=([string]$p.cmake_path).ToLowerInvariant()+'|'+([string]$p.ctest_path).ToLowerInvariant();if($seen[$key]){continue};$seen[$key]=$true;$a=[ordered]@{selection_priority=$p.selection_priority;discovery_source=$p.discovery_source;cmake_path=$p.cmake_path;ctest_path=$p.ctest_path;selection_reason=$p.selection_reason;cmake_exists=(Test-Path $p.cmake_path -PathType Leaf);ctest_exists=(Test-Path $p.ctest_path -PathType Leaf);same_bin_directory=$false;cmake_stdout='';cmake_stderr='';cmake_combined_output='';ctest_stdout='';ctest_stderr='';ctest_combined_output='';cmake_version=$null;ctest_version=$null;cmake_invocation_exit_code=$null;ctest_invocation_exit_code=$null;cmake_sha256=$null;ctest_sha256=$null;cmake_size=$null;ctest_size=$null;rejection_reason=$null};if(-not$a.cmake_exists){$a.rejection_reason='cmake missing'}elseif(-not$a.ctest_exists){$a.rejection_reason='ctest missing'}else{$a.same_bin_directory=((Split-Path $p.cmake_path -Parent)-ieq(Split-Path $p.ctest_path -Parent));if(-not$a.same_bin_directory){$a.rejection_reason='different bin'}else{$co=Invoke-NativeCaptured -FilePath $p.cmake_path -ArgumentList @('--version');$to=Invoke-NativeCaptured -FilePath $p.ctest_path -ArgumentList @('--version');$a.cmake_stdout=$co.stdout;$a.cmake_stderr=$co.stderr;$a.cmake_combined_output=$co.combined_output;$a.ctest_stdout=$to.stdout;$a.ctest_stderr=$to.stderr;$a.ctest_combined_output=$to.combined_output;$a.cmake_invocation_exit_code=$co.exit_code;$a.ctest_invocation_exit_code=$to.exit_code;$cmv=[regex]::Match($co.combined_output,'cmake version\s+([0-9]+(?:\.[0-9]+)+)');$ctv=[regex]::Match($to.combined_output,'ctest version\s+([0-9]+(?:\.[0-9]+)+)');if($co.exit_code-ne0){$a.rejection_reason='cmake invocation failed'}elseif($to.exit_code-ne0){$a.rejection_reason='ctest invocation failed'}elseif(-not$cmv.Success){$a.rejection_reason='cmake version parse failed'}elseif(-not$ctv.Success){$a.rejection_reason='ctest version parse failed'}else{$a.cmake_version=$cmv.Groups[1].Value;$a.ctest_version=$ctv.Groups[1].Value;$a.cmake_sha256=(Get-FileHash $p.cmake_path -Algorithm SHA256).Hash.ToLowerInvariant();$a.ctest_sha256=(Get-FileHash $p.ctest_path -Algorithm SHA256).Hash.ToLowerInvariant();$a.cmake_size=(Get-Item $p.cmake_path).Length;$a.ctest_size=(Get-Item $p.ctest_path).Length;if(-not$a.cmake_sha256-or-not$a.ctest_sha256-or$a.cmake_size-le0-or$a.ctest_size-le0){$a.rejection_reason='binary evidence incomplete'}}}};$attempts+=[pscustomobject]$a;if(-not$a.rejection_reason-and-not$selected){$selected=[pscustomobject]$a}}
            $cmErr=$(if($selected){$null}elseif(@($attempts|Where-Object{$_.cmake_exists}).Count){'No valid complete CMake/CTest pair'}else{'No cmake.exe found'});$cm=[ordered]@{status=$(if($selected){'PASS'}else{'FAIL'});classification=$(if($selected){'CMAKE_CTEST_PASS'}elseif(@($attempts|Where-Object{$_.cmake_exists}).Count){'CMAKE_TOOLCHAIN_INCOMPLETE'}else{'CMAKE_NOT_FOUND'});first_error=$cmErr;selected=$selected;attempts=$attempts;selected_visual_studio_installation_path=$(if($sv){$sv.installationPath}else{$null})};Json 'cmake-discovery.json' $cm;Text 'cmake-discovery.log' ($attempts|ConvertTo-Json -Depth 32);Text 'cmake-first-error.txt' $cmErr
          } catch {
