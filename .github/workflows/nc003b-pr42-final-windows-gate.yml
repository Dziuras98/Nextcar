            $required=@('cmake-discovery.json','cmake-discovery.log','cmake-first-error.txt','msvc-discovery.json','msvc-discovery.log','msvc-first-error.txt','classification.txt','candidate-checkout.txt','run-id.txt','run-attempt.txt','runner-name.txt','runner-os.txt','runner-arch.txt','vswhere-stdout.txt','vswhere-stderr.txt','vswhere-exit-code.txt','vsdevcmd-stdout.txt','vsdevcmd-stderr.txt','vsdevcmd-exit-code.txt','discovery-script-error.txt','seal-first-error.txt','seal-status.json','seal-status.txt','publication-fallback.json','publication-fallback.txt');foreach($n in $required){$p=Join-Path $root $n;if(-not(Test-Path $p -PathType Leaf)){throw "Missing required evidence: $n"};if($n.EndsWith('.json')){$null=Get-Content $p -Raw|ConvertFrom-Json}}
            $entries=@();foreach($f in @(Get-ChildItem $root -File -Recurse|Sort-Object FullName)){$rel=$f.FullName.Substring($root.Length).TrimStart('\').Replace('\','/');$entries+=[ordered]@{relative_path=$rel;size=[int64]$f.Length;sha256=(Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLowerInvariant()}}
            $manifest=[ordered]@{schema='nc003b-toolchain-discovery-evidence-file-manifest-v1';run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;file_count=$entries.Count;files=$entries};W (Join-Path $root 'evidence-file-manifest.json') ($manifest|ConvertTo-Json -Depth 8);$null=Get-Content (Join-Path $root 'evidence-file-manifest.json') -Raw|ConvertFrom-Json;W (Join-Path $root 'evidence-file-manifest.txt') (($entries|ForEach-Object{"$($_.sha256)  $($_.size)  $($_.relative_path)"})-join"`n")
            Add-Type -AssemblyName System.IO.Compression;Add-Type -AssemblyName System.IO.Compression.FileSystem;$zipName="NC-003B-toolchain-discovery-evidence-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT.zip";$zip=Join-Path $upload $zipName;Remove-Item $zip -Force -ErrorAction SilentlyContinue
            $fs=[IO.File]::Open($zip,[IO.FileMode]::CreateNew);try{$za=New-Object IO.Compression.ZipArchive($fs,[IO.Compression.ZipArchiveMode]::Create,$false);try{foreach($f in @(Get-ChildItem $root -File -Recurse|Sort-Object FullName)){$rel=$f.FullName.Substring($root.Length).TrimStart('\').Replace('\','/');$ze=$za.CreateEntry($rel,[IO.Compression.CompressionLevel]::NoCompression);$ze.LastWriteTime=[DateTimeOffset]::new(1980,1,1,0,0,0,[TimeSpan]::Zero);$src=[IO.File]::OpenRead($f.FullName);$dst=$ze.Open();try{$src.CopyTo($dst)}finally{$dst.Dispose();$src.Dispose()}}}finally{$za.Dispose()}}finally{$fs.Dispose()}
            $zi=Get-Item $zip;if($zi.Length-le0){throw 'Local ZIP empty'};$seal='PASS';$mode='sealed';$zipHash=(Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant();$zipSize=$zi.Length;W (Join-Path $root 'seal-status.json') (([ordered]@{status='PASS';classification=$class;package_mode=$mode;timestamp_utc=[DateTime]::UtcNow.ToString('o')}|ConvertTo-Json));W (Join-Path $root 'seal-status.txt') 'PASS'
          } catch {
