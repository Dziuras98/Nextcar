name: "NC-003B PR42 final self-hosted Windows gate"

on:
  push:
    branches:
      - agent/nc-003b-pr42-final-windows-gate-bootstrap
    paths:
      - .github/workflows/nc003b-pr42-final-windows-gate.yml

permissions:
  contents: read
  actions: read
  statuses: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  CANDIDATE_SHA: 1b2bc3599a0811be88a3b55987a4d27c72672a46
  CANDIDATE_TREE: 242fd115c2935367dc34d1185c4fe9cf25a0a6a7
  BASE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  SOURCE_SHA: 8548a70387aa36d9b567652eee4cd0f1319d527a
  SOURCE_TREE: 69f3faa5d1b82dddab1d9985ab8da0b9fae1cddc
  B_SHA: baff818ad6cce157dbcd94088d74f4a2c22c16fb
  B_TREE: 22c8ffe428b96b60c0bc401bbc3ff22bdddf97f5
  G_SHA: ab70fb2b0227e4274387357145e734d7d2fde29a
  G_TREE: 6b4a9479ba764754ea4f59cc11fb3fe6cae981c9
  STATUS_CONTEXT: NC-003B Phase 0 / Final self-hosted Windows exact-head gate

jobs:
  announce-run:
    name: "Announce PR #42 final Windows gate"
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending candidate status with run ID
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.request
          body=json.dumps({'state':'pending','context':os.environ['STATUS_CONTEXT'],'description':'Final self-hosted Windows exact-head validation running','target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode('utf-8')
          req=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=body,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(req) as response: assert response.status==201
          PY

  control-artifact-probe:
    name: "GitHub-hosted artifact control probe"
    needs: announce-run
    runs-on: ubuntu-latest
    outputs:
      upload_outcome: ${{ steps.control-upload.outcome }}
    steps:
      - name: Create control probe
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' 'repository=Dziuras98/Nextcar' "run_id=${GITHUB_RUN_ID}" "run_attempt=${GITHUB_RUN_ATTEMPT}" 'runner=github-hosted' 'purpose=artifact-control-probe' > control-probe.txt
          test -s control-probe.txt
          sha256sum control-probe.txt
      - name: Upload GitHub-hosted artifact control probe
        id: control-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-artifact-control-probe-${{ github.run_id }}
          path: control-probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3
      - name: Enforce control upload success
        shell: bash
        run: test "${{ steps.control-upload.outcome }}" = success

  self-hosted-preflight:
    name: "Self-hosted PowerShell, CMake, MSVC and artifact preflight"
    needs: announce-run
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 30
    env:
      PSExecutionPolicyPreference: Bypass
    outputs:
      upload_outcome: ${{ steps.self-upload.outcome }}
      cmake_exe: ${{ steps.cmake-discovery.outputs.cmake_exe }}
      ctest_exe: ${{ steps.cmake-discovery.outputs.ctest_exe }}
      cmake_bin: ${{ steps.cmake-discovery.outputs.cmake_bin }}
      cmake_source: ${{ steps.cmake-discovery.outputs.cmake_source }}
      cmake_sha256: ${{ steps.cmake-discovery.outputs.cmake_sha256 }}
      ctest_sha256: ${{ steps.cmake-discovery.outputs.ctest_sha256 }}
      vs_installation: ${{ steps.cmake-discovery.outputs.vs_installation }}
      vs_version: ${{ steps.cmake-discovery.outputs.vs_version }}
      vsdevcmd: ${{ steps.cmake-discovery.outputs.vsdevcmd }}
      msvc_toolset: ${{ steps.cmake-discovery.outputs.msvc_toolset }}
    steps:
      - name: Verify inherited process execution policy
        shell: cmd
        run: |
          @echo off
          setlocal
          where powershell.exe
          if errorlevel 1 exit /b 1
          echo PSExecutionPolicyPreference=%PSExecutionPolicyPreference%
          if /I not "%PSExecutionPolicyPreference%"=="Bypass" exit /b 1
          powershell.exe -NoLogo -NoProfile -NonInteractive -Command "Get-ExecutionPolicy -List | Format-Table -AutoSize; Write-Host EFFECTIVE_POLICY=$(Get-ExecutionPolicy); Write-Host PROCESS_POLICY=$(Get-ExecutionPolicy -Scope Process)"
          if errorlevel 1 exit /b 1
          powershell.exe -NoLogo -NoProfile -NonInteractive -Command "if ((Get-ExecutionPolicy) -ne 'Bypass') { exit 21 }; if ((Get-ExecutionPolicy -Scope Process) -ne 'Bypass') { exit 22 }; exit 0"
          if errorlevel 1 exit /b 1
      - name: Execute built-in PowerShell process-policy probe
        shell: powershell
        run: |
          Write-Host 'POWERSHELL_BODY_EXECUTED=true'
          Write-Host "POWERSHELL_VERSION=$($PSVersionTable.PSVersion)"
          Write-Host "PSCOMMAND_PATH=$PSCommandPath"
          Write-Host "SCRIPT_EXTENSION=$([IO.Path]::GetExtension($PSCommandPath))"
          Write-Host "EFFECTIVE_POLICY=$(Get-ExecutionPolicy)"
          Write-Host "PROCESS_POLICY=$(Get-ExecutionPolicy -Scope Process)"
          if ([IO.Path]::GetExtension($PSCommandPath) -ine '.ps1') { throw 'Runner did not materialize a .ps1 script.' }
          if ((Get-ExecutionPolicy) -ne 'Bypass' -or (Get-ExecutionPolicy -Scope Process) -ne 'Bypass') { throw 'Process policy proof failed.' }
          $UploadRoot=Join-Path $env:GITHUB_WORKSPACE "_artifact_probe_upload_$env:GITHUB_RUN_ID`_$env:GITHUB_RUN_ATTEMPT"
          if(Test-Path -LiteralPath $UploadRoot){throw "Unique probe root already exists: $UploadRoot"}
          New-Item -ItemType Directory -Path $UploadRoot|Out-Null
          @('repository=Dziuras98/Nextcar',"run_id=$env:GITHUB_RUN_ID","run_attempt=$env:GITHUB_RUN_ATTEMPT","runner=$env:RUNNER_NAME",'shell=built-in-powershell','process_policy=Bypass','purpose=final-gate-preflight')|Set-Content -LiteralPath (Join-Path $UploadRoot 'probe.txt') -Encoding utf8
      - name: Verify built-in PowerShell effects from cmd
        shell: cmd
        run: |
          @echo off
          setlocal
          set "UPLOAD_ROOT=%GITHUB_WORKSPACE%\_artifact_probe_upload_%GITHUB_RUN_ID%_%GITHUB_RUN_ATTEMPT%"
          set "UPLOAD_FILE=%UPLOAD_ROOT%\probe.txt"
          if not exist "%UPLOAD_FILE%" exit /b 1
          for %%I in ("%UPLOAD_FILE%") do (echo CMD_UPLOAD_FULL_NAME=%%~fI& echo CMD_UPLOAD_LENGTH=%%~zI)
          certutil -hashfile "%UPLOAD_FILE%" SHA256
          if errorlevel 1 exit /b 1
      - name: Discover existing CMake and CTest
        id: cmake-discovery
        shell: powershell
        run: |
          $ErrorActionPreference='Stop'
          $utf8NoBom=New-Object System.Text.UTF8Encoding($false)
          $probeRoot=Join-Path $env:GITHUB_WORKSPACE "_artifact_probe_upload_$env:GITHUB_RUN_ID`_$env:GITHUB_RUN_ATTEMPT"
          $probe=Join-Path $probeRoot 'probe.txt'
          $log=New-Object System.Collections.Generic.List[string]
          $checked=New-Object System.Collections.Generic.List[string]
          $raw=New-Object System.Collections.Generic.List[object]
          function Add-Pair([string]$cm,[string]$ct,[string]$source,[int]$priority,[string]$tie){
            if([string]::IsNullOrWhiteSpace($cm)-or[string]::IsNullOrWhiteSpace($ct)){return}
            try{$cm=[IO.Path]::GetFullPath($cm);$ct=[IO.Path]::GetFullPath($ct)}catch{return}
            $checked.Add("$source|$cm|$ct")
            foreach($bad in @($env:GITHUB_WORKSPACE,$env:RUNNER_TEMP)){if($bad-and($cm.StartsWith([IO.Path]::GetFullPath($bad),[StringComparison]::OrdinalIgnoreCase)-or$ct.StartsWith([IO.Path]::GetFullPath($bad),[StringComparison]::OrdinalIgnoreCase))){$log.Add("REJECT prohibited root: $source $cm $ct");return}}
            if(-not(Test-Path -LiteralPath $cm -PathType Leaf)-or-not(Test-Path -LiteralPath $ct -PathType Leaf)){return}
            if((Split-Path $cm -Parent)-ine(Split-Path $ct -Parent)){$log.Add("REJECT bin mismatch: $source");return}
            $cv=(& $cm --version 2>&1)-join"`n";$ce=$LASTEXITCODE;$tv=(& $ct --version 2>&1)-join"`n";$te=$LASTEXITCODE
            if($ce-ne0-or$te-ne0-or$cv-notmatch'cmake version\s+([0-9]+(?:\.[0-9]+)+)'-or$tv-notmatch'ctest version\s+([0-9]+(?:\.[0-9]+)+)'){$log.Add("REJECT invocation/version: $source $cm $ct");return}
            $raw.Add([pscustomobject]@{cmake=$cm;ctest=$ct;bin=(Split-Path $cm -Parent);source=$source;priority=$priority;tie=$tie;cmake_version=([regex]::Match($cv,'cmake version\s+([0-9]+(?:\.[0-9]+)+)').Groups[1].Value);ctest_version=([regex]::Match($tv,'ctest version\s+([0-9]+(?:\.[0-9]+)+)').Groups[1].Value);cmake_sha256=(Get-FileHash -LiteralPath $cm -Algorithm SHA256).Hash.ToLowerInvariant();ctest_sha256=(Get-FileHash -LiteralPath $ct -Algorithm SHA256).Hash.ToLowerInvariant();cmake_size=(Get-Item -LiteralPath $cm).Length;ctest_size=(Get-Item -LiteralPath $ct).Length})
          }
          $pathCm=@(Get-Command cmake.exe -All -ErrorAction SilentlyContinue|ForEach-Object Source);$pathCt=@(Get-Command ctest.exe -All -ErrorAction SilentlyContinue|ForEach-Object Source)
          where.exe cmake.exe 2>&1|ForEach-Object{$log.Add("WHERE_CMAKE $_")};where.exe ctest.exe 2>&1|ForEach-Object{$log.Add("WHERE_CTEST $_")}
          foreach($cm in $pathCm){foreach($ct in $pathCt){if((Split-Path $cm -Parent)-ieq(Split-Path $ct -Parent)){Add-Pair $cm $ct 'PATH' 1 ([IO.Path]::GetFullPath($cm))}}}
          $vswhere=Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if(-not(Test-Path -LiteralPath $vswhere -PathType Leaf)){throw 'STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE: vswhere.exe missing'}
          $vc=@(& $vswhere -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -format json|ConvertFrom-Json)
          $vscm=@(& $vswhere -products * -requires Microsoft.VisualStudio.Component.VC.CMake.Project -format json|ConvertFrom-Json)
          if(-not$vc){throw 'STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE: VC.Tools.x86.x64 missing'}
          foreach($i in ($vscm|Sort-Object {[version]$_.installationVersion} -Descending)){
            $base=Join-Path $i.installationPath 'Common7\IDE\CommonExtensions\Microsoft\CMake'
            Add-Pair (Join-Path $base 'CMake\bin\cmake.exe') (Join-Path $base 'CMake\bin\ctest.exe') "VisualStudio:$($i.installationVersion)" 2 (('{0:D20}|{1}'-f([version]$i.installationVersion).Major,$i.installationPath))
            if(Test-Path $base){$cms=@(Get-ChildItem $base -Filter cmake.exe -File -Recurse -ErrorAction SilentlyContinue);foreach($cm in $cms){$ct=Join-Path $cm.DirectoryName 'ctest.exe';Add-Pair $cm.FullName $ct "VisualStudioRecursive:$($i.installationVersion)" 2 ("$($i.installationVersion)|$($cm.FullName)")}}
          }
          foreach($root in @($env:ProgramFiles,${env:ProgramFiles(x86)})){if($root){Add-Pair (Join-Path $root 'CMake\bin\cmake.exe') (Join-Path $root 'CMake\bin\ctest.exe') "ProgramFiles:$root" 3 $root}}
          foreach($name in @('CMAKE_ROOT','CMAKE_HOME','ChocolateyInstall')){$root=[Environment]::GetEnvironmentVariable($name);if($root){Add-Pair (Join-Path $root 'bin\cmake.exe') (Join-Path $root 'bin\ctest.exe') "Environment:$name" 4 $root;Add-Pair (Join-Path $root 'cmake\bin\cmake.exe') (Join-Path $root 'cmake\bin\ctest.exe') "Environment:$name/cmake" 4 $root}}
          $valid=@($raw|Sort-Object priority,tie,cmake -Unique)
          foreach($c in $valid){$log.Add("VALID priority=$($c.priority) source=$($c.source) cmake=$($c.cmake) ctest=$($c.ctest) cmake_version=$($c.cmake_version) ctest_version=$($c.ctest_version)")}
          if(-not$valid){$log|Set-Content -LiteralPath (Join-Path $probeRoot 'cmake-discovery.log') -Encoding utf8;throw "STOP — SELF-HOSTED WINDOWS CMAKE TOOLCHAIN UNAVAILABLE`nCHECKED:`n$($checked-join"`n")"}
          $bestPriority=($valid|Measure-Object priority -Minimum).Minimum;$best=@($valid|Where-Object priority -eq $bestPriority|Sort-Object tie,cmake)
          if($best.Count-gt1-and$best[0].tie-eq$best[1].tie-and$best[0].cmake-ine$best[1].cmake){throw 'STOP — AMBIGUOUS SELF-HOSTED CMAKE TOOLCHAIN'}
          $sel=$best[0]
          $vsi=$vc|Sort-Object {[version]$_.installationVersion} -Descending|Select-Object -First 1
          $vsdev=Join-Path $vsi.installationPath 'Common7\Tools\VsDevCmd.bat';if(-not(Test-Path $vsdev -PathType Leaf)){throw 'STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE: VsDevCmd.bat missing'}
          $cmd='"'+$vsdev+'" -no_logo -arch=x64 -host_arch=x64 && set';$envLines=& cmd.exe /d /s /c $cmd;if($LASTEXITCODE-ne0){throw 'STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE: VsDevCmd failed'}
          $procEnv=@{};foreach($line in $envLines){if($line-match'^([^=]+)=(.*)$'){$procEnv[$matches[1]]=$matches[2]}}
          $cl=$null;foreach($dir in ($procEnv['PATH']-split';')){if($dir-and(Test-Path (Join-Path $dir 'cl.exe') -PathType Leaf)){$cl=Join-Path $dir 'cl.exe';break}}
          if(-not$cl){throw 'STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE: cl.exe missing after VsDevCmd'}
          $msvc=Split-Path (Split-Path $cl -Parent) -Leaf
          $json=[ordered]@{status='PASS';selected=[ordered]@{cmake_exe=$sel.cmake;ctest_exe=$sel.ctest;bin=$sel.bin;source=$sel.source;cmake_version=$sel.cmake_version;ctest_version=$sel.ctest_version;cmake_sha256=$sel.cmake_sha256;ctest_sha256=$sel.ctest_sha256;cmake_size=$sel.cmake_size;ctest_size=$sel.ctest_size};candidates=$valid;checked_locations=$checked;visual_studio=[ordered]@{installation_path=$vsi.installationPath;installation_version=$vsi.installationVersion;vsdevcmd=$vsdev;cl_exe=$cl;msvc_toolset=$msvc}}
          $json|ConvertTo-Json -Depth 10|Set-Content -LiteralPath (Join-Path $probeRoot 'cmake-discovery.json') -Encoding utf8
          $log.Add("SELECTED source=$($sel.source) cmake=$($sel.cmake) ctest=$($sel.ctest)");$log.Add("VS installation=$($vsi.installationPath) version=$($vsi.installationVersion) VsDevCmd=$vsdev cl=$cl toolset=$msvc");$log|Set-Content -LiteralPath (Join-Path $probeRoot 'cmake-discovery.log') -Encoding utf8
          foreach($line in @("cmake_exe=$($sel.cmake)","ctest_exe=$($sel.ctest)","cmake_source=$($sel.source)","cmake_sha256=$($sel.cmake_sha256)","ctest_sha256=$($sel.ctest_sha256)")){[IO.File]::AppendAllText($probe,"$line`n",$utf8NoBom)}
          foreach($line in @("cmake_exe=$($sel.cmake)","ctest_exe=$($sel.ctest)","cmake_bin=$($sel.bin)","cmake_source=$($sel.source)","cmake_sha256=$($sel.cmake_sha256)","ctest_sha256=$($sel.ctest_sha256)","vs_installation=$($vsi.installationPath)","vs_version=$($vsi.installationVersion)","vsdevcmd=$vsdev","msvc_toolset=$msvc")){[IO.File]::AppendAllText($env:GITHUB_OUTPUT,"$line`n",$utf8NoBom)}
      - name: Upload self-hosted preflight artifact
        id: self-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-self-hosted-preflight-${{ github.run_id }}
          path: ${{ github.workspace }}\_artifact_probe_upload_${{ github.run_id }}_${{ github.run_attempt }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
      - name: Enforce self-hosted upload success
        shell: powershell
        run: |
          if ('${{ steps.self-upload.outcome }}' -ne 'success') { throw 'Self-hosted artifact upload failed after file proof.' }
          foreach($v in @('${{ steps.cmake-discovery.outputs.cmake_exe }}','${{ steps.cmake-discovery.outputs.ctest_exe }}','${{ steps.cmake-discovery.outputs.cmake_bin }}')){if([string]::IsNullOrWhiteSpace($v)){throw 'Toolchain output missing.'}}

  final-windows-gate:
    name: "PR #42 final self-hosted Windows exact-head gate"
    needs: [announce-run, control-artifact-probe, self-hosted-preflight]
    if: needs.control-artifact-probe.outputs.upload_outcome == 'success' && needs.self-hosted-preflight.outputs.upload_outcome == 'success' && needs.self-hosted-preflight.outputs.cmake_exe != '' && needs.self-hosted-preflight.outputs.ctest_exe != '' && needs.self-hosted-preflight.outputs.cmake_bin != ''
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 180
    env:
      PSExecutionPolicyPreference: Bypass
      CMAKE_EXE: ${{ needs.self-hosted-preflight.outputs.cmake_exe }}
      CTEST_EXE: ${{ needs.self-hosted-preflight.outputs.ctest_exe }}
      CMAKE_BIN_DIR: ${{ needs.self-hosted-preflight.outputs.cmake_bin }}
      CMAKE_DISCOVERY_SOURCE: ${{ needs.self-hosted-preflight.outputs.cmake_source }}
      EXPECTED_CMAKE_SHA256: ${{ needs.self-hosted-preflight.outputs.cmake_sha256 }}
      EXPECTED_CTEST_SHA256: ${{ needs.self-hosted-preflight.outputs.ctest_sha256 }}
      VS_INSTALLATION_PATH: ${{ needs.self-hosted-preflight.outputs.vs_installation }}
      VS_INSTALLATION_VERSION: ${{ needs.self-hosted-preflight.outputs.vs_version }}
      VSDEVCMD_PATH: ${{ needs.self-hosted-preflight.outputs.vsdevcmd }}
      MSVC_TOOLSET_VERSION: ${{ needs.self-hosted-preflight.outputs.msvc_toolset }}
      EVIDENCE_ROOT: ${{ github.workspace }}\_nc003b_pr42_evidence_${{ github.run_id }}_${{ github.run_attempt }}
      PACKAGE_ROOT: ${{ github.workspace }}\_nc003b_pr42_package_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - name: Runner proof and evidence initialization
        shell: powershell
        run: |
          $ErrorActionPreference='Stop';$E=$env:EVIDENCE_ROOT;if(Test-Path $E){throw "Unique evidence root exists: $E"};New-Item -ItemType Directory -Path $E|Out-Null
          foreach($p in @($env:CMAKE_EXE,$env:CTEST_EXE)){if(-not(Test-Path -LiteralPath $p -PathType Leaf)){throw 'Discovered tool no longer exists.'}}
          if((Split-Path $env:CMAKE_EXE -Parent)-ine$env:CMAKE_BIN_DIR-or(Split-Path $env:CTEST_EXE -Parent)-ine$env:CMAKE_BIN_DIR){throw 'CMake bin directory mismatch.'}
          if((Get-FileHash $env:CMAKE_EXE -Algorithm SHA256).Hash-ine$env:EXPECTED_CMAKE_SHA256-or(Get-FileHash $env:CTEST_EXE -Algorithm SHA256).Hash-ine$env:EXPECTED_CTEST_SHA256){throw 'Toolchain hash changed after preflight.'}
          $cmakeVersion=(& $env:CMAKE_EXE --version 2>&1)-join"`n";if($LASTEXITCODE-ne0){throw 'Discovered CMake invocation failed.'};$ctestVersion=(& $env:CTEST_EXE --version 2>&1)-join"`n";if($LASTEXITCODE-ne0){throw 'Discovered CTest invocation failed.'}
          $utf8NoBom=New-Object System.Text.UTF8Encoding($false);[IO.File]::AppendAllText($env:GITHUB_PATH,"$env:CMAKE_BIN_DIR`n",$utf8NoBom)
          $cm=(Get-Item $env:CMAKE_EXE);$ct=(Get-Item $env:CTEST_EXE)
          $runner=[ordered]@{run_id=[long]$env:GITHUB_RUN_ID;run_attempt=[int]$env:GITHUB_RUN_ATTEMPT;runner_name='${{ runner.name }}';runner_os='${{ runner.os }}';runner_arch='${{ runner.arch }}';script_path=$PSCommandPath;script_extension=[IO.Path]::GetExtension($PSCommandPath);policy_env=$env:PSExecutionPolicyPreference;effective_policy=(Get-ExecutionPolicy);process_policy=(Get-ExecutionPolicy -Scope Process);cmake_exe=$env:CMAKE_EXE;ctest_exe=$env:CTEST_EXE;cmake_bin=$env:CMAKE_BIN_DIR;cmake_source=$env:CMAKE_DISCOVERY_SOURCE}
          $tool=[ordered]@{powershell=(Get-Command powershell.exe).Source;git=((& git --version)-join"`n");python=((& python --version 2>&1)-join"`n");cmake_path=$env:CMAKE_EXE;ctest_path=$env:CTEST_EXE;cmake_version=$cmakeVersion;ctest_version=$ctestVersion;cmake_sha256=$env:EXPECTED_CMAKE_SHA256;ctest_sha256=$env:EXPECTED_CTEST_SHA256;cmake_size=$cm.Length;ctest_size=$ct.Length;cmake_source=$env:CMAKE_DISCOVERY_SOURCE;visual_studio_installation=$env:VS_INSTALLATION_PATH;visual_studio_version=$env:VS_INSTALLATION_VERSION;vsdevcmd=$env:VSDEVCMD_PATH;msvc_toolset=$env:MSVC_TOOLSET_VERSION}
          $runner|ConvertTo-Json -Depth 8|Set-Content -Encoding utf8 (Join-Path $E 'runner-proof.json');$tool|ConvertTo-Json -Depth 8|Set-Content -Encoding utf8 (Join-Path $E 'toolchain-versions.json')
          [ordered]@{status='PASS';selected=[ordered]@{cmake_exe=$env:CMAKE_EXE;ctest_exe=$env:CTEST_EXE;bin=$env:CMAKE_BIN_DIR;source=$env:CMAKE_DISCOVERY_SOURCE;cmake_version=$cmakeVersion;ctest_version=$ctestVersion;cmake_sha256=$env:EXPECTED_CMAKE_SHA256;ctest_sha256=$env:EXPECTED_CTEST_SHA256};candidates=@()}|ConvertTo-Json -Depth 8|Set-Content -Encoding utf8 (Join-Path $E 'cmake-discovery.json')
          @("RESOLVED_PREFLIGHT_CMAKE=$env:CMAKE_EXE","RESOLVED_PREFLIGHT_CTEST=$env:CTEST_EXE","CMAKE_VERSION=$cmakeVersion","CTEST_VERSION=$ctestVersion","CMAKE_DISCOVERY_SOURCE=$env:CMAKE_DISCOVERY_SOURCE")|Set-Content -Encoding utf8 (Join-Path $E 'cmake-discovery.log')
          git config --global --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'global-git-config-before.txt');git config --system --list --show-origin 2>&1|Set-Content -Encoding utf8 (Join-Path $E 'system-git-config-before.txt')
      - name: Manual exact candidate checkout
        shell: powershell
        run: |
          $root=Join-Path $env:RUNNER_TEMP "nc003b-pr42-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT";if(Test-Path $root){throw 'Unique checkout path exists'}
          git init $root;git -C $root config --local core.autocrlf false;git -C $root config --local core.eol lf;git -C $root remote add origin https://github.com/Dziuras98/Nextcar.git
          git -C $root fetch --no-tags --prune origin +refs/heads/agent/nc-003b-phase0-source-normalization-integration:refs/remotes/origin/candidate
          git -C $root checkout --detach $env:CANDIDATE_SHA;if($LASTEXITCODE){throw 'Exact candidate checkout failed'}
          "CHECKOUT_ROOT=$root"|Out-File $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Fail-closed topology and scope
        shell: powershell
        run: |
          Set-Location $env:CHECKOUT_ROOT;function Eq($a,$e,$n){if(([string]$a).Trim()-ne$e){throw "$n mismatch"}}
          Eq (git rev-parse HEAD) $env:CANDIDATE_SHA 'HEAD';Eq (git rev-parse 'HEAD^{tree}') $env:CANDIDATE_TREE 'HEAD tree';Eq (git rev-list --parents -n 1 HEAD) "$env:CANDIDATE_SHA $env:SOURCE_SHA" 'candidate parent';Eq (git rev-parse "$env:SOURCE_SHA^{tree}") $env:SOURCE_TREE 'source tree';Eq (git rev-list --parents -n 1 $env:SOURCE_SHA) "$env:SOURCE_SHA $env:B_SHA $env:G_SHA" 'source parents';Eq (git rev-parse "$env:B_SHA^{tree}") $env:B_TREE 'B tree';Eq (git rev-parse "$env:G_SHA^{tree}") $env:G_TREE 'G tree'
