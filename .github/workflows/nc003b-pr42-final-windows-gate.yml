name: NC-003B immutable workflow source export
on:
  push:
    branches:
      - agent/nc-003b-pr42-final-windows-gate-bootstrap
    paths:
      - .github/workflows/nc003b-pr42-final-windows-gate.yml

permissions:
  contents: read
  statuses: write

env:
  SOURCE_COMMIT: 3fb790c4da74906007724e84ca6506a51af3e332
  SOURCE_BLOB: d5d5b1f5641d151d0e5d4b75499326d6c1fa5cae
  SOURCE_PATH: .github/workflows/nc003b-pr42-final-windows-gate.yml
  STATUS_CONTEXT: NC-003B Bootstrap / Immutable source export

jobs:
  announce-run:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending bootstrap status with run ID
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          payload = json.dumps({
              "state": "pending",
              "context": os.environ["STATUS_CONTEXT"],
              "description": "Immutable source workflow export running",
              "target_url": f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['COMMIT_SHA']}",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 201:
                  raise RuntimeError(f"Unexpected status publication response: {response.status}")
          PY

  self-hosted-source-export:
    needs: announce-run
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 20
    env:
      EVIDENCE_ROOT: ${{ github.workspace }}\_immutable_source_export_${{ github.run_id }}_${{ github.run_attempt }}
    outputs:
      classification: ${{ steps.inspect.outputs.classification }}
      reconstructed-blob: ${{ steps.inspect.outputs.reconstructed_blob }}
      upload-outcome: ${{ steps.upload.outcome }}
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
    steps:
      - name: Initialize immutable source evidence
        id: initialize
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:EVIDENCE_ROOT
          Remove-Item -LiteralPath $root -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $root | Out-Null
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          function Write-Utf8([string]$Name, [string]$Value) {
            [IO.File]::WriteAllText((Join-Path $root $Name), $Value, $utf8)
          }
          Write-Utf8 'classification.txt' 'STOP — IMMUTABLE SOURCE WORKFLOW EXPORT FAILED'
          Write-Utf8 'source-export-first-error.txt' 'NOT_COMPLETED'
          Write-Utf8 'candidate-checkout.txt' 'CANDIDATE NOT CHECKED OUT'
          Write-Utf8 'run-id.txt' $env:GITHUB_RUN_ID
          Write-Utf8 'run-attempt.txt' $env:GITHUB_RUN_ATTEMPT
          Write-Utf8 'runner-name.txt' $env:RUNNER_NAME
          Write-Utf8 'runner-os.txt' $env:RUNNER_OS
          Write-Utf8 'runner-arch.txt' $env:RUNNER_ARCH
          Write-Utf8 'source-api-response.json' '{"status":"NOT_COMPLETED"}'
          Write-Utf8 'source-identity.json' '{"status":"NOT_COMPLETED"}'
          Write-Utf8 'source-identity.txt' 'NOT_COMPLETED'

      - name: Fetch and verify immutable source workflow
        id: fetch
        continue-on-error: true
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:EVIDENCE_ROOT
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          function Write-Utf8([string]$Name, [string]$Value) {
            [IO.File]::WriteAllText((Join-Path $root $Name), $Value, $utf8)
          }
          try {
            $escapedPath = (($env:SOURCE_PATH -split '/') | ForEach-Object { [Uri]::EscapeDataString($_) }) -join '/'
            $uri = "https://api.github.com/repos/Dziuras98/Nextcar/contents/$escapedPath`?ref=$($env:SOURCE_COMMIT)"
            $headers = @{
              Authorization = "Bearer $env:GH_TOKEN"
              Accept = 'application/vnd.github+json'
              'X-GitHub-Api-Version' = '2022-11-28'
            }
            $response = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers
            if ([string]$response.type -ne 'file') {
              throw "API response type mismatch: $($response.type)"
            }
            if ([string]$response.encoding -ne 'base64') {
              throw "API response encoding mismatch: $($response.encoding)"
            }
            if ([string]$response.sha -ne $env:SOURCE_BLOB) {
              throw "API blob SHA mismatch: $($response.sha)"
            }
            if ([string]::IsNullOrWhiteSpace([string]$response.content)) {
              throw 'API response content is empty'
            }

            $metadata = [ordered]@{
              repository = 'Dziuras98/Nextcar'
              source_commit = $env:SOURCE_COMMIT
              source_path = $env:SOURCE_PATH
              type = [string]$response.type
              encoding = [string]$response.encoding
              sha = [string]$response.sha
              size = [int64]$response.size
              content = [string]$response.content
            }
            Write-Utf8 'source-api-response.json' ($metadata | ConvertTo-Json -Depth 8)

            $base64Text = ([string]$response.content) -replace '\s', ''
            $sourceBytes = [Convert]::FromBase64String($base64Text)
            $sourcePath = Join-Path $root 'source-workflow.yml'
            [IO.File]::WriteAllBytes($sourcePath, $sourceBytes)

            $prefix = [Text.Encoding]::ASCII.GetBytes("blob $($sourceBytes.Length)`0")
            $objectBytes = New-Object byte[] ($prefix.Length + $sourceBytes.Length)
            [Array]::Copy($prefix, 0, $objectBytes, 0, $prefix.Length)
            [Array]::Copy($sourceBytes, 0, $objectBytes, $prefix.Length, $sourceBytes.Length)
            $sha1 = [Security.Cryptography.SHA1]::Create()
            try {
              $gitBlob = ([BitConverter]::ToString($sha1.ComputeHash($objectBytes))).Replace('-', '').ToLowerInvariant()
            } finally {
              $sha1.Dispose()
            }
            $sha256 = [Security.Cryptography.SHA256]::Create()
            try {
              $sourceSha256 = ([BitConverter]::ToString($sha256.ComputeHash($sourceBytes))).Replace('-', '').ToLowerInvariant()
            } finally {
              $sha256.Dispose()
            }
            $canonicalBase64 = [Convert]::ToBase64String($sourceBytes)
            $roundTripBytes = [Convert]::FromBase64String($canonicalBase64)
            $roundTrip = ($roundTripBytes.Length -eq $sourceBytes.Length)
            if ($roundTrip) {
              for ($i = 0; $i -lt $sourceBytes.Length; $i++) {
                if ($roundTripBytes[$i] -ne $sourceBytes[$i]) {
                  $roundTrip = $false
                  break
                }
              }
            }
            $bom = $sourceBytes.Length -ge 3 -and $sourceBytes[0] -eq 0xEF -and $sourceBytes[1] -eq 0xBB -and $sourceBytes[2] -eq 0xBF
            $lfCount = 0
            $crlfCount = 0
            for ($i = 0; $i -lt $sourceBytes.Length; $i++) {
              if ($sourceBytes[$i] -eq 0x0A) {
                $lfCount++
                if ($i -gt 0 -and $sourceBytes[$i - 1] -eq 0x0D) {
                  $crlfCount++
                }
              }
            }

            $apiPass = ([string]$response.sha -eq $env:SOURCE_BLOB)
            $blobPass = ($gitBlob -eq $env:SOURCE_BLOB)
            if (-not $apiPass) { throw 'API_BLOB_SHA: FAIL' }
            if (-not $blobPass) { throw "RECONSTRUCTED_GIT_BLOB_SHA: FAIL ($gitBlob)" }
            if (-not $roundTrip) { throw 'BASE64_ROUNDTRIP: FAIL' }

            $identity = [ordered]@{
              repository = 'Dziuras98/Nextcar'
              source_commit = $env:SOURCE_COMMIT
              source_path = $env:SOURCE_PATH
              api_encoding = [string]$response.encoding
              api_reported_blob_sha = [string]$response.sha
              reconstructed_git_blob_sha = $gitBlob
              source_sha256 = $sourceSha256
              source_byte_size = [int64]$sourceBytes.Length
              canonical_base64_length = [int64]$canonicalBase64.Length
              base64_round_trip = 'PASS'
              utf8_bom_present = [bool]$bom
              lf_count = [int64]$lfCount
              crlf_count = [int64]$crlfCount
              api_blob_sha_result = 'PASS'
              reconstructed_git_blob_sha_result = 'PASS'
              timestamp_utc = [DateTime]::UtcNow.ToString('o')
              powershell = $PSVersionTable.PSVersion.ToString()
              powershell_edition = [string]$PSVersionTable.PSEdition
            }
            Write-Utf8 'source-identity.json' ($identity | ConvertTo-Json -Depth 8)
            $identityText = @(
              "repository=$($identity.repository)"
              "source_commit=$($identity.source_commit)"
              "source_path=$($identity.source_path)"
              "api_encoding=$($identity.api_encoding)"
              "api_reported_blob_sha=$($identity.api_reported_blob_sha)"
              "reconstructed_git_blob_sha=$($identity.reconstructed_git_blob_sha)"
              "source_sha256=$($identity.source_sha256)"
              "source_byte_size=$($identity.source_byte_size)"
              "canonical_base64_length=$($identity.canonical_base64_length)"
              "base64_round_trip=$($identity.base64_round_trip)"
              "utf8_bom_present=$($identity.utf8_bom_present)"
              "lf_count=$($identity.lf_count)"
              "crlf_count=$($identity.crlf_count)"
              "api_blob_sha_result=$($identity.api_blob_sha_result)"
              "reconstructed_git_blob_sha_result=$($identity.reconstructed_git_blob_sha_result)"
              "timestamp_utc=$($identity.timestamp_utc)"
              "powershell=$($identity.powershell)"
              "powershell_edition=$($identity.powershell_edition)"
            ) -join "`n"
            Write-Utf8 'source-identity.txt' $identityText
            Write-Utf8 'source-export-first-error.txt' 'NONE'
            Write-Utf8 'classification.txt' 'IMMUTABLE SOURCE WORKFLOW EXPORT PASS'
          } catch {
            $message = "$($_.Exception.GetType().FullName): $($_.Exception.Message)"
            Write-Utf8 'source-export-first-error.txt' $message
            Write-Error $message
          }

      - name: Ensure terminal fallback evidence
        id: fallback
        if: ${{ always() }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:EVIDENCE_ROOT
          $errorPath = Join-Path $root 'source-export-first-error.txt'
          if (-not (Test-Path -LiteralPath $errorPath -PathType Leaf)) {
            [IO.File]::WriteAllText($errorPath, 'FETCH STEP DID NOT PRODUCE TERMINAL EVIDENCE', (New-Object System.Text.UTF8Encoding($false)))
          } else {
            $current = [IO.File]::ReadAllText($errorPath)
            if ([string]::IsNullOrWhiteSpace($current) -or $current -eq 'NOT_COMPLETED') {
              [IO.File]::WriteAllText($errorPath, 'FETCH STEP DID NOT PRODUCE TERMINAL EVIDENCE', (New-Object System.Text.UTF8Encoding($false)))
            }
          }

      - name: Inspect source export evidence
        id: inspect
        if: ${{ always() }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:EVIDENCE_ROOT
          $classification = [IO.File]::ReadAllText((Join-Path $root 'classification.txt')).Trim()
          $reconstructed = ''
          $identityPath = Join-Path $root 'source-identity.json'
          if (Test-Path -LiteralPath $identityPath -PathType Leaf) {
            try {
              $identity = [IO.File]::ReadAllText($identityPath) | ConvertFrom-Json
              $reconstructed = [string]$identity.reconstructed_git_blob_sha
            } catch {
              $reconstructed = ''
            }
          }
          "classification=$classification" >> $env:GITHUB_OUTPUT
          "reconstructed_blob=$reconstructed" >> $env:GITHUB_OUTPUT

      - name: Upload immutable source workflow evidence
        id: upload
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-immutable-source-workflow-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.EVIDENCE_ROOT }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 7

      - name: Enforce immutable source export result
        if: ${{ always() }}
        shell: powershell
        env:
          CLASSIFICATION: ${{ steps.inspect.outputs.classification }}
          RECONSTRUCTED_BLOB: ${{ steps.inspect.outputs.reconstructed_blob }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:CLASSIFICATION -ne 'IMMUTABLE SOURCE WORKFLOW EXPORT PASS') {
            throw "Classification enforcement failed: $env:CLASSIFICATION"
          }
          if ($env:RECONSTRUCTED_BLOB -ne $env:SOURCE_BLOB) {
            throw "Reconstructed blob enforcement failed: $env:RECONSTRUCTED_BLOB"
          }
          if ($env:UPLOAD_OUTCOME -ne 'success') {
            throw "Artifact upload enforcement failed: $env:UPLOAD_OUTCOME"
          }

  terminalize-source-export:
    if: ${{ always() }}
    needs: [announce-run, self-hosted-source-export]
    runs-on: ubuntu-latest
    steps:
      - name: Publish terminal bootstrap status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          EXPORT_RESULT: ${{ needs.self-hosted-source-export.result }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          success = os.environ["EXPORT_RESULT"] == "success"
          payload = json.dumps({
              "state": "success" if success else "failure",
              "context": os.environ["STATUS_CONTEXT"],
              "description": (
                  "IMMUTABLE SOURCE WORKFLOW EXPORT PASS"
                  if success
                  else "STOP — IMMUTABLE SOURCE WORKFLOW EXPORT FAILED"
              ),
              "target_url": f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['COMMIT_SHA']}",
              data=payload,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 201:
                  raise RuntimeError(f"Unexpected terminal status response: {response.status}")
          PY
