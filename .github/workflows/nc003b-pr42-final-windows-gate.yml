name: "NC-003B PR42 artifact transport diagnostics"

on:
  push:
    branches:
      - agent/nc-003b-pr42-final-windows-gate-bootstrap
    paths:
      - .github/workflows/nc003b-pr42-final-windows-gate.yml

permissions:
  contents: read
  actions: read
  statuses: write

env:
  CANDIDATE_SHA: 1b2bc3599a0811be88a3b55987a4d27c72672a46
  DIAGNOSTIC_CONTEXT: NC-003B Phase 0 / Artifact transport diagnostics

jobs:
  announce-diagnostic-run:
    name: "Announce PowerShell and artifact diagnostic run"
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending diagnostic status with run ID
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          body = json.dumps({
              "state": "pending",
              "context": os.environ["DIAGNOSTIC_CONTEXT"],
              "description": "Windows PowerShell execution diagnostic running",
              "target_url": f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",
              data=body,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 201:
                  raise RuntimeError(f"Unexpected status publication response: {response.status}")
          PY

  control-artifact-probe:
    name: "GitHub-hosted artifact control probe"
    needs: announce-diagnostic-run
    runs-on: ubuntu-latest
    outputs:
      upload_outcome: ${{ steps.control-upload.outcome }}
    steps:
      - name: Create control probe
        shell: bash
        run: |
          set -euo pipefail
          cat > control-probe.txt <<EOF
          repository=Dziuras98/Nextcar
          run_id=${GITHUB_RUN_ID}
          runner=github-hosted
          purpose=artifact-control-probe
          EOF
          test -f control-probe.txt
          wc -c control-probe.txt

      - name: Upload GitHub-hosted artifact control probe
        id: control-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-artifact-control-probe-${{ github.run_id }}
          path: control-probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3

      - name: Record control probe outcome
        if: always()
        shell: bash
        run: |
          echo "control_upload_outcome=${{ steps.control-upload.outcome }}"
          echo "control_job_status=${{ job.status }}"

  self-hosted-powershell-artifact-probe:
    name: "Self-hosted built-in PowerShell artifact probe"
    needs: announce-diagnostic-run
    if: always()
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 20
    outputs:
      upload_outcome: ${{ steps.self-upload.outcome }}
    steps:
      - name: Execute built-in Windows PowerShell and create probe
        id: powershell-proof
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          Write-Host 'POWERSHELL_BODY_EXECUTED=true'
          Write-Host "POWERSHELL_VERSION=$($PSVersionTable.PSVersion)"
          Write-Host "POWERSHELL_EDITION=$($PSVersionTable.PSEdition)"
          Write-Host "POWERSHELL_EXECUTABLE=$((Get-Process -Id $PID).Path)"
          Write-Host "PSCOMMAND_PATH=$PSCommandPath"
          Write-Host "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
          Write-Host "RUNNER_NAME=$env:RUNNER_NAME"
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"
          Write-Host "RUNNER_TOOL_CACHE=$env:RUNNER_TOOL_CACHE"
          Write-Host "CURRENT_DIRECTORY=$((Get-Location).Path)"

          if ([string]::IsNullOrWhiteSpace($PSCommandPath)) {
              throw 'PSCommandPath is empty; runner script materialization not proven.'
          }

          $UploadRoot = Join-Path `
              $env:GITHUB_WORKSPACE `
              '_artifact_probe_upload'

          $UploadFile = Join-Path `
              $UploadRoot `
              'probe.txt'

          if (Test-Path -LiteralPath $UploadRoot) {
              throw "Unique upload root already exists: $UploadRoot"
          }

          New-Item `
              -ItemType Directory `
              -Path $UploadRoot |
              Out-Null

          @(
              'repository=Dziuras98/Nextcar'
              "run_id=$env:GITHUB_RUN_ID"
              "run_attempt=$env:GITHUB_RUN_ATTEMPT"
              'runner=DESKTOP-P4CTGHS'
              'shell=powershell'
              'purpose=builtin-powershell-artifact-probe'
          ) |
              Set-Content `
                  -LiteralPath $UploadFile `
                  -Encoding utf8

          if (-not (Test-Path -LiteralPath $UploadFile -PathType Leaf)) {
              throw "PowerShell did not create probe file: $UploadFile"
          }

          $item = Get-Item -LiteralPath $UploadFile

          if ($item.Length -le 0) {
              throw 'Probe file is empty.'
          }

          Write-Host "UPLOAD_FULL_NAME=$($item.FullName)"
          Write-Host "UPLOAD_LENGTH=$($item.Length)"
          Write-Host "UPLOAD_SHA256=$((Get-FileHash -LiteralPath $UploadFile -Algorithm SHA256).Hash)"

          Get-Content `
              -LiteralPath $UploadFile |
              ForEach-Object {
                  Write-Host "PROBE_CONTENT=$_"
              }

          Get-ChildItem `
              -LiteralPath $UploadRoot `
              -Force |
              Format-List FullName,Length,Attributes,CreationTimeUtc,LastWriteTimeUtc

          'proof=true' |
              Out-File `
                  -FilePath $env:GITHUB_OUTPUT `
                  -Encoding utf8 `
                  -Append

      - name: Verify PowerShell side effects from cmd
        shell: cmd
        run: |
          @echo off
          setlocal

          set "UPLOAD_FILE=%GITHUB_WORKSPACE%\_artifact_probe_upload\probe.txt"

          echo CMD_CURRENT_DIRECTORY=%CD%
          echo CMD_GITHUB_WORKSPACE=%GITHUB_WORKSPACE%
          echo CMD_UPLOAD_FILE=%UPLOAD_FILE%

          if not exist "%UPLOAD_FILE%" (
            echo ERROR: probe file created by PowerShell does not exist
            exit /b 1
          )

          for %%I in ("%UPLOAD_FILE%") do (
            echo CMD_UPLOAD_FULL_NAME=%%~fI
            echo CMD_UPLOAD_LENGTH=%%~zI
          )

          type "%UPLOAD_FILE%"
          if errorlevel 1 exit /b 1

          certutil -hashfile "%UPLOAD_FILE%" SHA256
          if errorlevel 1 exit /b 1

          dir /a "%GITHUB_WORKSPACE%\_artifact_probe_upload"
          if errorlevel 1 exit /b 1

          exit /b 0

      - name: Upload self-hosted built-in PowerShell probe
        id: self-upload
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-self-hosted-powershell-probe-${{ github.run_id }}
          path: ${{ github.workspace }}\_artifact_probe_upload\probe.txt
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Record self-hosted upload outcome
        if: always()
        shell: powershell
        run: |
          $UploadFile = Join-Path $env:GITHUB_WORKSPACE '_artifact_probe_upload\probe.txt'
          Write-Host "self_upload_outcome=${{ steps.self-upload.outcome }}"
          Write-Host "job_status=${{ job.status }}"
          $exists = Test-Path -LiteralPath $UploadFile -PathType Leaf
          Write-Host "probe_exists_after_action=$exists"
          if ($exists) {
              $item = Get-Item -LiteralPath $UploadFile
              Write-Host "probe_length_after_action=$($item.Length)"
              Write-Host "probe_sha256_after_action=$((Get-FileHash -LiteralPath $UploadFile -Algorithm SHA256).Hash)"
          }

  publish-diagnostic-result:
    name: "Publish PowerShell artifact diagnostic result"
    needs:
      - announce-diagnostic-run
      - control-artifact-probe
      - self-hosted-powershell-artifact-probe
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish terminal diagnostic status
        env:
          GH_TOKEN: ${{ github.token }}
          CONTROL_OUTCOME: ${{ needs.control-artifact-probe.outputs.upload_outcome }}
          SELF_OUTCOME: ${{ needs.self-hosted-powershell-artifact-probe.outputs.upload_outcome }}
          CONTROL_RESULT: ${{ needs.control-artifact-probe.result }}
          SELF_RESULT: ${{ needs.self-hosted-powershell-artifact-probe.result }}
        shell: bash
        run: |
          set -euo pipefail
          echo "control_job_result=${CONTROL_RESULT}"
          echo "self_job_result=${SELF_RESULT}"
          echo "control_upload_outcome=${CONTROL_OUTCOME}"
          echo "self_upload_outcome=${SELF_OUTCOME}"
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          control_outcome = os.environ.get("CONTROL_OUTCOME", "")
          self_outcome = os.environ.get("SELF_OUTCOME", "")
          self_result = os.environ.get("SELF_RESULT", "")

          if control_outcome == "success" and self_outcome == "success":
              state = "success"
              description = "Built-in PowerShell and self-hosted artifact upload passed"
          elif self_result == "failure" and not self_outcome:
              state = "failure"
              description = "Windows PowerShell script execution proof failed"
          else:
              state = "failure"
              description = "Self-hosted built-in PowerShell artifact probe failed"

          body = json.dumps({
              "state": state,
              "context": os.environ["DIAGNOSTIC_CONTEXT"],
              "description": description,
              "target_url": f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          }).encode("utf-8")
          request = urllib.request.Request(
              f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",
              data=body,
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urllib.request.urlopen(request) as response:
              if response.status != 201:
                  raise RuntimeError(f"Unexpected status publication response: {response.status}")
          PY
