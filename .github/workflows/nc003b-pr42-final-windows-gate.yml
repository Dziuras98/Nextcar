name: "NC-003B PR42 self-hosted toolchain discovery"
on:
  push:
    branches: [agent/nc-003b-pr42-final-windows-gate-bootstrap]
    paths: [.github/workflows/nc003b-pr42-final-windows-gate.yml]
permissions:
  contents: read
  actions: read
  statuses: write
env:
  CANDIDATE_SHA: 1b2bc3599a0811be88a3b55987a4d27c72672a46
  STATUS_CONTEXT: NC-003B Phase 0 / Self-hosted toolchain discovery
jobs:
  announce-run:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending discovery status with run ID
        env: {GH_TOKEN: "${{ github.token }}"}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json,os,urllib.request
          b=json.dumps({'state':'pending','context':os.environ['STATUS_CONTEXT'],'description':'Self-hosted Windows toolchain discovery running','target_url':f"https://github.com/Dziuras98/Nextcar/actions/runs/{os.environ['GITHUB_RUN_ID']}"}).encode()
          q=urllib.request.Request(f"https://api.github.com/repos/Dziuras98/Nextcar/statuses/{os.environ['CANDIDATE_SHA']}",data=b,method='POST',headers={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'})
          with urllib.request.urlopen(q) as r: assert r.status==201
          PY
  control-artifact-probe:
    needs: announce-run
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: printf '%s\n' "run_id=$GITHUB_RUN_ID" "attempt=$GITHUB_RUN_ATTEMPT" > control-probe.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-artifact-control-probe-${{ github.run_id }}
          path: control-probe.txt
          compression-level: 0
          if-no-files-found: error
          retention-days: 3
  self-hosted-toolchain-discovery:
    needs: [announce-run, control-artifact-probe]
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 30
    env:
      PSExecutionPolicyPreference: Bypass
      EVIDENCE_ROOT: ${{ github.workspace }}\_toolchain_discovery_${{ github.run_id }}_${{ github.run_attempt }}
      UPLOAD_ROOT: ${{ github.workspace }}\_toolchain_upload_${{ github.run_id }}_${{ github.run_attempt }}
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
      artifact-digest: ${{ steps.upload.outputs.artifact-digest }}
      upload-outcome: ${{ steps.upload.outcome }}
      expected-artifact-name: ${{ steps.seal.outputs.expected_artifact_name }}
      local-zip-name: ${{ steps.seal.outputs.local_zip_name }}
      local-zip-sha256: ${{ steps.seal.outputs.local_zip_sha256 }}
      local-zip-size: ${{ steps.seal.outputs.local_zip_size }}
      evidence-file-count: ${{ steps.seal.outputs.evidence_file_count }}
      discovery-classification: ${{ steps.seal.outputs.discovery_classification }}
    steps:
      - name: Discover and persist evidence
        id: discovery
        continue-on-error: true
        shell: powershell
        run: |
          $ErrorActionPreference='Stop'
          $root=$env:EVIDENCE_ROOT
          New-Item -ItemType Directory -Force -Path $root|Out-Null
          function Utf8([string]$p,[object]$v){[IO.File]::WriteAllText($p,[string]$v,(New-Object Text.UTF8Encoding($false)))}
          function Text([string]$n,[object]$v){$p=Join-Path $root $n;$t="$p.tmp";Utf8 $t $v;$null=Get-Content $t -Raw;Move-Item $t $p -Force}
          function Json([string]$n,[object]$v){$p=Join-Path $root $n;$t="$p.tmp";Utf8 $t ($v|ConvertTo-Json -Depth 24);$null=Get-Content $t -Raw|ConvertFrom-Json;Move-Item $t $p -Force;$null=Get-Content $p -Raw|ConvertFrom-Json}
          $sent=[ordered]@{status='FAIL';classification='DISCOVERY_NOT_COMPLETED';first_error='Discovery did not reach final persistence.'}
          Json 'cmake-discovery.json' $sent;Text 'cmake-discovery.log' $sent.first_error;Text 'cmake-first-error.txt' $sent.first_error
          Json 'msvc-discovery.json' $sent;Text 'msvc-discovery.log' $sent.first_error;Text 'msvc-first-error.txt' $sent.first_error
          Text 'run-id.txt' $env:GITHUB_RUN_ID;Text 'run-attempt.txt' $env:GITHUB_RUN_ATTEMPT;Text 'runner-name.txt' $env:RUNNER_NAME;Text 'runner-os.txt' $env:RUNNER_OS;Text 'runner-arch.txt' $env:RUNNER_ARCH;Text 'candidate-checkout.txt' 'CANDIDATE NOT CHECKED OUT'
          try {
            $vswhere=@((Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'),(Join-Path $env:ProgramFiles 'Microsoft Visual Studio\Installer\vswhere.exe'))|Where-Object{$_ -and (Test-Path $_ -PathType Leaf)}|Sort-Object -Unique|Select-Object -First 1
            if(-not $vswhere){throw 'vswhere.exe not found.'}
            $raw=(& $vswhere -all -products '*' -format json -utf8 2>&1)-join"`n";if($LASTEXITCODE-ne0){throw "vswhere exit $LASTEXITCODE"}
            $instances=@($raw|ConvertFrom-Json);$rows=@()
            foreach($i in $instances){
              $p=[string]$i.installationPath
              $vc=(& $vswhere -products '*' -version "[$($i.installationVersion),$($i.installationVersion)]" -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2>&1)-join"`n";$hasVc=($LASTEXITCODE-eq0 -and (($vc-split"`r?`n") -contains $p))
              $cc=(& $vswhere -products '*' -version "[$($i.installationVersion),$($i.installationVersion)]" -requires Microsoft.VisualStudio.Component.VC.CMake.Project -property installationPath 2>&1)-join"`n";$hasCm=($LASTEXITCODE-eq0 -and (($cc-split"`r?`n") -contains $p))
              $vd=Join-Path $p 'Common7\Tools\VsDevCmd.bat';$bin=Join-Path $p 'Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin'
              $rows+=[pscustomobject]@{installationPath=$p;installationVersion=[string]$i.installationVersion;productId=[string]$i.productId;displayName=[string]$i.displayName;vc_tools_component=$hasVc;vc_cmake_component=$hasCm;vsdevcmd_path=$vd;vsdevcmd_exists=(Test-Path $vd -PathType Leaf);cmake_path=(Join-Path $bin 'cmake.exe');ctest_path=(Join-Path $bin 'ctest.exe')}
            }
            $eligible=@($rows|Where-Object{$_.vc_tools_component -and $_.vc_cmake_component -and $_.vsdevcmd_exists}|Sort-Object @{e={[version]$_.installationVersion};Descending=$true},@{e={$_.installationPath.ToLowerInvariant()}})
            if(-not $eligible){throw 'No qualifying Visual Studio instance.'};$sv=$eligible[0]
            $cmd=Join-Path $env:RUNNER_TEMP "nc003b-vsenv-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT.cmd";$stdout=Join-Path $root 'vsdevcmd-stdout.txt';$stderr=Join-Path $root 'vsdevcmd-stderr.txt'
            @('@echo off',"call `"$($sv.vsdevcmd_path)`" -no_logo -arch=x64 -host_arch=x64",'set')|Set-Content $cmd -Encoding ascii
            & cmd.exe /d /c $cmd 1>$stdout 2>$stderr;$vdExit=$LASTEXITCODE;$vdOut=Get-Content $stdout -Raw;$vdErr=Get-Content $stderr -Raw;Remove-Item $cmd -Force -ErrorAction SilentlyContinue
            $emap=@{};if($vdExit-eq0){foreach($line in($vdOut-split"`r?`n")){if($line-match'^([^=]+)=(.*)$'){$emap[$matches[1]]=$matches[2]}}}
            $cl=$null;if($emap['PATH']){foreach($dir in @($emap['PATH'] -split ';' | Where-Object { $_ })){$q=Join-Path $dir 'cl.exe';if(Test-Path $q -PathType Leaf){$cl=$q;break}}}
            $clOut='';$clExit=$null
            if($cl){$old=@{};foreach($k in $emap.Keys){$old[$k]=[Environment]::GetEnvironmentVariable($k,'Process');[Environment]::SetEnvironmentVariable($k,$emap[$k],'Process')};try{$clOut=(& $cl '/?' 2>&1)-join"`n";$clExit=$LASTEXITCODE}finally{foreach($k in $old.Keys){[Environment]::SetEnvironmentVariable($k,$old[$k],'Process')}}}
            $sdkDir=[string]$emap['WindowsSdkDir'];$sdkVer=[string]$emap['WindowsSDKVersion'];$sdk=[ordered]@{include_path=(Join-Path $sdkDir "Include\$sdkVer");lib_path=(Join-Path $sdkDir "Lib\$sdkVer");bin_path=(Join-Path $sdkDir "bin\$sdkVer")};$sdk.include_exists=Test-Path $sdk.include_path;$sdk.lib_exists=Test-Path $sdk.lib_path;$sdk.bin_exists=Test-Path $sdk.bin_path
            $msErr=$null;if($vdExit-ne0){$msErr="VsDevCmd exit $vdExit"}elseif(-not $cl){$msErr='cl.exe not found'}elseif($clExit-notin@(0,2)){$msErr="cl.exe exit $clExit"}elseif(-not($sdk.include_exists -and $sdk.lib_exists -and $sdk.bin_exists)){$msErr='Windows SDK evidence incomplete'}
            $ms=[ordered]@{status=$(if($msErr){'FAIL'}else{'PASS'});classification=$(if($msErr){'MSVC_INCOMPLETE'}else{'MSVC_PASS'});first_error=$msErr;vswhere_path=$vswhere;all_instances=$rows;selected_installation_path=$sv.installationPath;installation_version=$sv.installationVersion;product_id=$sv.productId;display_name=$sv.displayName;vc_tools_component=$sv.vc_tools_component;vc_cmake_component=$sv.vc_cmake_component;vsdevcmd_path=$sv.vsdevcmd_path;vsdevcmd_exit_code=$vdExit;vsdevcmd_stdout=$vdOut;vsdevcmd_stderr=$vdErr;cl_path=$cl;cl_invocation_command=$(if($cl){"$cl /?"}else{$null});cl_invocation_output=$clOut;cl_invocation_exit_code=$clExit;msvc_toolset_directory=[string]$emap['VCToolsInstallDir'];VCToolsVersion=[string]$emap['VCToolsVersion'];WindowsSdkDir=$sdkDir;WindowsSDKVersion=$sdkVer;windows_sdk_evidence=$sdk;selection_reason='Both components and VsDevCmd; highest installationVersion; ordinal-ignore-case path tie-break.'}
            Json 'msvc-discovery.json' $ms;Text 'msvc-discovery.log' ($ms|ConvertTo-Json -Depth 24);Text 'msvc-first-error.txt' $msErr
            $pairs=@();$priority=0
            function AddPair($source,$cmake,$ctest,$reason){$script:priority++;$script:pairs+=[pscustomobject]@{selection_priority=$script:priority;discovery_source=$source;cmake_path=$cmake;ctest_path=$ctest;selection_reason=$reason}}
            AddPair 'selected-visual-studio' $sv.cmake_path $sv.ctest_path 'Selected Visual Studio bundled pair'
            if($emap['PATH']){foreach($dir in @($emap['PATH'] -split ';' | Where-Object { $_ })){AddPair 'vsdevcmd-path' (Join-Path $dir 'cmake.exe') (Join-Path $dir 'ctest.exe') 'VsDevCmd process PATH'}}
            foreach($q in @(Get-Command cmake.exe -All -ErrorAction SilentlyContinue)){AddPair 'process-path' $q.Source (Join-Path (Split-Path $q.Source -Parent) 'ctest.exe') 'Process PATH'}
            foreach($pf in @($env:ProgramFiles,${env:ProgramFiles(x86)})|Where-Object{$_}){AddPair 'program-files' (Join-Path $pf 'CMake\bin\cmake.exe') (Join-Path $pf 'CMake\bin\ctest.exe') 'Standard Program Files location'}
            $attempts=@();$selected=$null
            foreach($p in $pairs){
              $a=[ordered]@{selection_priority=$p.selection_priority;discovery_source=$p.discovery_source;cmake_path=$p.cmake_path;ctest_path=$p.ctest_path;selection_reason=$p.selection_reason;cmake_exists=(Test-Path $p.cmake_path -PathType Leaf);ctest_exists=(Test-Path $p.ctest_path -PathType Leaf);same_bin_directory=$false;cmake_version_output=$null;ctest_version_output=$null;cmake_version=$null;ctest_version=$null;cmake_invocation_exit_code=$null;ctest_invocation_exit_code=$null;cmake_sha256=$null;ctest_sha256=$null;cmake_size=$null;ctest_size=$null;rejection_reason=$null}
              if(-not $a.cmake_exists){$a.rejection_reason='cmake missing'}elseif(-not $a.ctest_exists){$a.rejection_reason='ctest missing'}else{$a.same_bin_directory=((Split-Path $p.cmake_path -Parent)-ieq(Split-Path $p.ctest_path -Parent));if(-not $a.same_bin_directory){$a.rejection_reason='different bin'}else{$co=(& $p.cmake_path --version 2>&1)-join"`n";$ce=$LASTEXITCODE;$to=(& $p.ctest_path --version 2>&1)-join"`n";$te=$LASTEXITCODE;$a.cmake_version_output=$co;$a.ctest_version_output=$to;$a.cmake_invocation_exit_code=$ce;$a.ctest_invocation_exit_code=$te;$cm=[regex]::Match($co,'cmake version\s+([0-9]+(?:\.[0-9]+)+)');$ct=[regex]::Match($to,'ctest version\s+([0-9]+(?:\.[0-9]+)+)');if($ce-ne0){$a.rejection_reason='cmake invocation failed'}elseif($te-ne0){$a.rejection_reason='ctest invocation failed'}elseif(-not $cm.Success -or -not $ct.Success){$a.rejection_reason='version parse failed'}else{$a.cmake_version=$cm.Groups[1].Value;$a.ctest_version=$ct.Groups[1].Value;$a.cmake_sha256=(Get-FileHash $p.cmake_path -Algorithm SHA256).Hash.ToLowerInvariant();$a.ctest_sha256=(Get-FileHash $p.ctest_path -Algorithm SHA256).Hash.ToLowerInvariant();$a.cmake_size=(Get-Item $p.cmake_path).Length;$a.ctest_size=(Get-Item $p.ctest_path).Length}}}
              $attempts+=[pscustomobject]$a;if(-not $a.rejection_reason -and -not $selected){$selected=[pscustomobject]$a}
            }
            $cmErr=$(if($selected){$null}elseif(@($attempts|Where-Object{$_.cmake_exists}).Count){'No valid complete CMake/CTest pair'}else{'No cmake.exe found'})
            $cm=[ordered]@{status=$(if($selected){'PASS'}else{'FAIL'});classification=$(if($selected){'CMAKE_CTEST_PASS'}elseif(@($attempts|Where-Object{$_.cmake_exists}).Count){'CMAKE_TOOLCHAIN_INCOMPLETE'}else{'CMAKE_NOT_FOUND'});first_error=$cmErr;selected=$selected;attempts=$attempts;selected_visual_studio_installation_path=$sv.installationPath}
            Json 'cmake-discovery.json' $cm;Text 'cmake-discovery.log' ($attempts|ConvertTo-Json -Depth 24);Text 'cmake-first-error.txt' $cmErr
          } catch {
            $e=$_.Exception.ToString();$cm=[ordered]@{status='FAIL';classification='DISCOVERY_SCRIPT_DEFECT';first_error=$e;selected=$null;attempts=@()};$ms=[ordered]@{status='FAIL';classification='DISCOVERY_SCRIPT_DEFECT';first_error=$e};Json 'cmake-discovery.json' $cm;Text 'cmake-discovery.log' $e;Text 'cmake-first-error.txt' $e;Json 'msvc-discovery.json' $ms;Text 'msvc-discovery.log' $e;Text 'msvc-first-error.txt' $e
          }
          $c=Get-Content (Join-Path $root 'cmake-discovery.json') -Raw|ConvertFrom-Json;$m=Get-Content (Join-Path $root 'msvc-discovery.json') -Raw|ConvertFrom-Json
          if($c.classification-eq'DISCOVERY_SCRIPT_DEFECT'-or$m.classification-eq'DISCOVERY_SCRIPT_DEFECT'){$class='STOP — TOOLCHAIN DISCOVERY SCRIPT DEFECT'}elseif($c.status-eq'PASS'-and$m.status-eq'PASS'){$class='SELF-HOSTED WINDOWS TOOLCHAIN DISCOVERY PASS'}elseif($c.classification-eq'CMAKE_NOT_FOUND'){$class='STOP — SELF-HOSTED WINDOWS CMAKE TOOLCHAIN UNAVAILABLE'}elseif($c.status-ne'PASS'){$class='STOP — SELF-HOSTED WINDOWS CMAKE TOOLCHAIN INCOMPLETE'}else{$class='STOP — SELF-HOSTED WINDOWS MSVC TOOLCHAIN INCOMPLETE'}
          Text 'classification.txt' $class;Write-Host $class
      - name: Seal and package discovery evidence
        id: seal
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference='Stop';$root=$env:EVIDENCE_ROOT;$upload=$env:UPLOAD_ROOT
          function Utf8($p,$v){[IO.File]::WriteAllText($p,[string]$v,(New-Object Text.UTF8Encoding($false)))}
          $required=@('cmake-discovery.json','cmake-discovery.log','cmake-first-error.txt','msvc-discovery.json','msvc-discovery.log','msvc-first-error.txt','classification.txt','candidate-checkout.txt','run-id.txt','run-attempt.txt','runner-name.txt','runner-os.txt','runner-arch.txt')
          foreach($n in $required){$p=Join-Path $root $n;if(-not(Test-Path $p -PathType Leaf)){throw "Missing required evidence: $n"};if($n.EndsWith('.json')){$null=Get-Content $p -Raw|ConvertFrom-Json}}
          $entries=@();foreach($f in @(Get-ChildItem $root -File -Recurse|Sort-Object FullName)){$rel=$f.FullName.Substring($root.Length).TrimStart('\').Replace('\','/');$entries+=[ordered]@{relative_path=$rel;size=[int64]$f.Length;sha256=(Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLowerInvariant()}}
          $manifest=[ordered]@{schema='nc003b-toolchain-discovery-evidence-file-manifest-v1';run_id=$env:GITHUB_RUN_ID;run_attempt=$env:GITHUB_RUN_ATTEMPT;file_count=$entries.Count;files=$entries};$mp=Join-Path $root 'evidence-file-manifest.json';$tmp="$mp.tmp";Utf8 $tmp ($manifest|ConvertTo-Json -Depth 8);$parsed=Get-Content $tmp -Raw|ConvertFrom-Json;if([int]$parsed.file_count-ne$entries.Count){throw 'Manifest parse/count mismatch'};Move-Item $tmp $mp -Force;$null=Get-Content $mp -Raw|ConvertFrom-Json;Utf8 (Join-Path $root 'evidence-file-manifest.txt') (($entries|ForEach-Object{"$($_.sha256)  $($_.size)  $($_.relative_path)"})-join"`n")
          foreach($e in $entries){$p=Join-Path $root ($e.relative_path.Replace('/','\'));if((Get-Item $p).Length-ne[long]$e.size){throw "Manifest size mismatch $($e.relative_path)"};if((Get-FileHash $p -Algorithm SHA256).Hash.ToLowerInvariant()-ne$e.sha256){throw "Manifest hash mismatch $($e.relative_path)"}}
          Remove-Item $upload -Recurse -Force -ErrorAction SilentlyContinue;New-Item -ItemType Directory -Force -Path $upload|Out-Null;$zipName="NC-003B-toolchain-discovery-evidence-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT.zip";$zip=Join-Path $upload $zipName
          Add-Type -AssemblyName System.IO.Compression;Add-Type -AssemblyName System.IO.Compression.FileSystem
          $fs=[IO.File]::Open($zip,[IO.FileMode]::CreateNew);try{$za=New-Object IO.Compression.ZipArchive($fs,[IO.Compression.ZipArchiveMode]::Create,$false);try{foreach($f in @(Get-ChildItem $root -File -Recurse|Sort-Object FullName)){$rel=$f.FullName.Substring($root.Length).TrimStart('\').Replace('\','/');$ze=$za.CreateEntry($rel,[IO.Compression.CompressionLevel]::NoCompression);$ze.LastWriteTime=[DateTimeOffset]::new(1980,1,1,0,0,0,[TimeSpan]::Zero);$src=[IO.File]::OpenRead($f.FullName);$dst=$ze.Open();try{$src.CopyTo($dst)}finally{$dst.Dispose();$src.Dispose()}}}finally{$za.Dispose()}}finally{$fs.Dispose()}
          if(-not(Test-Path $zip -PathType Leaf)){throw 'Local ZIP missing'};$zi=Get-Item $zip;if($zi.Length-le0){throw 'Local ZIP empty'};$z=[IO.Compression.ZipFile]::OpenRead($zip);try{$names=@($z.Entries|Where-Object{-not$_.FullName.EndsWith('/')}|ForEach-Object{$_.FullName});$names|ForEach-Object{Write-Host "ZIP_ENTRY $_"};if(-not($names-contains'evidence-file-manifest.json')){throw 'Manifest absent from ZIP'}}finally{$z.Dispose()}
          $verify=Join-Path $env:RUNNER_TEMP "nc003b-verify-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT";Remove-Item $verify -Recurse -Force -ErrorAction SilentlyContinue;[IO.Compression.ZipFile]::ExtractToDirectory($zip,$verify);$vm=Get-Content (Join-Path $verify 'evidence-file-manifest.json') -Raw|ConvertFrom-Json;foreach($e in $vm.files){$p=Join-Path $verify ($e.relative_path.Replace('/','\'));if(-not(Test-Path $p -PathType Leaf)){throw "ZIP missing $($e.relative_path)"};if((Get-Item $p).Length-ne[long]$e.size){throw "ZIP size mismatch $($e.relative_path)"};if((Get-FileHash $p -Algorithm SHA256).Hash.ToLowerInvariant()-ne$e.sha256){throw "ZIP hash mismatch $($e.relative_path)"}};Remove-Item $verify -Recurse -Force
          $class=(Get-Content (Join-Path $root 'classification.txt') -Raw).Trim();$hash=(Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant();$name="NC-003B-toolchain-discovery-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          "local_zip_path=$zip"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_name=$zipName"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_size=$($zi.Length)"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"local_zip_sha256=$hash"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"evidence_file_count=$($entries.Count)"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"discovery_classification=$class"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append;"expected_artifact_name=$name"|Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Upload discovery artifact
        id: upload
        if: always() && steps.seal.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: NC-003B-toolchain-discovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.seal.outputs.local_zip_path }}
          compression-level: 0
          if-no-files-found: error
          retention-days: 7
  verify-discovery-artifact:
    runs-on: ubuntu-latest
    if: always()
    needs: [announce-run, control-artifact-probe, self-hosted-toolchain-discovery]
    outputs:
      terminal-classification: ${{ steps.verify.outputs.terminal_classification }}
      api-artifact-id: ${{ steps.verify.outputs.api_artifact_id }}
      api-artifact-name: ${{ steps.verify.outputs.api_artifact_name }}
      api-artifact-size: ${{ steps.verify.outputs.api_artifact_size }}
      api-artifact-digest: ${{ steps.verify.outputs.api_artifact_digest }}
      outer-zip-sha256: ${{ steps.verify.outputs.outer_zip_sha256 }}
      local-evidence-zip-sha256: ${{ steps.verify.outputs.local_evidence_zip_sha256 }}
      manifest-result: ${{ steps.verify.outputs.manifest_result }}
      runner-name: ${{ steps.verify.outputs.runner_name }}
      verification-artifact-id: ${{ steps.verification-upload.outputs.artifact-id }}
      verification-artifact-digest: ${{ steps.verification-upload.outputs.artifact-digest }}
    steps:
      - name: Poll API, download, and independently verify discovery artifact
        id: verify
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_NAME: ${{ needs.self-hosted-toolchain-discovery.outputs.expected-artifact-name }}
          UPLOAD_OUTCOME: ${{ needs.self-hosted-toolchain-discovery.outputs.upload-outcome }}
          UPLOAD_ID: ${{ needs.self-hosted-toolchain-discovery.outputs.artifact-id }}
          UPLOAD_URL: ${{ needs.self-hosted-toolchain-discovery.outputs.artifact-url }}
          UPLOAD_DIGEST: ${{ needs.self-hosted-toolchain-discovery.outputs.artifact-digest }}
          LOCAL_NAME: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-name }}
          LOCAL_HASH: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-sha256 }}
          LOCAL_SIZE: ${{ needs.self-hosted-toolchain-discovery.outputs.local-zip-size }}
          DISCOVERY_CLASS: ${{ needs.self-hosted-toolchain-discovery.outputs.discovery-classification }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib,json,os,pathlib,sys,time,urllib.request,zipfile
          out=pathlib.Path('verification-report');out.mkdir();log=[];terminal='STOP — TOOLCHAIN DISCOVERY EVIDENCE PUBLICATION FAILED'
          def w(n,v): (out/n).write_text(json.dumps(v,indent=2,sort_keys=True) if isinstance(v,(dict,list)) else str(v),encoding='utf-8')
          def emit(k,v):
            with open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8') as f:f.write(f'{k}={v}\n')
          h={'Authorization':f"Bearer {os.environ['GH_TOKEN']}",'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}
          try:
            for k in ['EXPECTED_NAME','UPLOAD_OUTCOME','UPLOAD_ID','UPLOAD_URL','UPLOAD_DIGEST','LOCAL_NAME','LOCAL_HASH','LOCAL_SIZE','DISCOVERY_CLASS']:
              if not os.environ.get(k,'').strip():raise RuntimeError(f'empty output {k}')
            if os.environ['UPLOAD_OUTCOME']!='success':raise RuntimeError('upload outcome not success')
            url=f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}/artifacts?per_page=100";artifact=None
