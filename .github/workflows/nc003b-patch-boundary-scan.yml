name: NC-003B patch boundary scan

on:
  pull_request:
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: manager/nc-003b-phase0-final-closure-validation
          fetch-depth: 1
          persist-credentials: true
      - name: Correct PowerShell boundary scans
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "a4501c9e7d921359b4eae36b601c8475ead1374f"
          python -B - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/nc003b-phase0-final-closure-windows.yml')
          text = path.read_text(encoding='utf-8')
          start_marker = "          git grep -n -I -E 'RUNNER_BOOTSTRAP_REQUEST"
          end_marker = "          @('residue scan: PASS', '__pycache__ count: 0', '.pyc count: 0') | Set-Content -Encoding utf8 (Join-Path $logs 'residue-scan-pre-matrix.log')"
          start = text.index(start_marker)
          end = text.index(end_marker, start) + len(end_marker)
          replacement = """          $networkHits = @(& git grep -n -I -E 'RUNNER_BOOTSTRAP_REQUEST|bootstrap_on_runner\\.ps1|git credential fill' -- ':!*.md' 2>&1)
          $networkExit = $LASTEXITCODE
          if ($networkExit -eq 0) { $networkHits | Set-Content -Encoding utf8 (Join-Path $logs 'network-scan.log'); throw 'network dependency residue found' }
          if ($networkExit -ne 1) { throw \"network scan failed with exit $networkExit\" }
          'network dependency scan: PASS' | Set-Content -Encoding utf8 (Join-Path $logs 'network-scan.log')
          $runtimeHits = @(& git grep -n -I -E 'LoadWave|loadWave|std::ifstream.*\\.wav|fopen\\(.*\\.wav' -- Plugins/NextcarEngineSim/Source/NextcarEngineSimCore ':(exclude)Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/**' 2>&1)
          $runtimeExit = $LASTEXITCODE
          if ($runtimeExit -eq 0) { $runtimeHits | Set-Content -Encoding utf8 (Join-Path $logs 'runtime-wav-scan.log'); throw 'runtime WAV dependency found' }
          if ($runtimeExit -ne 1) { throw \"runtime WAV scan failed with exit $runtimeExit\" }
          'runtime WAV dependency scan: PASS' | Set-Content -Encoding utf8 (Join-Path $logs 'runtime-wav-scan.log')
          $pycache = @(Get-ChildItem -Recurse -Force -Directory -Filter __pycache__ -ErrorAction SilentlyContinue)
          $pyc = @(Get-ChildItem -Recurse -Force -File -Filter *.pyc -ErrorAction SilentlyContinue)
          if ($pycache.Count -ne 0 -or $pyc.Count -ne 0) { throw \"Python residue: pycache=$($pycache.Count) pyc=$($pyc.Count)\" }
          @('residue scan: PASS', '__pycache__ count: 0', '.pyc count: 0') | Set-Content -Encoding utf8 (Join-Path $logs 'residue-scan-pre-matrix.log')"""
          updated = text[:start] + replacement + text[end:]
          path.write_text(updated, encoding='utf-8')
          PY
          git diff --check
          git config user.name "OpenAI NC-003B Closure Agent"
          git config user.email "noreply@openai.com"
          git add .github/workflows/nc003b-phase0-final-closure-windows.yml
          git commit -m "fix final closure boundary scans"
          git push origin HEAD:refs/heads/manager/nc-003b-phase0-final-closure-validation
