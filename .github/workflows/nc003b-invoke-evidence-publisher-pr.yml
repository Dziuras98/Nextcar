name: NC-003B prepare exact-head workflow metadata fix

on:
  pull_request:
    types:
      - reopened
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write
  actions: read

jobs:
  metadata-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validation branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: manager/nc-003b-phase0-final-closure-validation
          fetch-depth: 2
          persist-credentials: true
          path: validation
          show-progress: false

      - name: Checkout accepted workflow-fix
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: a25c6af112e667c47ee77aaba33c5cd9d992ea6a
          fetch-depth: 1
          persist-credentials: false
          path: accepted
          show-progress: false

      - name: Restore accepted workflow and fix only final artifact metadata
        shell: python
        run: |
          from pathlib import Path

          relative = Path('.github/workflows/nc003b-phase0-final-closure-windows.yml')
          accepted = (Path('accepted') / relative).read_text(encoding='utf-8')
          target = Path('validation') / relative
          needle = "          shutil.copyfile(metadata, root / 'toolchain-versions.json')"
          assert accepted.count(needle) == 1

          candidate_expr = '$' + '{{ inputs.candidate_sha }}'
          run_expr = '$' + '{{ github.run_id }}'
          artifact_expr = '$' + '{{ inputs.artifact_name }}'
          replacement = "\n".join([
              "          toolchain_path = root / 'toolchain-versions.json'",
              "          shutil.copyfile(metadata, toolchain_path)",
              "          toolchain = json.loads(toolchain_path.read_text(encoding='utf-8-sig'))",
              "          toolchain.update({",
              f"              'candidate_source_sha': '{candidate_expr}',",
              f"              'run_id': int('{run_expr}'),",
              f"              'artifact_name': '{artifact_expr}',",
              "              'artifact_id': 'assigned-after-upload',",
              "          })",
              "          toolchain_path.write_text(json.dumps(toolchain, indent=2, sort_keys=True) + '\\n', encoding='utf-8')",
              f"          assert toolchain['candidate_source_sha'] == '{candidate_expr}'",
              f"          assert toolchain['run_id'] == int('{run_expr}')",
              f"          assert toolchain['artifact_name'] == '{artifact_expr}'",
              "          assert toolchain['artifact_id'] == 'assigned-after-upload'",
          ])
          fixed = accepted.replace(needle, replacement)
          assert fixed != accepted
          assert fixed.replace(replacement, needle) == accepted
          assert fixed.count(candidate_expr) == 2
          assert fixed.count(run_expr) == 2
          assert fixed.count(artifact_expr) == 2
          assert 'NC-003B-cold-start-selected-profile-' + candidate_expr not in fixed
          target.write_text(fixed, encoding='utf-8')

      - name: Verify workflow-only exact patch
        shell: bash
        working-directory: validation
        run: |
          set -euo pipefail
          test "$(git diff --name-only)" = '.github/workflows/nc003b-phase0-final-closure-windows.yml'
          git diff --check
          test "$(grep -c '^  autocrlf-proof:' .github/workflows/nc003b-phase0-final-closure-windows.yml)" = 1
          test "$(grep -c '^  boundary-proof:' .github/workflows/nc003b-phase0-final-closure-windows.yml)" = 1
          test "$(grep -c '^  windows-matrix:' .github/workflows/nc003b-phase0-final-closure-windows.yml)" = 1
          grep -F "'artifact_id': 'assigned-after-upload'" .github/workflows/nc003b-phase0-final-closure-windows.yml

      - name: Commit and fast-forward publish workflow metadata fix
        shell: bash
        working-directory: validation
        run: |
          set -euo pipefail
          parent=$(git rev-parse HEAD)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- .github/workflows/nc003b-phase0-final-closure-windows.yml
          git commit -m 'fix final closure exact-head artifact metadata'
          test "$(git diff-tree --no-commit-id --name-only -r HEAD)" = '.github/workflows/nc003b-phase0-final-closure-windows.yml'
          git push origin HEAD:refs/heads/manager/nc-003b-phase0-final-closure-validation
          {
            echo "workflow_metadata_fix_sha=$(git rev-parse HEAD)"
            echo "workflow_metadata_fix_tree=$(git rev-parse 'HEAD^{tree}')"
            echo "workflow_metadata_fix_parent=$parent"
            echo 'changed_paths=.github/workflows/nc003b-phase0-final-closure-windows.yml'
            echo 'force=false'
          } | tee "$RUNNER_TEMP/workflow-metadata-fix.txt"

      - name: Upload workflow metadata-fix identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nc003b-workflow-metadata-fix
          path: ${{ runner.temp }}/workflow-metadata-fix.txt
          if-no-files-found: error
          retention-days: 2
