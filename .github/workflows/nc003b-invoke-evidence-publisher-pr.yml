name: NC-003B publish exact final closure evidence from PR 39

on:
  pull_request:
    types:
      - reopened
    branches:
      - manager/nc-003b-phase0-final-closure-bootstrap

permissions:
  contents: write
  actions: read

env:
  CANDIDATE_SHA: 7cc91bf136554ca6a40bbbeb90a557ec4bef078c
  CANDIDATE_TREE: b616b2ae12a51b4df83ba05858ce96cbbdce75e6
  TARGET_SHA: 9bb6464123228f1d9638d467e7160a7cb2aa98c8

jobs:
  publish-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Checkpoint 2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: 7cc91bf136554ca6a40bbbeb90a557ec4bef078c
          fetch-depth: 4
          persist-credentials: true
          show-progress: false

      - name: Verify immutable publication inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          test "$(git rev-parse 'HEAD^{tree}')" = "$CANDIDATE_TREE"
          test "$(git rev-parse HEAD~2)" = "$TARGET_SHA"
          test "$(git ls-remote origin refs/heads/manager/nc-003b-phase0-final-closure-candidate | cut -f1)" = "$CANDIDATE_SHA"
          read -r behind ahead < <(git rev-list --left-right --count "$TARGET_SHA...$CANDIDATE_SHA")
          test "$behind" = 0
          test "$ahead" = 2
          test -z "$(git status --porcelain)"

      - name: Reconstruct five evidence files from durable accepted sources
        shell: python
        env:
          STATUS_B64: UGhhc2UgMCBXSVAg4oCUIGZpbmFsIGNsb3N1cmUgY2FuZGlkYXRlIFdpbmRvd3MtdmFsaWRhdGVkIGFuZCBldmlkZW5jZSByZWNvcmRlZDsKZXhhY3QgZXZpZGVuY2UtaGVhZCBwdWJsaWNhdGlvbiBnYXRlIHJlcXVpcmVkIGJlZm9yZSBtYW5hZ2VyIHN1Ym1pc3Npb24uCgpQaGFzZSAxIG5vdCBzdGFydGVkLg==
          EVIDENCE_B64: 
          SECTION_B64: 
        run: |
          import base64
          import json
          import os
          from pathlib import Path

          status = base64.b64decode(os.environ['STATUS_B64']).decode('utf-8')
          evidence = json.loads(base64.b64decode(os.environ['EVIDENCE_B64']).decode('utf-8'))
          section = base64.b64decode(os.environ['SECTION_B64']).decode('utf-8')

          manifest_path = Path('Tools/EngineSimVendor/SOURCE_MANIFEST.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          assert manifest['schema_version'] == 1
          assert len(manifest['files']) == 58
          manifest['status'] = status
          manifest['phase0_final_closure_validation'] = evidence
          manifest_path.write_text(
              json.dumps(manifest, ensure_ascii=False, separators=(',', ':')) + '\n',
              encoding='utf-8',
          )

          for relative in (
              'Tools/EngineSimVendor/PATCHES.md',
              'Tools/EngineSimVendor/UPDATE.md',
              'Tools/EngineSimVendor/FIXTURE_TRANSCRIPTION.md',
              'Tools/EngineSimVendor/COLD_START_CALIBRATION.md',
          ):
              path = Path(relative)
              original = path.read_text(encoding='utf-8')
              assert '## Final Phase 0 closure validation evidence' not in original
              path.write_text(original.rstrip() + '\n\n' + section, encoding='utf-8')

      - name: Verify exact evidence bytes and scope
        shell: bash
        run: |
          set -euo pipefail
          expected=$(printf '%s\n' \
            Tools/EngineSimVendor/COLD_START_CALIBRATION.md \
            Tools/EngineSimVendor/FIXTURE_TRANSCRIPTION.md \
            Tools/EngineSimVendor/PATCHES.md \
            Tools/EngineSimVendor/SOURCE_MANIFEST.json \
            Tools/EngineSimVendor/UPDATE.md)
          actual=$(git diff --name-only | sort)
          test "$actual" = "$expected"
          git diff --check
          test "$(git hash-object Tools/EngineSimVendor/SOURCE_MANIFEST.json)" = 605c874e38b5c9832086160bd563fc7d5187a2f5
          test "$(git hash-object Tools/EngineSimVendor/PATCHES.md)" = 46239953aa3bc1ca48949109c7667b157533f216
          test "$(git hash-object Tools/EngineSimVendor/UPDATE.md)" = 2102062035b3ed8aca7a46536335a3cc3f745cc4
          test "$(git hash-object Tools/EngineSimVendor/FIXTURE_TRANSCRIPTION.md)" = 3431749ce267d6053350871f61d9a85d7dffa7e5
          test "$(git hash-object Tools/EngineSimVendor/COLD_START_CALIBRATION.md)" = d0e94fa2694c11a6827f571fd48a96446ca49b8c
          python -B - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('Tools/EngineSimVendor/SOURCE_MANIFEST.json').read_text(encoding='utf-8'))
          evidence = manifest['phase0_final_closure_validation']
          assert len(manifest['files']) == 58
          assert evidence['validated_checkpoint_2_sha'] == '7cc91bf136554ca6a40bbbeb90a557ec4bef078c'
          assert evidence['validated_checkpoint_2_tree'] == 'b616b2ae12a51b4df83ba05858ce96cbbdce75e6'
          assert evidence['closure_candidate_run_id'] == 29861088654
          assert evidence['closure_candidate_artifact_id'] == 8507410452
          assert evidence['hash_manifest_result'] == '63/63 PASS'
          assert evidence['sourceinputs_absence'] == 'PASS'
          assert evidence['network_scan'] == 'PASS'
          assert evidence['runtime_wav_scan'] == 'PASS'
          assert evidence['post_matrix_cleanup'] == 'PASS'
          assert evidence['project_warning_count'] == 0
          assert evidence['exact_evidence_head_validation'] == 'required'
          PY

      - name: Commit and fast-forward publish evidence
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$CANDIDATE_SHA"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            Tools/EngineSimVendor/SOURCE_MANIFEST.json \
            Tools/EngineSimVendor/PATCHES.md \
            Tools/EngineSimVendor/UPDATE.md \
            Tools/EngineSimVendor/FIXTURE_TRANSCRIPTION.md \
            Tools/EngineSimVendor/COLD_START_CALIBRATION.md
          git commit -m 'WIP Phase 0 reconstruction: record final Phase 0 closure validation'
          test "$(git rev-parse HEAD^)" = "$CANDIDATE_SHA"
          test "$(git diff-tree --no-commit-id --name-only -r HEAD | sort)" = "$(printf '%s\n' Tools/EngineSimVendor/COLD_START_CALIBRATION.md Tools/EngineSimVendor/FIXTURE_TRANSCRIPTION.md Tools/EngineSimVendor/PATCHES.md Tools/EngineSimVendor/SOURCE_MANIFEST.json Tools/EngineSimVendor/UPDATE.md)"
          git push origin HEAD:refs/heads/manager/nc-003b-phase0-final-closure-candidate
          echo "evidence_sha=$(git rev-parse HEAD)" | tee "$RUNNER_TEMP/evidence-head.txt"
          echo "evidence_tree=$(git rev-parse 'HEAD^{tree}')" | tee -a "$RUNNER_TEMP/evidence-head.txt"
          echo "evidence_parent=$(git rev-parse HEAD^)" | tee -a "$RUNNER_TEMP/evidence-head.txt"
          echo "force=false" | tee -a "$RUNNER_TEMP/evidence-head.txt"

      - name: Upload evidence head identity
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nc003b-evidence-head
          path: ${{ runner.temp }}/evidence-head.txt
          if-no-files-found: error
          retention-days: 2
