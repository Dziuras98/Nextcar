name: NC-003B source normalization blob preparation

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  contents: write

jobs:
  prepare-blob:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 10
    steps:
      - name: Create patched workflow blob
        uses: actions/github-script@v7
        env:
          SOURCE_BLOB: "9606adab7825b4d2c964969c0d6a43ceb4540a04"
        with:
          script: |
            const source = await github.rest.git.getBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              file_sha: process.env.SOURCE_BLOB
            });
            const original = Buffer.from(source.data.content.replace(/\n/g, ''), 'base64').toString('utf8');
            const needle = '          path: nc003b-source-normalization-artifact';
            const replacement = '          path: ' + '$' + '{{ github.workspace }}\\nc003b-source-normalization-artifact';
            const occurrences = original.split(needle).length - 1;
            if (occurrences !== 1) throw new Error(`expected one upload path, found ${occurrences}`);
            const patched = original.replace(needle, replacement);
            const blob = await github.rest.git.createBlob({
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: patched,
              encoding: 'utf-8'
            });
            core.info(`SOURCE_BLOB=${process.env.SOURCE_BLOB}`);
            core.info(`PATCHED_BLOB=${blob.data.sha}`);
            core.info(`PATCHED_BYTES=${Buffer.byteLength(patched, 'utf8')}`);
            core.setFailed('blob prepared; control plane must attach it');