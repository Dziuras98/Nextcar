name: NC-003B evidence path diagnostics

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 10
    steps:
      - name: List persisted evidence paths
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            function walk(root, limit = 200) {
              const rows = [];
              if (!fs.existsSync(root)) return rows;
              const stack = [root];
              while (stack.length && rows.length < limit) {
                const current = stack.pop();
                let stat;
                try { stat = fs.statSync(current); } catch { continue; }
                rows.push(`${stat.isDirectory() ? 'D' : 'F'} ${stat.size} ${current}`);
                if (stat.isDirectory()) {
                  let names = [];
                  try { names = fs.readdirSync(current); } catch { continue; }
                  for (const name of names.reverse()) stack.push(path.join(current, name));
                }
              }
              return rows;
            }
            const roots = [
              process.env.GITHUB_WORKSPACE,
              path.join(process.env.GITHUB_WORKSPACE, 'nc003b-source-normalization-artifact'),
              path.join(process.env.RUNNER_TEMP, 'Artifacts', 'NC-003B-Phase0-source-normalization'),
              process.env.RUNNER_TEMP
            ];
            for (const root of roots) {
              core.info(`=== ROOT ${root} exists=${fs.existsSync(root)} ===`);
              for (const row of walk(root)) core.info(row.slice(0, 2000));
            }
            core.setFailed('evidence path diagnostic complete');