name: NC-003B Phase 0 source normalization bootstrap

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  contents: write
  actions: read

concurrency:
  group: nc003b-source-normalization-bootstrap
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  BASELINE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  BASELINE_TREE: 64a4af00ed06bdaa57553960685e670a472b55ba
  RESULT_BRANCH: agent/nc-003b-phase0-source-normalization

jobs:
  normalize-and-validate:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 90
    steps:
      - name: Verify runner identity
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $evidence = Join-Path $env:RUNNER_TEMP 'Artifacts\NC-003B-Phase0-source-normalization'
          New-Item -ItemType Directory -Force $evidence | Out-Null
          "EVIDENCE=$evidence" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CURRENT_STAGE=runner identity" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          try {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (-not (Test-Path -LiteralPath $vswhere -PathType Leaf)) { throw 'vswhere missing' }
            $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
            $vsVersion = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationVersion).Trim()
            $v143File = Join-Path $vsPath 'VC\Auxiliary\Build\Microsoft.VCToolsVersion.V143.default.txt'
            $v143Version = if (Test-Path -LiteralPath $v143File -PathType Leaf) { (Get-Content -Raw -LiteralPath $v143File).Trim() } else { '' }
            $sdkRoot = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' -ErrorAction SilentlyContinue).KitsRoot10
            $sdkVersions = if ($sdkRoot -and (Test-Path -LiteralPath (Join-Path $sdkRoot 'Include') -PathType Container)) { @(Get-ChildItem -LiteralPath (Join-Path $sdkRoot 'Include') -Directory | ForEach-Object { $_.Name }) } else { @() }
            @(
              "RUNNER_OS=$env:RUNNER_OS"
              "RUNNER_ARCH=$env:RUNNER_ARCH"
              "RUNNER_NAME=$env:RUNNER_NAME"
              "RUNNER_ENVIRONMENT=$env:RUNNER_ENVIRONMENT"
              "COMPUTERNAME=$env:COMPUTERNAME"
              'required_labels=self-hosted,Windows,X64,unreal-5.8'
              "PowerShell edition=$($PSVersionTable.PSEdition)"
              "PowerShell version=$($PSVersionTable.PSVersion)"
              "PowerShell executable=$((Get-Process -Id $PID).Path)"
              "Python version=$(& python --version 2>&1)"
              "CMake version=$((& cmake --version | Select-Object -First 1))"
              "vswhere result=$((& $vswhere -latest -products * -format json 2>&1) -join ' ')"
              "Visual Studio installation=$vsPath"
              "Visual Studio version=$vsVersion"
              "MSVC toolset=$v143Version"
              "Windows SDK root=$sdkRoot"
              "Windows SDK versions=$($sdkVersions -join ',')"
            ) | Set-Content -Encoding utf8 (Join-Path $evidence 'runner-identity.txt')
            Get-Content -LiteralPath (Join-Path $evidence 'runner-identity.txt')
            if ($env:RUNNER_OS -ne 'Windows') { throw "RUNNER_OS=$env:RUNNER_OS" }
            if ($env:RUNNER_ARCH -ne 'X64') { throw "RUNNER_ARCH=$env:RUNNER_ARCH" }
            if ($env:RUNNER_ENVIRONMENT -and $env:RUNNER_ENVIRONMENT -ne 'self-hosted') { throw "RUNNER_ENVIRONMENT=$env:RUNNER_ENVIRONMENT" }
            if ($PSVersionTable.PSEdition -ne 'Desktop' -or $PSVersionTable.PSVersion.Major -ne 5) { throw "expected Windows PowerShell 5.1, got $($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)" }
            if (-not $vsPath -or -not $vsVersion.StartsWith('17.')) { throw 'VS2022 missing' }
            if (-not $v143Version -or -not (Test-Path -LiteralPath (Join-Path $vsPath "VC\Tools\MSVC\$v143Version") -PathType Container)) { throw 'MSVC v143 missing' }
            if (-not $sdkRoot -or $sdkVersions.Count -eq 0) { throw 'Windows SDK missing' }
          } catch {
            "STOP — runner identity: $($_.Exception.Message)" | Set-Content -Encoding utf8 (Join-Path $evidence 'final-status.txt')
            throw
          }

      - name: Checkout exact baseline
        uses: actions/checkout@v4
        with:
          ref: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          fetch-depth: 0
          clean: true
          persist-credentials: true

      - name: Mark accepted evidence download
        shell: powershell
        run: |
          "CURRENT_STAGE=download accepted exact-head closure artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download accepted exact-head closure artifact
        uses: actions/download-artifact@v4
        with:
          name: NC-003B-Phase0-final-closure-3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          path: ${{ runner.temp }}\accepted-closure
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29873058430

      - name: Locate exact Agent G source
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          "CURRENT_STAGE=locate exact Agent G source" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          try {
            $validatorSha = 'aae52e31fb11ffab7791a3b3c33dbef73faa0d753df977939011b28fb0b8341d'
            $packageSha = 'd66a6cfb928f0db2da6b03d350440523490e56f0eac26c42dcdea956746295d7'
            $packageName = 'NC-003B-Phase0-boundary-normalization-transfer.tar.gz'
            $roots = @(
              $env:NC003B_BOUNDARY_SOURCE_ROOT
              $env:RUNNER_TEMP
              $env:RUNNER_WORKSPACE
              (Split-Path $env:RUNNER_WORKSPACE -Parent)
              (Join-Path $env:USERPROFILE 'Downloads')
              'C:\Users\Public\Downloads'
              'C:\actions-runner'
              'D:\actions-runner'
            ) | Where-Object { $_ -and (Test-Path -LiteralPath $_) } | Select-Object -Unique
            $direct = $null
            foreach ($root in $roots) {
              if (Test-Path -LiteralPath $root -PathType Leaf) { continue }
              $direct = Get-ChildItem -LiteralPath $root -Filter 'validate_repository.py' -File -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.Length -eq 11105 -and (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant() -eq $validatorSha } |
                Select-Object -First 1
              if ($direct) { break }
            }
            if (-not $direct) {
              $package = $null
              foreach ($root in $roots) {
                if (Test-Path -LiteralPath $root -PathType Leaf) {
                  $item = Get-Item -LiteralPath $root
                  if ($item.Name -eq $packageName -and (Get-FileHash -Algorithm SHA256 -LiteralPath $item.FullName).Hash.ToLowerInvariant() -eq $packageSha) { $package = $item; break }
                  continue
                }
                $package = Get-ChildItem -LiteralPath $root -Filter $packageName -File -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant() -eq $packageSha } |
                  Select-Object -First 1
                if ($package) { break }
              }
              if ($package) {
                $extractRoot = Join-Path $env:RUNNER_TEMP 'NC-003B-Agent-G-exact'
                Remove-Item -LiteralPath $extractRoot -Recurse -Force -ErrorAction SilentlyContinue
                New-Item -ItemType Directory -Force $extractRoot | Out-Null
                & tar.exe -xzf $package.FullName -C $extractRoot
                if ($LASTEXITCODE -ne 0) { throw 'exact Agent G package extraction failed' }
                $direct = Get-ChildItem -LiteralPath $extractRoot -Filter 'validate_repository.py' -File -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.Length -eq 11105 -and (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant() -eq $validatorSha } |
                  Select-Object -First 1
              }
            }
            if (-not $direct) { throw 'exact Agent G validator/package unavailable on runner' }
            $sourceRoot = Split-Path $direct.FullName -Parent
            "NC003B_BOUNDARY_SOURCE_ROOT=$sourceRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            @(
              "validator_source=$($direct.FullName)"
              "validator_bytes=$($direct.Length)"
              "validator_sha256=$validatorSha"
            ) | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'agent-g-source.txt')
          } catch {
            "STOP — locate exact Agent G source: $($_.Exception.Message)" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
            throw
          }

      - name: Normalize validate and prepare publication
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          function Get-Sha256([string]$Path) { return (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash.ToLowerInvariant() }
          function Get-Blob([string]$Path) {
            $value = (git hash-object --no-filters -- $Path).Trim()
            if ($LASTEXITCODE -ne 0) { throw "git hash-object failed: $Path" }
            return $value
          }
          function Expand-GzipFile([string]$Source, [string]$Destination) {
            $input = [System.IO.File]::OpenRead($Source)
            try {
              $gzip = New-Object System.IO.Compression.GzipStream($input, [System.IO.Compression.CompressionMode]::Decompress)
              try {
                $output = [System.IO.File]::Create($Destination)
                try { $gzip.CopyTo($output) } finally { $output.Dispose() }
              } finally { $gzip.Dispose() }
            } finally { $input.Dispose() }
          }
          function Join-BinaryFiles([string[]]$Sources, [string]$Destination) {
            $output = [System.IO.File]::Create($Destination)
            try {
              foreach ($source in $Sources) {
                $bytes = [System.IO.File]::ReadAllBytes($source)
                $output.Write($bytes, 0, $bytes.Length)
              }
            } finally { $output.Dispose() }
          }
          function Invoke-Captured([string]$Label, [string]$LogName, [scriptblock]$Command) {
            $global:LASTEXITCODE = 0
            $output = @(& $Command 2>&1)
            $code = $LASTEXITCODE
            $output | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE $LogName)
            $output | Out-Host
            if ($code -ne 0) { throw "$Label failed with exit code $code" }
            return ,$output
          }
          function Add-Captured([string]$Label, [string]$LogName, [scriptblock]$Command) {
            $global:LASTEXITCODE = 0
            $output = @(& $Command 2>&1)
            $code = $LASTEXITCODE
            $output | Add-Content -Encoding utf8 (Join-Path $env:EVIDENCE $LogName)
            $output | Out-Host
            if ($code -ne 0) { throw "$Label failed with exit code $code" }
            return ,$output
          }
          try {
            "CURRENT_STAGE=prepare exact baseline and result branch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            git config core.autocrlf false
            git config core.eol lf
            git reset --hard $env:BASELINE_SHA
            if ($LASTEXITCODE -ne 0) { throw 'git reset failed' }
            $baselineHead = (git rev-parse HEAD).Trim()
            $baselineTree = (git rev-parse 'HEAD^{tree}').Trim()
            $baselineStatus = @(git status --short)
            @("head=$baselineHead", "tree=$baselineTree", "status_count=$($baselineStatus.Count)") | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'baseline-identity.txt')
            if ($baselineHead -ne $env:BASELINE_SHA) { throw "baseline head $baselineHead" }
            if ($baselineTree -ne $env:BASELINE_TREE) { throw "baseline tree $baselineTree" }
            if ($baselineStatus.Count -ne 0) { throw 'baseline working tree is not clean' }
            $remoteResult = @(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH")
            if ($LASTEXITCODE -ne 0) { throw 'result branch probe failed' }
            if ($remoteResult.Count -ne 0) { throw 'remote result branch already exists' }
            git switch -c $env:RESULT_BRANCH
            if ($LASTEXITCODE -ne 0) { throw 'local result branch creation failed' }
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

            "CURRENT_STAGE=transform and commit A" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $sourceRoot = 'Tools/EngineSimVendor/_cold_start_sources'
            $aPaths = @(
              'Tools/EngineSimVendor/generate_cold_start_profile_header.py'
              'Tools/EngineSimVendor/record_cold_start_calibration_evidence.py'
              'Tools/EngineSimVendor/run_cold_start_calibration.py'
              'Tools/EngineSimVendor/verify_cold_start_profile.py'
              'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py'
              'Tools/EngineSimVendor/_cold_start_sources/generate_cold_start_profile_header.py.gz'
              'Tools/EngineSimVendor/_cold_start_sources/record_cold_start_calibration_evidence.py.gz'
              'Tools/EngineSimVendor/_cold_start_sources/run_cold_start_calibration.py.gz'
              'Tools/EngineSimVendor/_cold_start_sources/verify_cold_start_profile.py.gz'
              'Tools/EngineSimVendor/_cold_start_sources/test_cold_start_profile_verifier.py.gz'
            )
            $rows = @(
              @('generate_cold_start_profile_header.py.gz','Tools/EngineSimVendor/generate_cold_start_profile_header.py','6efb3d29734c2d41c96d16e914ab460cd212769d611ba08cf2677377d933659d','4ec6534979528b440b532b72ec33e6ea27d7e3c0')
              @('record_cold_start_calibration_evidence.py.gz','Tools/EngineSimVendor/record_cold_start_calibration_evidence.py','f1ee52d8d2df40df5dad19aaf97bf796cf4ef32c1bd5b60700fec4ef48c99357','04ba4e3eedc5ec53af7af7c5ea0468e29eb3ba01')
              @('run_cold_start_calibration.py.gz','Tools/EngineSimVendor/run_cold_start_calibration.py','b70387026d05679f5760e1cc1927197c8a14ca91fdac3af1ffbf3aa9a081264b','5117fc9f7c7799a7f4a034cd8653bc8bc45d36f6')
              @('verify_cold_start_profile.py.gz','Tools/EngineSimVendor/verify_cold_start_profile.py','92b4ebdb922b409cf8c583fc7c7d7cb56a16dd70606c2080673ef6dc77e7d57d','b858f4b5a46a53d03036909b2099b0f6f55887ee')
            )
            foreach ($row in $rows) {
              $source = Join-Path $sourceRoot $row[0]
              Expand-GzipFile $source $row[1]
              Remove-Item -LiteralPath $source -Force
              if ((Get-Sha256 $row[1]) -ne $row[2] -or (Get-Blob $row[1]) -ne $row[3]) { throw "A identity mismatch: $($row[1])" }
            }
            $testSource = Join-Path $sourceRoot 'test_cold_start_profile_verifier.py.gz'
            $testDestination = 'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py'
            Expand-GzipFile $testSource $testDestination
            Remove-Item -LiteralPath $testSource -Force
            $pythonEdit = "import hashlib;from pathlib import Path;p=Path(r'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py');d=p.read_bytes();L=d.splitlines(True);h='3be9f2edeb76eea09b844911202619b497af7aab04018af06569cf4067cd5036';c=[];[(c.append(b''.join(L[:s]+L[e:]))) for s in range(len(L)) for e in range(s+1,min(len(L),s+41)+1) if b'_cold_start_sources' in b''.join(L[s:e]) and b''.join(L[s:e]).count(b'.py.gz')==2 and hashlib.sha256(b''.join(L[:s]+L[e:])).hexdigest()==h];assert len(c)==1,len(c);p.write_bytes(c[0])"
            python -B -c $pythonEdit
            if ($LASTEXITCODE -ne 0) { throw 'test obsolete-block removal failed' }
            if ((Get-Sha256 $testDestination) -ne '3be9f2edeb76eea09b844911202619b497af7aab04018af06569cf4067cd5036' -or (Get-Blob $testDestination) -ne 'f8bb81c8a1bcfef2126bbff2cac717dd6db1e055') { throw 'test final identity mismatch' }
            Remove-Item -LiteralPath $sourceRoot -Force
            $actualA = @(git status --short | ForEach-Object { $_.Substring(3) } | Sort-Object)
            $expectedA = @($aPaths | Sort-Object)
            if (@(Compare-Object $expectedA $actualA).Count -ne 0) { throw "A working-tree scope mismatch: $($actualA -join ',')" }
            git add -A -- $aPaths
            if ($LASTEXITCODE -ne 0) { throw 'A staging failed' }
            git commit -m 'WIP Phase 0: normalize cold-start Python sources'
            if ($LASTEXITCODE -ne 0) { throw 'A commit failed' }
            $commitA = (git rev-parse HEAD).Trim()
            $treeA = (git rev-parse 'HEAD^{tree}').Trim()
            $commitAPaths = @(git diff-tree --no-commit-id --name-only -r HEAD | Sort-Object)
            if (@(Compare-Object $expectedA $commitAPaths).Count -ne 0) { throw 'A commit scope mismatch' }

            "CURRENT_STAGE=transform and commit G" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $psPath = 'Tools/EngineSimVendor/validate_cold_start_windows.ps1'
            $cppPath = 'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.cpp'
            $validatorPath = 'scripts/validate_repository.py'
            $psParts = @(0..4 | ForEach-Object { "Tools/EngineSimVendor/validate_cold_start_windows.parts/part$($_.ToString('00')).ps1frag" })
            $cppParts = @(0..2 | ForEach-Object { "Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/ColdStartCalibrationHarness.part$($_.ToString('00')).inc" })
            $gPaths = @($psPath, $cppPath, $validatorPath) + $psParts + $cppParts
            Join-BinaryFiles $psParts $psPath
            Join-BinaryFiles $cppParts $cppPath
            if ((Get-Item -LiteralPath $psPath).Length -ne 22230 -or (Get-Sha256 $psPath) -ne '10ee201b5136864012a3e975989d8ed9ded47dbf7813e1c9d0e11e82900d4f13' -or (Get-Blob $psPath) -ne '29973abfc14829d2f7cb00f273f288dfef8b146f') { throw 'PowerShell final identity mismatch' }
            if ((Get-Item -LiteralPath $cppPath).Length -ne 19971 -or (Get-Sha256 $cppPath) -ne 'bb67a62743ef28e41fdfe977b7aad2ab5dbdd799c50447bd7bcaf426e1d2b83d' -or (Get-Blob $cppPath) -ne 'ac5003693875afbcc0513075d04a2490bbbc806a') { throw 'C++ final identity mismatch' }
            $validatorExpectedSha = 'aae52e31fb11ffab7791a3b3c33dbef73faa0d753df977939011b28fb0b8341d'
            $validatorSource = $null
            $roots = @($env:NC003B_BOUNDARY_SOURCE_ROOT, $env:RUNNER_TEMP, $env:RUNNER_WORKSPACE, (Split-Path $env:RUNNER_WORKSPACE -Parent), (Join-Path $env:USERPROFILE 'Downloads'), 'C:\Users\Public\Downloads', 'C:\actions-runner', 'D:\actions-runner') | Where-Object { $_ -and (Test-Path -LiteralPath $_) }
            foreach ($root in $roots) {
              if (Test-Path -LiteralPath $root -PathType Leaf) { continue }
              $validatorSource = Get-ChildItem -LiteralPath $root -Filter 'validate_repository.py' -File -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -eq 11105 -and (Get-Sha256 $_.FullName) -eq $validatorExpectedSha } | Select-Object -First 1
              if ($validatorSource) { break }
            }
            if (-not $validatorSource) { throw 'exact Agent G validator unavailable on runner' }
            Copy-Item -LiteralPath $validatorSource.FullName -Destination $validatorPath -Force
            if ((Get-Item -LiteralPath $validatorPath).Length -ne 11105 -or (Get-Sha256 $validatorPath) -ne $validatorExpectedSha -or (Get-Blob $validatorPath) -ne '65c309558f1e50a8258caaef61e38087f2382392') { throw 'validator final identity mismatch' }
            Remove-Item -LiteralPath 'Tools/EngineSimVendor/validate_cold_start_windows.parts' -Recurse -Force
            Remove-Item -LiteralPath $cppParts -Force
            $actualG = @(git status --short | ForEach-Object { $_.Substring(3) } | Sort-Object)
            $expectedG = @($gPaths | Sort-Object)
            if (@(Compare-Object $expectedG $actualG).Count -ne 0) { throw "G working-tree scope mismatch: $($actualG -join ',')" }
            git add -A -- $gPaths
            if ($LASTEXITCODE -ne 0) { throw 'G staging failed' }
            git commit -m 'WIP Phase 0: normalize boundary source files'
            if ($LASTEXITCODE -ne 0) { throw 'G commit failed' }
            $commitG = (git rev-parse HEAD).Trim()
            $treeG = (git rev-parse 'HEAD^{tree}').Trim()
            $commitGPaths = @(git diff-tree --no-commit-id --name-only -r HEAD | Sort-Object)
            if (@(Compare-Object $expectedG $commitGPaths).Count -ne 0) { throw 'G commit scope mismatch' }

            "CURRENT_STAGE=scope and identity gate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $nameStatus = @(git diff --name-status $env:BASELINE_SHA HEAD)
            $modified = @($nameStatus | Where-Object { $_ -match '^M\s' }).Count
            $deleted = @($nameStatus | Where-Object { $_ -match '^D\s' }).Count
            if ($modified -ne 8 -or $deleted -ne 13 -or $nameStatus.Count -ne 21) { throw "scope is M=$modified D=$deleted total=$($nameStatus.Count)" }
            $allow = @(($aPaths + $gPaths) | Sort-Object)
            $actualPaths = @($nameStatus | ForEach-Object { ($_ -split "`t", 2)[1] } | Sort-Object)
            if (@(Compare-Object $allow $actualPaths).Count -ne 0) { throw '21-path allowlist mismatch' }
            if (@(git ls-tree -r --name-only HEAD | Where-Object { $_ -eq '.github/workflows/nc003b-source-normalization-bootstrap.yml' }).Count -ne 0) { throw 'bootstrap workflow leaked into result history' }
            @("baseline=$env:BASELINE_SHA/$env:BASELINE_TREE", "A=$commitA/$treeA", "G=$commitG/$treeG", "final=$commitG/$treeG") | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'commit-identities.txt')
            $nameStatus | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'changed-paths.txt')
            @(
              "generate=$(Get-Sha256 'Tools/EngineSimVendor/generate_cold_start_profile_header.py')"
              "record=$(Get-Sha256 'Tools/EngineSimVendor/record_cold_start_calibration_evidence.py')"
              "run=$(Get-Sha256 'Tools/EngineSimVendor/run_cold_start_calibration.py')"
              "verify=$(Get-Sha256 'Tools/EngineSimVendor/verify_cold_start_profile.py')"
              "test=$(Get-Sha256 'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py')"
              "powershell=$(Get-Sha256 $psPath)"
              "cpp=$(Get-Sha256 $cppPath)"
              "validator=$(Get-Sha256 $validatorPath)"
            ) | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-hashes.txt')
            @(
              "generate=$(Get-Blob 'Tools/EngineSimVendor/generate_cold_start_profile_header.py')"
              "record=$(Get-Blob 'Tools/EngineSimVendor/record_cold_start_calibration_evidence.py')"
              "run=$(Get-Blob 'Tools/EngineSimVendor/run_cold_start_calibration.py')"
              "verify=$(Get-Blob 'Tools/EngineSimVendor/verify_cold_start_profile.py')"
              "test=$(Get-Blob 'Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py')"
              "powershell=$(Get-Blob $psPath)"
              "cpp=$(Get-Blob $cppPath)"
              "validator=$(Get-Blob $validatorPath)"
            ) | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-git-blobs.txt')

            "CURRENT_STAGE=repository and boundary validation" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Invoke-Captured 'repository validator' 'repository-validation.txt' { python -B scripts/validate_repository.py } | Out-Null
            $mutationLog = Join-Path $env:EVIDENCE 'validator-mutations.txt'
            Remove-Item -LiteralPath $mutationLog -Force -ErrorAction SilentlyContinue
            $mutationFiles = @('Tools/EngineSimVendor/probe.py.gz','Tools/EngineSimVendor/probe.ps1frag','Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/Probe.part00.inc')
            foreach ($mutation in $mutationFiles) {
              [System.IO.File]::WriteAllText((Join-Path (Get-Location) $mutation), "probe`n", (New-Object System.Text.UTF8Encoding($false)))
              $out = @(python -B scripts/validate_repository.py 2>&1)
              $code = $LASTEXITCODE
              Remove-Item -LiteralPath $mutation -Force
              "${mutation}: exit=$code" | Add-Content -Encoding utf8 $mutationLog
              $out | Add-Content -Encoding utf8 $mutationLog
              if ($code -eq 0) { throw "validator accepted residue $mutation" }
            }
            $partsProbe = 'Tools/EngineSimVendor/probe.parts'
            New-Item -ItemType Directory -Path $partsProbe | Out-Null
            $out = @(python -B scripts/validate_repository.py 2>&1)
            $code = $LASTEXITCODE
            Remove-Item -LiteralPath $partsProbe -Force
            "${partsProbe}: exit=$code" | Add-Content -Encoding utf8 $mutationLog
            $out | Add-Content -Encoding utf8 $mutationLog
            if ($code -eq 0) { throw 'validator accepted .parts residue' }
            $ordinary = 'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Calibration/Ordinary.inc'
            [System.IO.File]::WriteAllText((Join-Path (Get-Location) $ordinary), "int ordinary;`n", (New-Object System.Text.UTF8Encoding($false)))
            $out = @(python -B scripts/validate_repository.py 2>&1)
            $code = $LASTEXITCODE
            Remove-Item -LiteralPath $ordinary -Force
            "ordinary unrelated .inc: exit=$code" | Add-Content -Encoding utf8 $mutationLog
            $out | Add-Content -Encoding utf8 $mutationLog
            if ($code -ne 0) { throw 'validator rejected ordinary unrelated .inc' }
            'validator residue mutation tests: PASS' | Add-Content -Encoding utf8 $mutationLog
            'ordinary unrelated .inc: PASS' | Add-Content -Encoding utf8 $mutationLog
            $tokens = $null
            $parserErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $psPath), [ref]$tokens, [ref]$parserErrors)
            "parser_errors=$($parserErrors.Count)" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'powershell-ast.txt')
            if ($parserErrors.Count -ne 0) { throw 'PowerShell AST parser errors' }
            git diff --check $env:BASELINE_SHA HEAD | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'git-diff-check.txt')
            if ($LASTEXITCODE -ne 0) { throw 'git diff --check failed' }

            "CURRENT_STAGE=Python snapshot fixture IR and cold-start tests" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Invoke-Captured 'Python py_compile' 'python-tests.txt' { python -B -m py_compile Tools/EngineSimVendor/generate_cold_start_profile_header.py Tools/EngineSimVendor/record_cold_start_calibration_evidence.py Tools/EngineSimVendor/run_cold_start_calibration.py Tools/EngineSimVendor/verify_cold_start_profile.py Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py scripts/validate_repository.py } | Out-Null
            $coldTests = Invoke-Captured 'cold-start mutation tests' 'cold-start-tests.txt' { python -B -m unittest -v Tools/EngineSimVendor/tests/test_cold_start_profile_verifier.py }
            if (($coldTests -join "`n") -notmatch 'Ran 15 tests') { throw 'cold-start suite did not run 15 tests' }
            Invoke-Captured 'snapshot verifier' 'snapshot-tests.txt' { python -B Tools/EngineSimVendor/verify_fixture_source_snapshot.py } | Out-Null
            $snapshotTests = Add-Captured 'snapshot tests' 'snapshot-tests.txt' { python -B -m unittest -v Tools/EngineSimVendor/tests/test_fixture_source_snapshot.py }
            if (($snapshotTests -join "`n") -notmatch 'Ran 7 tests') { throw 'snapshot suite did not run 7 tests' }
            $fixtureTests = Invoke-Captured 'fixture mutation tests' 'fixture-tests.txt' { python -B -m unittest -v Tools/EngineSimVendor/tests/test_subaru_ej25_fixture_verifier.py }
            $fixtureParity = Add-Captured 'fixture parity' 'fixture-tests.txt' { python -B Tools/EngineSimVendor/verify_subaru_ej25_fixture.py }
            if (($fixtureTests -join "`n") -notmatch 'Ran 24 tests' -or ($fixtureParity -join "`n") -notmatch '118/118') { throw 'fixture test/parity count mismatch' }
            $irTests = Invoke-Captured 'IR mutation tests' 'ir-tests.txt' { python -B -m unittest -v Tools/EngineSimVendor/tests/test_impulse_response_tools.py }
            Add-Captured 'IR verifier' 'ir-tests.txt' { python -B Tools/EngineSimVendor/verify_impulse_response.py --wav Plugins/NextcarEngineSim/Source/ThirdParty/EngineSim/upstream/engine-sim/es/sound-library/new/minimal_muffling_02.wav --header Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/MinimalMuffling02ImpulseResponse.generated.h --manifest Tools/EngineSimVendor/SOURCE_MANIFEST.json --repository-root . } | Out-Null
            if (($irTests -join "`n") -notmatch 'Ran 11 tests') { throw 'IR suite did not run 11 tests' }
            $irOutput = Join-Path $env:RUNNER_TEMP 'MinimalMuffling02ImpulseResponse.generated.h'
            Add-Captured 'IR generator' 'ir-tests.txt' { python -B Tools/EngineSimVendor/generate_impulse_response_header.py --wav Plugins/NextcarEngineSim/Source/ThirdParty/EngineSim/upstream/engine-sim/es/sound-library/new/minimal_muffling_02.wav --output $irOutput } | Out-Null
            if ((Get-Sha256 $irOutput) -ne (Get-Sha256 'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/MinimalMuffling02ImpulseResponse.generated.h')) { throw 'IR generator output differs' }
            $profileOutput = Join-Path $env:RUNNER_TEMP 'SubaruEJ25ColdStartProfile.generated.h'
            Add-Captured 'cold-start generator' 'cold-start-tests.txt' { python -B Tools/EngineSimVendor/generate_cold_start_profile_header.py --profile Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json --output $profileOutput } | Out-Null
            if ((Get-Sha256 $profileOutput) -ne (Get-Sha256 'Plugins/NextcarEngineSim/Source/NextcarEngineSimCore/Private/Generated/SubaruEJ25ColdStartProfile.generated.h')) { throw 'cold-start generator output differs' }
            $verifierOutput = @(python -B Tools/EngineSimVendor/verify_cold_start_profile.py --profile Tests/EngineSimCore/Fixtures/subaru_ej25_cold_start_profile.json --repo-root . 2>&1)
            $verifierExit = $LASTEXITCODE
            $verifierOutput | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'expected-metadata-drift.txt')
            $remainingVerifierText = (($verifierOutput -join "`n") -replace 'generator SHA mismatch', '')
            if ($verifierExit -eq 0 -or ($verifierOutput -join "`n") -notmatch 'generator SHA mismatch' -or $remainingVerifierText -match '(?i)(mismatch|error|FAIL:)') { throw 'unexpected full cold-start verifier result' }
            @(
              'Python py_compile: PASS'
              'cold-start Python mutation tests: 15/15 PASS'
              'repository validator: PASS'
              'git diff --check: PASS'
              'validator residue mutation tests: PASS'
              'ordinary unrelated .inc: PASS'
              'PowerShell AST parser errors: 0'
              'snapshot tests: 7/7 PASS'
              'fixture mutation tests: 24/24 PASS'
              'fixture parity: 118/118 PASS'
              'IR mutation tests: 11/11 PASS'
              'IR verifier: PASS'
              'IR generator byte-identical: PASS'
              'cold-start generator byte-identical: PASS'
              'profile/header byte-identical: PASS'
            ) | Add-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'python-tests.txt')

            "CURRENT_STAGE=Windows standalone matrix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $summary = Get-ChildItem -LiteralPath (Join-Path $env:RUNNER_TEMP 'accepted-closure') -Filter 'selected-summary.json' -File -Recurse | Select-Object -First 1
            if (-not $summary) { throw 'selected-summary.json absent from accepted closure artifact' }
            $summaryJson = Get-Content -Raw -LiteralPath $summary.FullName | ConvertFrom-Json
            $selectedInput = [ordered]@{ schema_version = $summaryJson.schema_version; candidate_source_sha = $summaryJson.candidate_source_sha; selected_candidate = $summaryJson.selected_candidate }
            $selectedPath = Join-Path $env:RUNNER_TEMP 'selected-candidate.json'
            [System.IO.File]::WriteAllText($selectedPath, (ConvertTo-Json $selectedInput -Depth 12) + "`n", (New-Object System.Text.UTF8Encoding($false)))
            $worktree = Join-Path $env:RUNNER_TEMP 'nc003b-source-normalization-matrix'
            Remove-Item -LiteralPath $worktree -Recurse -Force -ErrorAction SilentlyContinue
            git worktree add --detach $worktree $commitG
            if ($LASTEXITCODE -ne 0) { throw 'matrix worktree creation failed' }
            Push-Location $worktree
            try {
              & powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File '.\Tools\EngineSimVendor\validate_cold_start_windows.ps1' -CandidateSha $commitG -Phase Selected -SelectedCandidatePath $selectedPath -ArtifactRoot 'matrix-artifact'
              $matrixExit = $LASTEXITCODE
              if (Test-Path -LiteralPath 'matrix-artifact' -PathType Container) { Copy-Item -LiteralPath 'matrix-artifact' -Destination (Join-Path $env:EVIDENCE 'matrix') -Recurse -Force }
            } finally {
              Pop-Location
              git worktree remove --force $worktree
              git worktree prune
            }
            if ($matrixExit -ne 0) { throw "Windows matrix exit $matrixExit" }
            $matrixStatusPath = Join-Path $env:EVIDENCE 'matrix\validation-status.json'
            if (-not (Test-Path -LiteralPath $matrixStatusPath -PathType Leaf)) { throw 'matrix validation-status.json missing' }
            $matrixStatus = Get-Content -Raw -LiteralPath $matrixStatusPath | ConvertFrom-Json
            if ($matrixStatus.status -ne 'PASS' -or $matrixStatus.release_result -ne 'PASS' -or $matrixStatus.debug_result -ne 'PASS' -or $matrixStatus.asan_result -ne 'PASS' -or $matrixStatus.selected_trials_result -ne '10/10 PASS' -or $matrixStatus.timeout_result -ne 'PASS' -or $matrixStatus.stall_result -ne 'PASS' -or $matrixStatus.clean_reproducibility -ne 'PASS' -or [int]$matrixStatus.project_warning_count -ne 0) { throw 'Windows matrix semantic status mismatch' }
            'MSVC x64 Release: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'msvc-release.txt')
            'MSVC x64 Debug /RTC1: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'msvc-debug-rtc1.txt')
            'MSVC x64 AddressSanitizer: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'msvc-asan.txt')
            'CTest: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'ctest.txt')
            'direct runtime: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'runtime.txt')
            'selected trials: 10/10 PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'trials.txt')
            @('timeout: PASS','stall: PASS') | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'timeout-stall.txt')
            'project warnings = 0' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'warnings.txt')
            'clean reproducibility: PASS' | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'clean-reproducibility.txt')

            "CURRENT_STAGE=pre-publication gate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Get-ChildItem -Path . -Directory -Filter '__pycache__' -Recurse -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
            $finalStatus = @(git status --short)
            if ($finalStatus.Count -ne 0) { throw "working tree dirty: $($finalStatus -join ',')" }
            $commitCount = (git rev-list --count "$env:BASELINE_SHA..HEAD").Trim()
            if ($commitCount -ne '2') { throw "new commit count $commitCount" }
            if (@(git ls-tree -r --name-only HEAD | Where-Object { $_ -eq '.github/workflows/nc003b-source-normalization-bootstrap.yml' }).Count -ne 0) { throw 'bootstrap workflow present in result history' }
            git diff --check
            if ($LASTEXITCODE -ne 0) { throw 'final git diff --check failed' }
            git log --oneline --decorate -3 | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-log.txt')
            "FINAL_HEAD=$commitG" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "FINAL_TREE=$treeG" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "VALIDATED — PENDING PUSH`nhead=$commitG`ntree=$treeG" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
          } catch {
            "STOP — $env:CURRENT_STAGE: $($_.Exception.Message)" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
            throw
          }

      - name: Publish result branch
        if: success()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          "CURRENT_STAGE=publish result branch" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          try {
            if (@(git status --short).Count -ne 0) { throw 'working tree dirty before push' }
            if (@(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH").Count -ne 0) { throw 'remote result branch appeared before push' }
            git push origin "HEAD:refs/heads/$env:RESULT_BRANCH"
            if ($LASTEXITCODE -ne 0) { throw 'git push failed' }
            $remote = @(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH")
            if ($remote.Count -ne 1 -or ($remote[0] -split '\s+')[0] -ne $env:FINAL_HEAD) { throw 'remote result branch identity mismatch' }
            $remote | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'published-branch.txt')
            "PUBLISHED — WINDOWS EXACT-HEAD VALIDATED`nhead=$env:FINAL_HEAD`ntree=$env:FINAL_TREE`nforce=false`nrun_id=$env:GITHUB_RUN_ID" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
          } catch {
            "STOP — publication: $($_.Exception.Message)" | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
            throw
          }

      - name: Record unresolved failure
        if: failure()
        shell: powershell
        run: |
          $evidence = if ($env:EVIDENCE) { $env:EVIDENCE } else { Join-Path $env:RUNNER_TEMP 'Artifacts\NC-003B-Phase0-source-normalization' }
          New-Item -ItemType Directory -Force $evidence | Out-Null
          $statusPath = Join-Path $evidence 'final-status.txt'
          if (-not (Test-Path -LiteralPath $statusPath -PathType Leaf)) { "STOP — $env:CURRENT_STAGE: step failed before detailed status was recorded" | Set-Content -Encoding utf8 $statusPath }

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NC-003B-Phase0-source-normalization-${{ github.run_id }}
          path: ${{ runner.temp }}\Artifacts\NC-003B-Phase0-source-normalization
          if-no-files-found: error
          retention-days: 30
