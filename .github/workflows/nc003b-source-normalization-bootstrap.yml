name: NC-003B Phase 0 source normalization bootstrap

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  contents: write
  actions: read

concurrency:
  group: nc003b-source-normalization-bootstrap
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  BASELINE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  BASELINE_TREE: 64a4af00ed06bdaa57553960685e670a472b55ba
  RESULT_BRANCH: agent/nc-003b-phase0-source-normalization

jobs:
  normalize-and-validate:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 120
    steps:
      - name: Initialize evidence control plane
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const os = require('os');
            const evidence = path.join(
              process.env.RUNNER_TEMP,
              'Artifacts',
              'NC-003B-Phase0-source-normalization'
            );
            fs.rmSync(evidence, { recursive: true, force: true });
            fs.mkdirSync(evidence, { recursive: true });
            const control = [
              `run_id=${process.env.GITHUB_RUN_ID}`,
              `run_attempt=${process.env.GITHUB_RUN_ATTEMPT}`,
              `bootstrap_sha=${process.env.GITHUB_SHA}`,
              `runner_name=${process.env.RUNNER_NAME}`,
              `timestamp=${new Date().toISOString()}`,
              ''
            ].join(os.EOL);
            fs.writeFileSync(
              path.join(evidence, 'control-plane-started.txt'),
              control,
              'utf8'
            );
            fs.appendFileSync(
              process.env.GITHUB_ENV,
              `EVIDENCE=${evidence}${os.EOL}`,
              'utf8'
            );

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          ref: agent/nc-003b-phase0-source-normalization-bootstrap
          path: bootstrap
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: PowerShell execution-policy canary
        shell: cmd
        run: |
          @echo off
          powershell.exe ^
            -NoLogo ^
            -NoProfile ^
            -NonInteractive ^
            -ExecutionPolicy Bypass ^
            -File "%GITHUB_WORKSPACE%\bootstrap\.github\nc003b-bootstrap\powershell-canary.ps1" > "%EVIDENCE%\powershell-canary-command.txt" 2>&1
          set "NC003B_PS_EXIT=%ERRORLEVEL%"
          type "%EVIDENCE%\powershell-canary-command.txt"
          exit /b %NC003B_PS_EXIT%

      - name: Verify canary independently
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const canary = path.join(
              process.env.RUNNER_TEMP,
              'nc003b-powershell-canary.txt'
            );
            const result = path.join(
              process.env.EVIDENCE,
              'powershell-canary.txt'
            );
            const status = path.join(
              process.env.EVIDENCE,
              'final-status.txt'
            );
            const commandLog = path.join(
              process.env.EVIDENCE,
              'powershell-canary-command.txt'
            );
            const commandText = fs.existsSync(commandLog)
              ? fs.readFileSync(commandLog, 'utf8')
              : '';
            const groupPolicyOverride = /PSSecurityException|running scripts is disabled/i
              .test(commandText);
            if (!fs.existsSync(canary)) {
              fs.writeFileSync(result, 'MISSING\n', 'utf8');
              const stop = groupPolicyOverride
                ? 'STOP — runner Group Policy overrides process ExecutionPolicy Bypass\n'
                : 'STOP — PowerShell execution-policy canary failed\n';
              fs.writeFileSync(status, stop, 'utf8');
              core.setFailed(stop.trim());
              return;
            }
            const content = fs.readFileSync(canary, 'utf8');
            if (content !== 'POWERSHELL_EXECUTED') {
              fs.writeFileSync(
                result,
                `CONTENT_MISMATCH=${JSON.stringify(content)}\n`,
                'utf8'
              );
              fs.writeFileSync(
                status,
                'STOP — PowerShell execution-policy canary failed\n',
                'utf8'
              );
              core.setFailed('PowerShell execution-policy canary failed');
              return;
            }
            fs.writeFileSync(result, 'POWERSHELL_EXECUTED\n', 'utf8');

      - name: Checkout exact worktree
        uses: actions/checkout@v4
        with:
          ref: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          path: work
          fetch-depth: 0
          clean: true
          persist-credentials: true

      - name: Download accepted closure evidence
        uses: actions/download-artifact@v4
        with:
          name: NC-003B-Phase0-final-closure-3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          path: ${{ runner.temp }}\accepted-closure
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29873058430

      - name: Verify transparent bootstrap sources
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');
            const root = path.join(process.env.GITHUB_WORKSPACE, 'bootstrap');
            const workflow = path.join(
              root,
              '.github',
              'workflows',
              'nc003b-source-normalization-bootstrap.yml'
            );
            const support = path.join(
              root,
              '.github',
              'nc003b-bootstrap'
            );
            const files = {
              validator: path.join(support, 'validate_repository.py'),
              orchestration: path.join(support, 'run-source-normalization.ps1'),
              canary: path.join(support, 'powershell-canary.ps1'),
              publication: path.join(support, 'publish-result-branch.ps1')
            };
            const expectedEntries = [
              'powershell-canary.ps1',
              'publish-result-branch.ps1',
              'run-source-normalization.ps1',
              'validate_repository.py'
            ];
            const sha256 = b => crypto
              .createHash('sha256')
              .update(b)
              .digest('hex');
            const gitBlob = b => crypto
              .createHash('sha1')
              .update(Buffer.concat([
                Buffer.from(`blob ${b.length}\0`, 'utf8'),
                b
              ]))
              .digest('hex');
            const fail = message => {
              fs.writeFileSync(
                path.join(process.env.EVIDENCE, 'final-status.txt'),
                `STOP — bootstrap source transparency: ${message}\n`,
                'utf8'
              );
              core.setFailed(message);
            };
            for (const required of [workflow, ...Object.values(files)]) {
              if (!fs.existsSync(required) || !fs.statSync(required).isFile()) {
                fail(`required source missing: ${required}`);
                return;
              }
            }
            const entries = fs.readdirSync(support, { withFileTypes: true });
            const actualEntries = entries.map(entry => entry.name).sort();
            if (
              entries.some(entry => !entry.isFile()) ||
              JSON.stringify(actualEntries) !== JSON.stringify(expectedEntries)
            ) {
              fail(`unexpected bootstrap entries: ${actualEntries.join(',')}`);
              return;
            }

            const workflowText = fs.readFileSync(workflow, 'utf8');
            const bytes = Object.fromEntries(
              Object.entries(files).map(([name, file]) => [name, fs.readFileSync(file)])
            );
            const text = Object.fromEntries(
              Object.entries(bytes).map(([name, value]) => [name, value.toString('utf8')])
            );
            const token = (...parts) => parts.join('');
            const shellLines = workflowText
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(line => line.startsWith('shell:'));
            if (
              shellLines.length !== 3 ||
              shellLines.some(line => line !== 'shell: cmd')
            ) {
              fail(`non-cmd shell remains: ${shellLines.join(',')}`);
              return;
            }

            const transparentText = [
              workflowText,
              text.canary,
              text.publication,
              text.validator
            ].join('\n');
            const forbiddenTokens = [
              token('From', 'Base', '64String'),
              token('b64', 'decode('),
              token('gun', 'zip', 'Sync'),
              token('z', 'lib.', 'gun', 'zip'),
              token('g', 'zip.', 'decompress('),
              token('Encoded', 'Command'),
              token('Script', 'Block]::Create'),
              token('Script', 'Block::Create'),
              token('Invoke', '-Expression'),
              token('exec', '(compile'),
              token('-Fi', 'le {0}'),
              token('shell:', ' powershell'),
              token('shell:', ' pwsh')
            ];
            for (const item of forbiddenTokens) {
              if (transparentText.includes(item)) {
                fail(`forbidden executable-source token: ${item}`);
                return;
              }
            }
            if (
              transparentText.includes(token('powershell.exe ', '-Com', 'mand')) ||
              transparentText.includes(token('powershell.exe ', '-Encoded', 'Command'))
            ) {
              fail('forbidden PowerShell command transport');
              return;
            }
            if (
              /git\s+push[^\r\n]*(?:--force(?:-with-lease)?|\s-f(?:\s|$))/i
                .test(transparentText)
            ) {
              fail('force push remains');
              return;
            }
            const dynamicSourceCreation = [
              /writeFileSync\([^)]*['"][^'"]+\.(?:ps1|py)['"]/is,
              /WriteAllText\([^)]*['"][^'"]+\.(?:ps1|py)['"]/is,
              /Set-Content[^\r\n]*\.(?:ps1|py)(?:['"]|\s|$)/i,
              /Out-File[^\r\n]*\.(?:ps1|py)(?:['"]|\s|$)/i
            ].some(pattern => pattern.test(transparentText));
            if (dynamicSourceCreation) {
              fail('dynamic creation of executable source remains');
              return;
            }
            const workflowLines = workflowText
              .split(/\r?\n/)
              .map(line => line.trim());
            const bypassCount = workflowLines
              .filter(line => line === '-ExecutionPolicy Bypass ^')
              .length;
            const fileCount = workflowLines
              .filter(line =>
                line.startsWith('-File "%GITHUB_WORKSPACE%\\bootstrap\\.github\\nc003b-bootstrap\\') &&
                line.includes('.ps1"')
              )
              .length;
            if (bypassCount !== 3 || fileCount !== 3) {
              fail(`unexpected process wrapper count: bypass=${bypassCount}, file=${fileCount}`);
              return;
            }

            if (
              bytes.orchestration.length !== 16449 ||
              sha256(bytes.orchestration) !== '7f8196da3934e89ed0c21aaa9d0be34e4b6a5825366483c81d0820e110a21d02' ||
              gitBlob(bytes.orchestration) !== 'c01833669acbfb3762b0afa267dffbb10b109966'
            ) {
              fail('orchestration source identity mismatch');
              return;
            }
            if (
              bytes.validator.length !== 11105 ||
              sha256(bytes.validator) !== 'aae52e31fb11ffab7791a3b3c33dbef73faa0d753df977939011b28fb0b8341d' ||
              gitBlob(bytes.validator) !== '65c309558f1e50a8258caaef61e38087f2382392'
            ) {
              fail('validator support identity mismatch');
              return;
            }

            const report = [
              'bootstrap source transparency: PASS',
              `workflow_blob=${gitBlob(Buffer.from(workflowText, 'utf8'))}`,
              ...Object.entries(bytes).flatMap(([name, value]) => [
                `${name}_bytes=${value.length}`,
                `${name}_sha256=${sha256(value)}`,
                `${name}_blob=${gitBlob(value)}`
              ]),
              ''
            ].join('\n');
            fs.writeFileSync(
              path.join(process.env.EVIDENCE, 'bootstrap-source-transparency.txt'),
              report,
              'utf8'
            );

      - name: Normalize and validate exact head
        shell: cmd
        working-directory: ${{ github.workspace }}\work
        run: |
          @echo off
          powershell.exe ^
            -NoLogo ^
            -NoProfile ^
            -NonInteractive ^
            -ExecutionPolicy Bypass ^
            -File "%GITHUB_WORKSPACE%\bootstrap\.github\nc003b-bootstrap\run-source-normalization.ps1"
          exit /b %ERRORLEVEL%

      - name: Record unresolved failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const evidence = process.env.EVIDENCE;
            fs.mkdirSync(evidence, { recursive: true });
            const status = path.join(evidence, 'final-status.txt');
            if (!fs.existsSync(status)) {
              fs.writeFileSync(
                status,
                'STOP — workflow failed before detailed status was recorded\n',
                'utf8'
              );
            }

      - name: Upload validated evidence before publication
        id: validation_upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NC-003B-Phase0-source-normalization-validation-${{ github.run_id }}
          path: ${{ runner.temp }}\Artifacts\NC-003B-Phase0-source-normalization
          if-no-files-found: error
          retention-days: 30

      - name: Publish result branch
        id: publish
        if: success()
        shell: cmd
        working-directory: ${{ github.workspace }}\work
        run: |
          @echo off
          powershell.exe ^
            -NoLogo ^
            -NoProfile ^
            -NonInteractive ^
            -ExecutionPolicy Bypass ^
            -File "%GITHUB_WORKSPACE%\bootstrap\.github\nc003b-bootstrap\publish-result-branch.ps1"
          exit /b %ERRORLEVEL%

      - name: Record failure after publication stage
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const evidence = process.env.EVIDENCE;
            fs.mkdirSync(evidence, { recursive: true });
            const status = path.join(evidence, 'final-status.txt');
            const current = fs.existsSync(status)
              ? fs.readFileSync(status, 'utf8').trim()
              : '';
            const publishOutcome = '${{ steps.publish.outcome }}';
            const validationUploadOutcome = '${{ steps.validation_upload.outcome }}';
            if (publishOutcome === 'failure') {
              if (!current.startsWith('STOP — result publication:')) {
                fs.writeFileSync(
                  status,
                  'STOP — result publication failed after validated evidence upload\n',
                  'utf8'
                );
              }
              return;
            }
            if (validationUploadOutcome === 'failure') {
              fs.writeFileSync(
                status,
                'STOP — validated evidence upload failed\n',
                'utf8'
              );
              return;
            }
            if (!current.startsWith('STOP —')) {
              fs.writeFileSync(
                status,
                'STOP — workflow failed before result publication completed\n',
                'utf8'
              );
            }

      - name: Upload final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NC-003B-Phase0-source-normalization-final-${{ github.run_id }}
          path: ${{ runner.temp }}\Artifacts\NC-003B-Phase0-source-normalization
          if-no-files-found: error
          retention-days: 30
