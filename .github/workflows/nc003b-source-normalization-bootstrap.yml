name: NC-003B absolute artifact path diagnostics

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 10
    steps:
      - name: Print artifact failure details
        uses: actions/github-script@v7
        env:
          JOB_ID: "89000194645"
        with:
          script: |
            const response = await github.request('GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: Number(process.env.JOB_ID),
              request: { parseSuccessResponseBody: false }
            });
            const chunks = [];
            if (response.data && typeof response.data.getReader === 'function') {
              const reader = response.data.getReader();
              while (true) {
                const part = await reader.read();
                if (part.done) break;
                chunks.push(Buffer.from(part.value));
              }
            } else {
              chunks.push(typeof response.data === 'string' ? Buffer.from(response.data) : Buffer.from(response.data));
            }
            const lines = Buffer.concat(chunks).toString('utf8').replace(/\u001b\[[0-9;]*m/g, '').split(/\r?\n/);
            const pattern = /(upload-artifact|No files were found|CreateArtifact|storage quota|quota|##\[error\]|Stage evidence|path:|GITHUB_WORKSPACE|nc003b-source-normalization-artifact)/i;
            core.info('=== DETAILS ===');
            for (const line of lines.filter(line => pattern.test(line)).slice(-80)) core.info(line.slice(0, 2000));
            core.info('=== TAIL ===');
            for (const line of lines.slice(-35)) core.info(line.slice(0, 2000));
            core.setFailed('diagnostic output complete');