name: NC-003B Phase 0 source normalization bootstrap

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  contents: write
  actions: read

concurrency:
  group: nc003b-source-normalization-bootstrap
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  BASELINE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  BASELINE_TREE: 64a4af00ed06bdaa57553960685e670a472b55ba
  RESULT_BRANCH: agent/nc-003b-phase0-source-normalization

jobs:
  normalize-and-validate:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 120
    steps:
      - name: Initialize evidence control plane
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const os = require('os');
            const evidence = path.join(
              process.env.RUNNER_TEMP,
              'Artifacts',
              'NC-003B-Phase0-source-normalization'
            );
            fs.rmSync(evidence, { recursive: true, force: true });
            fs.mkdirSync(evidence, { recursive: true });
            const control = [
              `run_id=${process.env.GITHUB_RUN_ID}`,
              `run_attempt=${process.env.GITHUB_RUN_ATTEMPT}`,
              `bootstrap_sha=${process.env.GITHUB_SHA}`,
              `runner_name=${process.env.RUNNER_NAME}`,
              `timestamp=${new Date().toISOString()}`,
              ''
            ].join(os.EOL);
            fs.writeFileSync(
              path.join(evidence, 'control-plane-started.txt'),
              control,
              'utf8'
            );
            fs.appendFileSync(
              process.env.GITHUB_ENV,
              `EVIDENCE=${evidence}${os.EOL}`,
              'utf8'
            );

      - name: PowerShell canary
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $path = Join-Path `
            $env:RUNNER_TEMP `
            'nc003b-powershell-canary.txt'

          [System.IO.File]::WriteAllText(
            $path,
            'POWERSHELL_EXECUTED',
            [System.Text.UTF8Encoding]::new($false)
          )

          Write-Host 'POWERSHELL_CANARY=CREATED'

      - name: Verify PowerShell canary independently
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const canary = path.join(
              process.env.RUNNER_TEMP,
              'nc003b-powershell-canary.txt'
            );
            const result = path.join(
              process.env.EVIDENCE,
              'powershell-canary.txt'
            );
            const status = path.join(
              process.env.EVIDENCE,
              'final-status.txt'
            );
            if (!fs.existsSync(canary)) {
              fs.writeFileSync(result, 'MISSING\n', 'utf8');
              fs.writeFileSync(
                status,
                `STOP — PowerShell canary: file missing: ${canary}\n`,
                'utf8'
              );
              core.setFailed(`PowerShell canary missing: ${canary}`);
              return;
            }
            const content = fs.readFileSync(canary, 'utf8');
            if (content !== 'POWERSHELL_EXECUTED') {
              fs.writeFileSync(
                result,
                `CONTENT_MISMATCH=${JSON.stringify(content)}\n`,
                'utf8'
              );
              fs.writeFileSync(
                status,
                'STOP — PowerShell canary: exact content mismatch\n',
                'utf8'
              );
              core.setFailed('PowerShell canary content mismatch');
              return;
            }
            fs.writeFileSync(result, 'POWERSHELL_EXECUTED\n', 'utf8');

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          ref: agent/nc-003b-phase0-source-normalization-bootstrap
          path: bootstrap
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Checkout exact worktree
        uses: actions/checkout@v4
        with:
          ref: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          path: work
          fetch-depth: 0
          clean: true
          persist-credentials: true

      - name: Download accepted closure evidence
        uses: actions/download-artifact@v4
        with:
          name: NC-003B-Phase0-final-closure-3c67a53a1c2a8d940736e21218cfd89a0b9870b6
          path: ${{ runner.temp }}\accepted-closure
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: 29873058430

      - name: Verify transparent bootstrap sources
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const crypto = require('crypto');
            const root = path.join(process.env.GITHUB_WORKSPACE, 'bootstrap');
            const workflow = path.join(
              root,
              '.github',
              'workflows',
              'nc003b-source-normalization-bootstrap.yml'
            );
            const support = path.join(
              root,
              '.github',
              'nc003b-bootstrap'
            );
            const orchestration = path.join(
              support,
              'run-source-normalization.ps1'
            );
            const validator = path.join(
              support,
              'validate_repository.py'
            );
            const sha256 = b => crypto.createHash('sha256').update(b).digest('hex');
            const gitBlob = b => crypto
              .createHash('sha1')
              .update(Buffer.concat([
                Buffer.from(`blob ${b.length}\0`, 'utf8'),
                b
              ]))
              .digest('hex');
            const fail = message => {
              fs.writeFileSync(
                path.join(process.env.EVIDENCE, 'final-status.txt'),
                `STOP — bootstrap source transparency: ${message}\n`,
                'utf8'
              );
              core.setFailed(message);
            };
            for (const required of [workflow, orchestration, validator]) {
              if (!fs.existsSync(required) || !fs.statSync(required).isFile()) {
                fail(`required source missing: ${required}`);
                return;
              }
            }
            const entries = fs.readdirSync(support, { withFileTypes: true });
            const unexpected = entries.filter(entry =>
              !entry.isFile() || !['.py', '.ps1'].includes(path.extname(entry.name).toLowerCase())
            );
            if (unexpected.length) {
              fail(`unexpected bootstrap entries: ${unexpected.map(x => x.name).join(',')}`);
              return;
            }
            const workflowText = fs.readFileSync(workflow, 'utf8');
            const orchestrationBytes = fs.readFileSync(orchestration);
            const validatorBytes = fs.readFileSync(validator);
            const orchestrationText = orchestrationBytes.toString('utf8');
            const stripPowerShellStrings = source => source
              .replace(/'(?:''|[^'])*'/gs, "''")
              .replace(/"(?:`.|[^"`]*)"/gs, '""');
            const executablePowerShell = stripPowerShellStrings(orchestrationText);
            const joined = workflowText + '\n' + executablePowerShell + '\n' + validatorBytes.toString('utf8');
            const token = (...parts) => parts.join('');
            const workflowForbidden = [
              token('env:', ' {P:'),
              token('gun', 'zip', 'Sync'),
              token('z', 'lib'),
              token('From', 'Base', '64String'),
              token("'base", "64'"),
              token('Script', 'Block::Create'),
              token('Invoke', '-Expression'),
              token('shell: power', 'shell.exe'),
              token('-Fi', 'le {0}'),
              token('-Com', 'mand'),
              token('p', 'wsh')
            ];
            const shellLines = workflowText
              .split(/\r?\n/)
              .map(line => line.trim())
              .filter(line => line.startsWith('shell:'));
            if (shellLines.some(line => line !== 'shell: powershell')) {
              fail(`non-builtin PowerShell shell remains: ${shellLines.join(',')}`);
              return;
            }
            for (const item of workflowForbidden) {
              if (workflowText.includes(item)) {
                fail(`workflow contains forbidden reconstruction token: ${item}`);
                return;
              }
            }
            const hasEncodedDecoder = [
              token('From', 'Base', '64String'),
              token('b64', 'decode('),
              token('Buffer.from(process.env.', "'base" + "64'")
            ].some(item => joined.includes(item));
            const hasBootstrapInflater = [
              token('gun', 'zip', 'Sync'),
              token('z', 'lib.', 'gun', 'zip'),
              token('g', 'zip.', 'decompress(')
            ].some(item => joined.includes(item));
            if (hasEncodedDecoder || hasBootstrapInflater) {
              fail('encoded executable-source reconstruction remains');
              return;
            }
            for (const item of [
              token('Script', 'Block]::Create'),
              token('Script', 'Block::Create'),
              token('Invoke', '-Expression'),
              token('exec', '(compile')
            ]) {
              if (executablePowerShell.includes(item)) {
                fail(`dynamic PowerShell execution remains: ${item}`);
                return;
              }
            }
            if (
              orchestrationBytes.length !== 16449 ||
              sha256(orchestrationBytes) !== '7f8196da3934e89ed0c21aaa9d0be34e4b6a5825366483c81d0820e110a21d02' ||
              gitBlob(orchestrationBytes) !== 'c01833669acbfb3762b0afa267dffbb10b109966'
            ) {
              fail('orchestration source identity mismatch');
              return;
            }
            if (
              validatorBytes.length !== 11105 ||
              sha256(validatorBytes) !== 'aae52e31fb11ffab7791a3b3c33dbef73faa0d753df977939011b28fb0b8341d' ||
              gitBlob(validatorBytes) !== '65c309558f1e50a8258caaef61e38087f2382392'
            ) {
              fail('validator support identity mismatch');
              return;
            }
            const report = [
              'bootstrap source transparency: PASS',
              `workflow_blob=${gitBlob(Buffer.from(workflowText, 'utf8'))}`,
              `orchestration_bytes=${orchestrationBytes.length}`,
              `orchestration_sha256=${sha256(orchestrationBytes)}`,
              `orchestration_blob=${gitBlob(orchestrationBytes)}`,
              `validator_bytes=${validatorBytes.length}`,
              `validator_sha256=${sha256(validatorBytes)}`,
              `validator_blob=${gitBlob(validatorBytes)}`,
              ''
            ].join('\n');
            fs.writeFileSync(
              path.join(process.env.EVIDENCE, 'bootstrap-source-transparency.txt'),
              report,
              'utf8'
            );

      - name: Normalize and validate exact head
        shell: powershell
        working-directory: ${{ github.workspace }}\work
        run: |
          $ErrorActionPreference = 'Stop'

          $script = Join-Path `
            '${{ github.workspace }}\bootstrap' `
            '.github\nc003b-bootstrap\run-source-normalization.ps1'

          if (-not (Test-Path -LiteralPath $script -PathType Leaf)) {
              throw "Orchestration script missing: $script"
          }

          & $script

          if (
            Test-Path -LiteralPath variable:\LASTEXITCODE
            -and $LASTEXITCODE -ne 0
          ) {
              exit $LASTEXITCODE
          }

      - name: Record unresolved failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const evidence = process.env.EVIDENCE;
            fs.mkdirSync(evidence, { recursive: true });
            const status = path.join(evidence, 'final-status.txt');
            if (!fs.existsSync(status)) {
              fs.writeFileSync(
                status,
                'STOP — workflow failed before detailed status was recorded\n',
                'utf8'
              );
            }

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NC-003B-Phase0-source-normalization-${{ github.run_id }}
          path: ${{ runner.temp }}\Artifacts\NC-003B-Phase0-source-normalization
          if-no-files-found: error
          retention-days: 30

      - name: Publish result branch
        if: success()
        shell: powershell
        working-directory: ${{ github.workspace }}\work
        run: |
          $ErrorActionPreference = 'Stop'

          if (@(git status --short).Count -ne 0) {
              throw 'Working tree dirty before result push'
          }

          $existing = @(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH")
          if ($LASTEXITCODE -ne 0) {
              throw 'Result branch probe failed'
          }
          if ($existing.Count -ne 0) {
              throw 'Result branch appeared before controlled push'
          }

          git push origin "HEAD:refs/heads/$env:RESULT_BRANCH"
          if ($LASTEXITCODE -ne 0) {
              throw 'Result branch push failed'
          }

          $remote = @(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH")
          if (
            $remote.Count -ne 1 `
            -or ($remote[0] -split '\s+')[0] -ne $env:FINAL_HEAD
          ) {
              throw 'Remote result branch identity mismatch'
          }

          $remoteTree = (git rev-parse "$($env:FINAL_HEAD)^{tree}").Trim()
          if ($remoteTree -ne $env:FINAL_TREE) {
              throw 'Remote result tree identity mismatch'
          }

          @(
            "head=$env:FINAL_HEAD"
            "tree=$env:FINAL_TREE"
            'force=false'
            "run_id=$env:GITHUB_RUN_ID"
          ) | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'published-branch.txt')

          @(
            'PUBLISHED — WINDOWS EXACT-HEAD VALIDATED'
            "head=$env:FINAL_HEAD"
            "tree=$env:FINAL_TREE"
            'force=false'
            "run_id=$env:GITHUB_RUN_ID"
          ) | Set-Content -Encoding utf8 (Join-Path $env:EVIDENCE 'final-status.txt')
