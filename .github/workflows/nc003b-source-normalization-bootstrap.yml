            if(-not$vs-or-not$vsv.StartsWith('17.')){throw 'VS2022 missing'}
            if(-not$v143-or-not(Test-Path (Join-Path $vs "VC\Tools\MSVC\$v143"))){throw 'MSVC v143 missing'}
