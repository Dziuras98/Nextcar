name: NC-003B Phase 0 source normalization bootstrap
on:
  push:
    branches: [agent/nc-003b-phase0-source-normalization-bootstrap]
permissions: {contents: write, actions: read}
concurrency: {group: nc003b-source-normalization-bootstrap, cancel-in-progress: true}
env:
  PYTHONDONTWRITEBYTECODE: "1"
  BASELINE_SHA: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6
  BASELINE_TREE: 64a4af00ed06bdaa57553960685e670a472b55ba
  RESULT_BRANCH: agent/nc-003b-phase0-source-normalization
jobs:
  normalize-and-validate:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 120
    steps:
    - uses: actions/github-script@v7
      with:
        script: const fs=require('fs'),p=require('path'),o=require('os'),e=p.join(process.env.RUNNER_TEMP,'Artifacts','NC-003B-Phase0-source-normalization');fs.rmSync(e,{recursive:true,force:true});fs.mkdirSync(e,{recursive:true});fs.appendFileSync(process.env.GITHUB_ENV,'EVIDENCE='+e+o.EOL)
    - name: PowerShell canary
      shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
      run: "[IO.File]::WriteAllText((Join-Path $env:RUNNER_TEMP 'nc003b-powershell-canary.txt'),'POWERSHELL_EXECUTED',[Text.UTF8Encoding]::new($false))"
    - uses: actions/github-script@v7
      with:
        script: const fs=require('fs'),p=require('path'),f=p.join(process.env.RUNNER_TEMP,'nc003b-powershell-canary.txt');if(!fs.existsSync(f)||fs.readFileSync(f,'utf8')!=='POWERSHELL_EXECUTED')core.setFailed('PowerShell canary failed');else fs.writeFileSync(p.join(process.env.EVIDENCE,'powershell-canary.txt'),'POWERSHELL_EXECUTED\n')
    - uses: actions/checkout@v4
      with: {ref: agent/nc-003b-phase0-source-normalization-bootstrap, path: bootstrap, fetch-depth: 1, clean: true, persist-credentials: false}
    - uses: actions/checkout@v4
      with: {ref: 3c67a53a1c2a8d940736e21218cfd89a0b9870b6, path: work, fetch-depth: 0, clean: true, persist-credentials: true}
    - uses: actions/download-artifact@v4
      with:
        name: NC-003B-Phase0-final-closure-3c67a53a1c2a8d940736e21218cfd89a0b9870b6
        path: ${{ runner.temp }}\accepted-closure
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: 29873058430
    - uses: actions/github-script@v7
      env: {P: , S: 7f8196da3934e89ed0c21aaa9d0be34e4b6a5825366483c81d0820e110a21d02}
      with:
        script: const fs=require('fs'),p=require('path'),z=require('zlib'),c=require('crypto'),b=z.gunzipSync(Buffer.from(process.env.P,'base64')),h=c.createHash('sha256').update(b).digest('hex');if(h!==process.env.S)core.setFailed('orchestration script SHA mismatch');else fs.writeFileSync(p.join(process.env.RUNNER_TEMP,'nc003b.ps1'),b)
    - name: Normalize and validate exact head
      working-directory: ${{ github.workspace }}\work
      shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
      run: "& (Join-Path $env:RUNNER_TEMP 'nc003b.ps1');if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }"
    - name: Upload evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: NC-003B-Phase0-source-normalization-${{ github.run_id }}
        path: ${{ runner.temp }}\Artifacts\NC-003B-Phase0-source-normalization
        if-no-files-found: error
        retention-days: 30
    - name: Publish result branch
      if: success()
      working-directory: ${{ github.workspace }}\work
      shell: powershell.exe -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File {0}
      run: $ErrorActionPreference='Stop';if(@(git status --short).Count){throw 'dirty before push'};$r=@(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH");if($LASTEXITCODE -or $r.Count){throw 'result appeared/probe failed'};git push origin "HEAD:refs/heads/$env:RESULT_BRANCH";if($LASTEXITCODE){throw 'push'};$r=@(git ls-remote --heads origin "refs/heads/$env:RESULT_BRANCH");if($r.Count -ne 1 -or ($r[0] -split '\s+')[0] -ne $env:FINAL_HEAD){throw 'remote identity'};Write-Host 'PUBLISHED — WINDOWS EXACT-HEAD VALIDATED';Write-Host "head=$env:FINAL_HEAD tree=$env:FINAL_TREE force=false run=$env:GITHUB_RUN_ID"
