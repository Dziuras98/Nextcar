name: NC-003B source normalization diagnostics

on:
  push:
    branches:
      - agent/nc-003b-phase0-source-normalization-bootstrap

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 10
    steps:
      - name: Read failed job log and publish control report
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_ID: "88996554848"
          RUN_ID: "29941594797"
          TARGET_BRANCH: agent/nc-003b-phase0-source-normalization-bootstrap
          TARGET_PATH: .github/workflows/nc003b-source-normalization-bootstrap.yml
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const jobId = process.env.JOB_ID;
            const url = `https://api.github.com/repos/${owner}/${repo}/actions/jobs/${jobId}/logs`;
            const response = await fetch(url, {
              redirect: 'follow',
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28'
              }
            });
            if (!response.ok) {
              throw new Error(`job log fetch failed: ${response.status} ${response.statusText}`);
            }
            const text = await response.text();
            const lines = text.replace(/\u001b\[[0-9;]*m/g, '').split(/\r?\n/);
            const selected = [];
            const pattern = /(FINAL_HEAD|FINAL_TREE|PUBLISHED|git push|new branch|remote:|upload artifact|upload-artifact|artifact|##\[error\]|failed|failure|commitG|treeG|refs\/heads\/agent\/nc-003b-phase0-source-normalization)/i;
            for (const line of lines) {
              if (pattern.test(line)) selected.push(line);
            }
            selected.push('--- LOG TAIL ---');
            selected.push(...lines.slice(-100));
            const reportLines = selected.slice(-240).map(line => `# DIAGNOSTIC ${line.slice(0, 1000)}`);
            const current = await github.rest.repos.getContent({
              owner,
              repo,
              path: process.env.TARGET_PATH,
              ref: process.env.TARGET_BRANCH
            });
            if (Array.isArray(current.data) || !current.data.content || !current.data.sha) {
              throw new Error('workflow file payload unavailable');
            }
            const existing = Buffer.from(current.data.content, 'base64').toString('utf8');
            const block = [
              '',
              `# DIAGNOSTIC_BEGIN run=${process.env.RUN_ID} job=${jobId}`,
              ...reportLines,
              '# DIAGNOSTIC_END',
              ''
            ].join('\n');
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: process.env.TARGET_PATH,
              branch: process.env.TARGET_BRANCH,
              message: `[skip ci] Record NC-003B diagnostic for run ${process.env.RUN_ID}`,
              sha: current.data.sha,
              content: Buffer.from(existing + block, 'utf8').toString('base64')
            });