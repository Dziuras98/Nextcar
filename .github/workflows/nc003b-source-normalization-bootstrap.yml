            $v143=if($v143f -and (Test-Path $v143f)){(Get-Content -Raw $v143f).Trim()}else{''}
            $sdk=(Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' -ErrorAction SilentlyContinue).KitsRoot10
            $sdks=if($sdk -and (Test-Path "$sdk\Include")){@(Get-ChildItem "$sdk\Include" -Directory|% Name)}else{@()}
            @("RUNNER_OS=$env:RUNNER_OS","RUNNER_ARCH=$env:RUNNER_ARCH","COMPUTERNAME=$env:COMPUTERNAME","required_labels=self-hosted,Windows,X64,unreal-5.8","PowerShell version=$($PSVersionTable.PSVersion)","Python version=$(& python --version 2>&1)","CMake version=$((& cmake --version|Select-Object -First 1))","vswhere result=$((& $vw -latest -products * -format json 2>&1)-join ' ')","Visual Studio installation=$vs","Visual Studio version=$vsv","MSVC toolset=$v143","Windows SDK=$sdk $($sdks-join ',')")|Set-Content -Encoding utf8 "$env:EVIDENCE\runner-identity.txt"
            Get-Content "$env:EVIDENCE\runner-identity.txt"
