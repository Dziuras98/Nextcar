name: Vehicle Math CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "Source/Nextcar/ArcadeVehicleMath.h"
      - "Source/Nextcar/Tests/ArcadeVehicleMathTests.cpp"
      - "Tests/**"
      - ".github/workflows/unreal-ci.yml"
  push:
    branches:
      - agent/initial-driving-prototype
    paths:
      - "Source/Nextcar/ArcadeVehicleMath.h"
      - "Source/Nextcar/Tests/ArcadeVehicleMathTests.cpp"
      - "Tests/**"
      - ".github/workflows/unreal-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vehicle-math-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vehicle-math-tests:
    name: Compile and run standalone vehicle math tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile tests
        run: |
          mkdir -p .ci-build
          g++ \
            -std=c++20 \
            -Wall \
            -Wextra \
            -Wpedantic \
            -Werror \
            -ITests \
            -ISource/Nextcar \
            Tests/ArcadeVehicleMathStandaloneTests.cpp \
            -o .ci-build/arcade_vehicle_math_tests

      - name: Run tests
        run: ./.ci-build/arcade_vehicle_math_tests
