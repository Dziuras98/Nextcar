name: NC-003B Phase 0 Windows exact-head validation

on:
  push:
    branches:
      - manager/nc-003b-windows-validation

permissions:
  contents: read

env:
  EXPECTED_SOURCE_SHA: 22721f28f617d8eadcf624198a2a105aa9f26be2

jobs:
  asan-diagnostic:
    name: MSVC AddressSanitizer focused diagnostic
    runs-on: windows-2022
    timeout-minutes: 30
    outputs:
      diagnostic: ${{ steps.asan.outputs.diagnostic }}
    steps:
      - name: Configure byte-exact Git worktree
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout exact validated source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: 22721f28f617d8eadcf624198a2a105aa9f26be2
          fetch-depth: 1
          persist-credentials: false

      - name: Capture ASan failure
        id: asan
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          function Safe([object[]]$lines) {
            $selected = @(
              $lines |
                ForEach-Object { ([string]$_).Trim() } |
                Where-Object {
                  $_ -match 'AddressSanitizer|ERROR:|SUMMARY:|runtime error|access.violation|heap-|stack-|use-after|double-free|alloc-dealloc|error C\d+|fatal error|LNK\d+|FAILED|failed|Exception'
                } |
                Select-Object -Last 10
            )
            if ($selected.Count -eq 0) {
              $selected = @($lines | ForEach-Object { ([string]$_).Trim() } | Where-Object { $_ } | Select-Object -Last 10)
            }
            $text = ($selected -join ' / ') -replace '[\r\n]+', ' ' -replace '\|', '/' -replace "'", ''
            $text = ($text -replace '\s+', ' ').Trim()
            if ($text.Length -gt 220) { $text = $text.Substring(0, 220) }
            return $text
          }
          function Fail([string]$stage, [int]$code, [object[]]$output) {
            $message = "$stage exit $code -- $(Safe $output)"
            "diagnostic=$message" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw $message
          }

          $actual = (git rev-parse HEAD).Trim()
          if ($actual -ne $env:EXPECTED_SOURCE_SHA) { throw "Unexpected checkout: $actual" }
          if (git status --porcelain) { throw 'Checkout is not clean' }
          git submodule status

          $configure = @(cmake `
            -S Tools/EngineSimVendor/Standalone `
            -B build-nc003b-msvc-asan `
            -G 'Visual Studio 17 2022' `
            -A x64 `
            -T v143 `
            '-DCMAKE_CXX_FLAGS_RELWITHDEBINFO=/O1 /Zi /fsanitize=address' `
            '-DCMAKE_EXE_LINKER_FLAGS_RELWITHDEBINFO=/DEBUG /INCREMENTAL:NO' 2>&1)
          $configureCode = $LASTEXITCODE
          $configure | Out-Host
          if ($configureCode -ne 0) { Fail 'configure' $configureCode $configure }

          $flags = @(Get-Content build-nc003b-msvc-asan/CMakeCache.txt | Where-Object { $_ -match '^CMAKE_CXX_FLAGS(?:_RELWITHDEBINFO)?:' -or $_ -match '^CMAKE_EXE_LINKER_FLAGS(?:_RELWITHDEBINFO)?:' })
          $flags | Out-Host
          $flagText = $flags -join "`n"
          if ($flagText -notmatch '/fsanitize=address' -or $flagText -notmatch '/Zi(?:\s|$)' -or $flagText -match '/RTC1(?:\s|$)' -or $flagText -notmatch '/INCREMENTAL:NO') {
            "diagnostic=ASan flag contract failed -- $(Safe $flags)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw 'ASan flag contract failed'
          }

          $build = @(cmake --build build-nc003b-msvc-asan --config RelWithDebInfo --verbose 2>&1)
          $buildCode = $LASTEXITCODE
          $build | Out-Host
          if ($buildCode -ne 0) { Fail 'build' $buildCode $build }

          $env:ASAN_OPTIONS = 'abort_on_error=true:alloc_dealloc_mismatch=true'
          $ctest = @(ctest --test-dir build-nc003b-msvc-asan -C RelWithDebInfo --output-on-failure 2>&1)
          $ctestCode = $LASTEXITCODE
          $ctest | Out-Host
          if ($ctestCode -ne 0) { Fail 'CTest' $ctestCode $ctest }

          $runtime = @(& .\build-nc003b-msvc-asan\RelWithDebInfo\nc003b_phase0_tests.exe 2>&1)
          $runtimeCode = $LASTEXITCODE
          $runtime | Out-Host
          if ($runtimeCode -ne 0) { Fail 'runtime' $runtimeCode $runtime }

          $expected = @('PASS ring-buffer','PASS synchronous-synthesizer','PASS deterministic-rng','PASS solver-runtime','PASS impulse-response-integrity','PASS fixture-transcription-parity','PASS fixture-simulator-smoke')
          if (($runtime -join "`n") -ne ($expected -join "`n")) {
            "diagnostic=runtime stdout mismatch -- $(Safe $runtime)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw 'ASan runtime stdout mismatch'
          }
          'diagnostic=ASan configure build CTest runtime PASS' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  notification:
    needs: asan-diagnostic
    if: always()
    name: diagnostic -- ${{ needs.asan-diagnostic.outputs.diagnostic }}
    runs-on: windows-2022
    steps:
      - name: Force diagnostic notification
        shell: pwsh
        run: throw 'Intentional ASan diagnostic notification sentinel'
