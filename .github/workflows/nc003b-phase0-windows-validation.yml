name: NC-003B Phase 0 Windows exact-head validation

on:
  push:
    branches: [manager/nc-003b-windows-validation]

permissions:
  contents: read

jobs:
  windows-python-diagnostic:
    runs-on: windows-2022
    timeout-minutes: 20
    outputs:
      diagnostic: ${{ steps.python.outputs.diagnostic }}
    steps:
      - name: Checkout exact validated source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: c4bdc6df899d856a9bbdfbf4955b8229c2848148
          fetch-depth: 1
          persist-credentials: false

      - name: Exact head and Python diagnostic
        id: python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $expected = "c4bdc6df899d856a9bbdfbf4955b8229c2848148"
          $actual = (git rev-parse HEAD).Trim()
          if ($actual -ne $expected) { throw "Unexpected checkout: expected $expected, received $actual" }
          if (git status --porcelain) { throw "Checkout is not clean" }
          git submodule status
          python --version
          cmake --version
          git --version
          python -m py_compile `
            Tools/EngineSimVendor/verify_subaru_ej25_fixture.py `
            Tools/EngineSimVendor/tests/test_subaru_ej25_fixture_verifier.py
          if ($LASTEXITCODE -ne 0) { throw "py_compile failed with exit code $LASTEXITCODE" }
          $output = @(python -m unittest -v Tools/EngineSimVendor/tests/test_subaru_ej25_fixture_verifier.py 2>&1)
          $code = $LASTEXITCODE
          $output | Out-Host
          if ($code -ne 0) {
            $tail = @($output | ForEach-Object { ([string]$_).Trim() } | Where-Object { $_ } | Select-Object -Last 8)
            $safe = (($tail -join ' / ') -replace '[\r\n]+',' ' -replace '\|','/' -replace "'",'')
            if ($safe.Length -gt 180) { $safe = $safe.Substring($safe.Length - 180) }
            "diagnostic=unittest exit $code -- $safe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw "Python unittest failed with exit code $code"
          }
          "diagnostic=Python py_compile and 21/21 unittest PASS" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  diagnostic:
    needs: windows-python-diagnostic
    if: always()
    name: diagnostic -- ${{ needs.windows-python-diagnostic.outputs.diagnostic }}
    runs-on: windows-2022
    steps:
      - name: Expose Python diagnostic
        shell: pwsh
        run: Write-Host '${{ needs.windows-python-diagnostic.outputs.diagnostic }}'
