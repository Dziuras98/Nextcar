name: NC-003B Phase 0 Windows exact-head validation

on:
  push:
    branches: [manager/nc-003b-windows-validation]

permissions:
  contents: read

jobs:
  prepare-manifest:
    runs-on: windows-2022
    outputs:
      part0: ${{ steps.encode.outputs.part0 }}
      part1: ${{ steps.encode.outputs.part1 }}
      part2: ${{ steps.encode.outputs.part2 }}
      part3: ${{ steps.encode.outputs.part3 }}
      sha256: ${{ steps.encode.outputs.sha256 }}
    steps:
      - name: Configure byte-exact Git worktree
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout exact validated source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: c4bdc6df899d856a9bbdfbf4955b8229c2848148
          fetch-depth: 1
          persist-credentials: false

      - name: Encode deterministic corrected manifest
        id: encode
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          import base64, gzip, hashlib, json, os, pathlib
          path = pathlib.Path('Tools/EngineSimVendor/SOURCE_MANIFEST.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['translation_unit_counts']['exact-upstream'] = 20
          data['translation_unit_counts']['patched-upstream'] = 13
          target = 'Plugins/NextcarEngineSim/Source/ThirdParty/EngineSim/upstream/engine-sim/src/gaussian_filter.cpp'
          matches = [entry for entry in data['files'] if entry.get('final_path') == target]
          if len(matches) != 1:
              raise SystemExit(f'expected one gaussian manifest entry, found {len(matches)}')
          entry = matches[0]
          if entry.get('upstream_sha256') != 'c66a3e7a3f017dfb2ca5f15977a0e80a9bc213eaeed9a289182a31f2b184d437':
              raise SystemExit('unexpected gaussian upstream hash')
          entry['classification'] = 'patched-upstream'
          entry['final_sha256'] = '321a58d86d50fec04bf3fb8df7f781cd8f39a30f9d877992541d5661f422683b'
          entry['reason'] = 'Adds the explicit <algorithm> include required by MSVC v143 to declare std::max; filter calculations and runtime behavior are unchanged.'
          raw = (json.dumps(data, ensure_ascii=False, indent=2) + '\n').encode('utf-8')
          encoded = base64.b64encode(gzip.compress(raw, mtime=0)).decode('ascii')
          width = (len(encoded) + 3) // 4
          parts = [encoded[index * width:(index + 1) * width] for index in range(4)]
          output = pathlib.Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8', newline='\n') as stream:
              for index, part in enumerate(parts):
                  stream.write(f'part{index}={part}\n')
              stream.write('sha256=' + hashlib.sha256(raw).hexdigest() + '\n')
          print('corrected manifest bytes:', len(raw))
          print('corrected manifest sha256:', hashlib.sha256(raw).hexdigest())
          print('encoded bytes:', len(encoded))
          print('part lengths:', [len(part) for part in parts])
          '@ | python -

  manifest-part-0:
    needs: prepare-manifest
    runs-on: windows-2022
    steps:
      - name: Print part 0
        shell: pwsh
        run: Write-Output 'MANIFEST_PART_0=${{ needs.prepare-manifest.outputs.part0 }}'

  manifest-part-1:
    needs: prepare-manifest
    runs-on: windows-2022
    steps:
      - name: Print part 1
        shell: pwsh
        run: Write-Output 'MANIFEST_PART_1=${{ needs.prepare-manifest.outputs.part1 }}'

  manifest-part-2:
    needs: prepare-manifest
    runs-on: windows-2022
    steps:
      - name: Print part 2
        shell: pwsh
        run: Write-Output 'MANIFEST_PART_2=${{ needs.prepare-manifest.outputs.part2 }}'

  manifest-part-3:
    needs: prepare-manifest
    runs-on: windows-2022
    steps:
      - name: Print part 3
        shell: pwsh
        run: Write-Output 'MANIFEST_PART_3=${{ needs.prepare-manifest.outputs.part3 }}'

  sentinel:
    needs: [prepare-manifest, manifest-part-0, manifest-part-1, manifest-part-2, manifest-part-3]
    if: always()
    name: manifest-sha256-${{ needs.prepare-manifest.outputs.sha256 }}
    runs-on: windows-2022
    steps:
      - name: Force identifiable notification
        shell: pwsh
        run: throw 'Intentional manifest extraction sentinel'
