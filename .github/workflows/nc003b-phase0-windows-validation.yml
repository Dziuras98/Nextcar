name: NC-003B Phase 0 Windows exact-head validation

on:
  push:
    branches:
      - manager/nc-003b-windows-validation

permissions:
  contents: read

env:
  EXPECTED_SOURCE_SHA: 22721f28f617d8eadcf624198a2a105aa9f26be2

jobs:
  warning-diagnostic:
    name: MSVC project warning diagnostic
    runs-on: windows-2022
    outputs:
      diagnostic: ${{ steps.warnings.outputs.diagnostic }}
    steps:
      - name: Configure byte-exact Git worktree
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Checkout exact validated source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: 22721f28f617d8eadcf624198a2a105aa9f26be2
          fetch-depth: 1
          persist-credentials: false
      - name: Capture project warnings
        id: warnings
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ((git rev-parse HEAD).Trim() -ne $env:EXPECTED_SOURCE_SHA) { throw 'Unexpected checkout' }
          cmake -S Tools/EngineSimVendor/Standalone -B build-warning-scan -G 'Visual Studio 17 2022' -A x64 -T v143
          if ($LASTEXITCODE -ne 0) { throw 'configure failed' }
          $build = @(cmake --build build-warning-scan --config Release --verbose 2>&1)
          $code = $LASTEXITCODE
          $build | Out-Host
          if ($code -ne 0) { throw "build failed $code" }
          $warnings = @($build | ForEach-Object { ([string]$_).Trim() } | Where-Object {
            $_ -match 'warning C\d+:' -and (
              $_ -match 'NextcarEngineSimCore' -or
              $_ -match 'Standalone[\\/]tests' -or
              $_ -match 'SubaruEJ25AtgVideo2Fixture\.cpp' -or
              $_ -match 'phase0_standalone_tests\.cpp'
            )
          } | Sort-Object -Unique)
          $warnings | ForEach-Object { Write-Host "PROJECT_WARNING: $_" }
          $text = ($warnings -join ' / ') -replace '[\r\n]+',' ' -replace '\|','/' -replace "'",'' -replace '"','' -replace '\s+',' '
          $text = $text.Trim()
          if ($text.Length -gt 220) { $text = $text.Substring(0,220) }
          "diagnostic=count=$($warnings.Count) $text" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  notification:
    needs: warning-diagnostic
    if: always()
    name: diagnostic -- ${{ needs.warning-diagnostic.outputs.diagnostic }}
    runs-on: windows-2022
    steps:
      - name: Force diagnostic notification
        shell: pwsh
        run: throw 'Intentional warning diagnostic notification sentinel'
