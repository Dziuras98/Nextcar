name: NC-003B Phase 0 Windows exact-head validation

on:
  push:
    branches: [manager/nc-003b-windows-validation]

permissions:
  contents: read

jobs:
  release-diagnostic:
    runs-on: windows-2022
    timeout-minutes: 30
    outputs:
      diagnostic: ${{ steps.build.outputs.diagnostic }}
    steps:
      - name: Configure byte-exact Git worktree
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout exact validated source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: c4bdc6df899d856a9bbdfbf4955b8229c2848148
          fetch-depth: 1
          persist-credentials: false

      - name: Capture MSVC Release compiler failure
        id: build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $expected = 'c4bdc6df899d856a9bbdfbf4955b8229c2848148'
          if ((git rev-parse HEAD).Trim() -ne $expected) { throw 'Unexpected checkout' }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath).Trim()
          $devCmd = Join-Path $vsPath 'Common7\Tools\VsDevCmd.bat'
          cmd.exe /s /c "`"$devCmd`" -arch=x64 -host_arch=x64 >nul && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') { [Environment]::SetEnvironmentVariable($matches[1],$matches[2],'Process') }
          }
          cmake -S Tools/EngineSimVendor/Standalone -B build-nc003b-msvc-release -G 'Visual Studio 17 2022' -A x64 -T v143
          if ($LASTEXITCODE -ne 0) { throw "configure failed $LASTEXITCODE" }
          $output = @(cmake --build build-nc003b-msvc-release --config Release --verbose 2>&1)
          $code = $LASTEXITCODE
          $output | Out-Host
          $errorLines = @($output | ForEach-Object { ([string]$_).Trim() } | Where-Object { $_ -match '(error C\d+|fatal error|gaussian_filter\.cpp)' } | Select-Object -Last 6)
          $safe = (($errorLines -join ' / ') -replace '[\r\n]+',' ' -replace '\|','/' -replace "'",'')
          if ($safe.Length -gt 230) { $safe = $safe.Substring($safe.Length - 230) }
          if ($code -ne 0) {
            "diagnostic=Release exit $code -- $safe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            throw "Release build failed with exit code $code"
          }
          "diagnostic=Release build unexpectedly PASS" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  diagnostic:
    needs: release-diagnostic
    if: always()
    name: diagnostic -- ${{ needs.release-diagnostic.outputs.diagnostic }}
    runs-on: windows-2022
    steps:
      - name: Force diagnostic notification
        shell: pwsh
        run: |
          Write-Host '${{ needs.release-diagnostic.outputs.diagnostic }}'
          throw 'Intentional diagnostic notification sentinel'
